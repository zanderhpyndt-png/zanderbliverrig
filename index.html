<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZanderBliverRig</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
    background: radial-gradient(circle at top, #111, #000);
    overflow-x: hidden;
}

h1 {
    margin-top: 40px;
    font-size: 3em;
    text-shadow: 0 0 20px gold;
}

.box {
    margin: 15px;
    padding: 15px;
    background: rgba(255,255,255,0.08);
    border-radius: 15px;
    display: inline-block;
    box-shadow: 0 0 15px rgba(255,215,0,0.2);
}

button {
    padding: 15px 30px;
    margin: 10px;
    background: linear-gradient(45deg, gold, orange);
    border: none;
    border-radius: 12px;
    font-size: 1.2em;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px gold;
}

.money {
    position: fixed;
    font-size: 1.5em;
    pointer-events: none;
    animation: fall 1s linear forwards;
}

@keyframes fall {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(120px); }
}
</style>
</head>

<body>

<h1>💰 ZanderBliverRig 💰</h1>

<div class="box">
Besøgende: <span id="visits">0</span>
</div>

<br>

<div class="box">
Dine penge: <span id="money">0</span> kr
</div>

<br>

<button onclick="earn(event)">Tjen penge 💸</button>

<h2>🛒 Shop</h2>

<div class="box">
💪 Bedre klik (+1)<br>
Pris: <span id="priceClick">50</span><br>
<button onclick="buyClick()">Køb</button>
</div>

<div class="box">
🏭 Auto penge (+1/s)<br>
Pris: <span id="priceAuto">100</span><br>
<button onclick="buyAuto()">Køb</button>
</div>

<div class="box">
🔫 Gun upgrade (+5 klik power)<br>
Pris: <span id="priceGun">500</span><br>
<button onclick="buyGun()">Køb</button>
</div>

<div class="box">
🔥 TUNG TUNG SAHUR (x2 alt income)<br>
Pris: <span id="priceSahur">2000</span><br>
<button onclick="buySahur()">Køb</button>
</div>

<script>

let visits = localStorage.getItem("visits") || 0;
visits++;
localStorage.setItem("visits", visits);
document.getElementById("visits").innerText = visits;

let money = parseInt(localStorage.getItem("money")) || 0;
let clickPower = parseInt(localStorage.getItem("clickPower")) || 1;
let auto = parseInt(localStorage.getItem("auto")) || 0;
let multiplier = parseInt(localStorage.getItem("multiplier")) || 1;

let priceClick = parseInt(localStorage.getItem("priceClick")) || 50;
let priceAuto = parseInt(localStorage.getItem("priceAuto")) || 100;
let priceGun = parseInt(localStorage.getItem("priceGun")) || 500;
let priceSahur = parseInt(localStorage.getItem("priceSahur")) || 2000;

function update() {
    document.getElementById("money").innerText = money;
    document.getElementById("priceClick").innerText = priceClick;
    document.getElementById("priceAuto").innerText = priceAuto;
    document.getElementById("priceGun").innerText = priceGun;
    document.getElementById("priceSahur").innerText = priceSahur;
}

function earn(e) {
    money += clickPower * multiplier;
    spawnMoney(e.target);
    save();
}

function spawnMoney(btn) {
    const rect = btn.getBoundingClientRect();

    for (let i = 0; i < 6; i++) {
        const el = document.createElement("div");
        el.className = "money";
        el.innerText = "💸";

        el.style.left = (rect.left + rect.width / 2 + (Math.random() * 60 - 30)) + "px";
        el.style.top = rect.top + "px";

        document.body.appendChild(el);

        setTimeout(() => el.remove(), 1000);
    }
}

function buyClick() {
    if (money >= priceClick) {
        money -= priceClick;
        clickPower += 1;
        priceClick = Math.floor(priceClick * 1.5);
        save();
    }
}

function buyAuto() {
    if (money >= priceAuto) {
        money -= priceAuto;
        auto += 1;
        priceAuto = Math.floor(priceAuto * 1.7);
        save();
    }
}

function buyGun() {
    if (money >= priceGun) {
        money -= priceGun;
        clickPower += 5;
        priceGun = Math.floor(priceGun * 2);
        save();
    }
}

function buySahur() {
    if (money >= priceSahur) {
        money -= priceSahur;
        multiplier *= 2;
        priceSahur = Math.floor(priceSahur * 3);
        save();
    }
}

setInterval(() => {
    money += auto * multiplier;
    save();
}, 1000);

function save() {
    localStorage.setItem("money", money);
    localStorage.setItem("clickPower", clickPower);
    localStorage.setItem("auto", auto);
    localStorage.setItem("multiplier", multiplier);
    localStorage.setItem("priceClick", priceClick);
    localStorage.setItem("priceAuto", priceAuto);
    localStorage.setItem("priceGun", priceGun);
    localStorage.setItem("priceSahur", priceSahur);
    update();
}

update();

</script>

</body>
</html>
