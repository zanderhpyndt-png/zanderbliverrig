<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Super Combo Hunter</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --blue: #00f2ff; --super: #ff00ff; }
        body { margin: 0; background: #1a1a1a; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; user-select: none; }

        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #222, #000); }

        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
        }

        .hud {
            position: fixed; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-around;
            background: rgba(0,0,0,0.5); z-index: 100;
        }

        #player { position: absolute; width: 60px; height: 60px; font-size: 50px; z-index: 60; text-align: center; }

        .monster { position: absolute; width: 80px; height: 80px; font-size: 60px; z-index: 40; }

        /* Skud-effekter */
        .p-bullet { position: absolute; width: 20px; height: 20px; background: var(--blue); border-radius: 50%; box-shadow: 0 0 15px var(--blue); z-index: 55; }
        .super-bullet { 
            position: absolute; width: 50px; height: 50px; background: var(--gold); 
            border-radius: 50%; box-shadow: 0 0 30px var(--gold); z-index: 56;
            animation: pulse 0.3s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* Combo Bar */
        #combo-meter {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 20px; background: #333; border: 2px solid #fff;
        }
        #combo-fill { height: 100%; width: 0%; background: var(--blue); transition: width 0.2s; }

        .btn { background: var(--gold); border: none; padding: 15px 30px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border-radius: 10px; margin: 10px; }
        .hp-bar { width: 100%; height: 10px; background: #000; position: absolute; top: -20px; border-radius: 5px; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; }
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 style="color: var(--gold);">ZANDER SHOP</h1>
    <p>GULD: <b id="menu-money">0</b></p>
    <div style="background: #333; padding: 20px; border-radius: 15px;">
        <button class="btn" onclick="buy('dmg')">SKADE +50 (<span id="cost-dmg">100</span>)</button>
        <button class="btn" onclick="buy('heal')">HEAL (50)</button><br>
        <button class="btn" onclick="buyAvatar('ninja', 500, '🥷', 1.8)">NINJA (500)</button>
        <button class="btn" onclick="buyAvatar('king', 2000, '👑', 1.2)">KING (2000)</button>
    </div>
    <button class="btn" style="background: #2ecc71; color: white; margin-top: 20px;" onclick="closeMenu()">NÆSTE BØLGE</button>
</div>

<div class="hud">
    <div>Guld: <b id="money" style="color: var(--gold);">0</b></div>
    <div>Sektor: <b id="lvl">0</b></div>
    <div>Liv: <b id="p-hp" style="color: #2ecc71;">100</b></div>
</div>

<div id="combo-meter">
    <div id="combo-fill"></div>
    <small style="position:absolute; width:100%; text-align:center; top:-20px">SUPER SKUD COMBO</small>
</div>

<div id="game-container">
    <div id="player">👨</div>
</div>

<script>
    let money = 0, lvl = 0, pHP = 100, pDmg = 50, pSpeed = 8, gMult = 2, inMenu = true;
    let px = window.innerWidth/2, py = window.innerHeight/2;
    let comboCount = 0;
    let prices = { dmg: 100 };

    const keys = {}, monsters = [], pBullets = [];
    const container = document.getElementById('game-container');

    window.addEventListener('keydown', e => {
        if(e.code === 'Enter' && !inMenu) fireAutoBullet();
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function openMenu() { inMenu = true; document.getElementById('menu-overlay').style.display = 'flex'; document.getElementById('menu-money').innerText = money; }
    function closeMenu() { inMenu = false; document.getElementById('menu-overlay').style.display = 'none'; if(monsters.length === 0) spawnWave(); }

    function spawnWave() {
        lvl++;
        const count = 1 + Math.floor(lvl / 3);
        for(let i=0; i<count; i++) {
            const el = document.createElement('div');
            el.className = 'monster';
            el.innerHTML = `<div class="hp-bar"><div class="hp-fill" id="m-hp-${monsters.length}"></div></div>👹`;
            container.appendChild(el);
            monsters.push({ el, x: Math.random()*window.innerWidth, y: -100, hp: 100 * Math.pow(1.15, lvl), maxHp: 100 * Math.pow(1.15, lvl) });
        }
    }

    function fireAutoBullet() {
        if(monsters.length === 0) return;

        // Find det nærmeste monster
        let target = monsters[0];
        let minDist = Infinity;
        monsters.forEach(m => {
            let d = Math.sqrt((m.x-px)**2 + (m.y-py)**2);
            if(d < minDist) { minDist = d; target = m; }
        });

        const b = document.createElement('div');
        const isSuper = comboCount >= 5;
        b.className = isSuper ? 'super-bullet' : 'p-bullet';
        container.appendChild(b);

        const ang = Math.atan2(target.y - py, target.x - px);
        pBullets.push({ 
            el: b, 
            x: px + 20, y: py + 20, 
            vx: Math.cos(ang) * 15, vy: Math.sin(ang) * 15,
            damage: isSuper ? pDmg * 3 : pDmg,
            isSuper: isSuper
        });

        if(isSuper) {
            comboCount = 0; // Reset efter super skud
            document.body.style.boxShadow = "inset 0 0 50px gold";
            setTimeout(() => document.body.style.boxShadow = "none", 200);
        }
    }

    function buy(type) {
        if(type === 'dmg' && money >= prices.dmg) {
            money -= prices.dmg; pDmg += 50; prices.dmg = Math.round(prices.dmg * 1.4);
            document.getElementById('cost-dmg').innerText = prices.dmg;
        }
        if(type === 'heal' && money >= 50) { money -= 50; pHP = 100; }
        document.getElementById('menu-money').innerText = money;
    }

    function buyAvatar(id, cost, icon, speed) {
        if(money >= cost) {
            money -= cost;
            document.getElementById('player').innerText = icon;
            pSpeed = 8 * speed;
            if(id === 'king') gMult = 4;
            document.getElementById('menu-money').innerText = money;
        }
    }

    function loop() {
        if(!inMenu) {
            if(keys['ArrowUp']) py -= pSpeed;
            if(keys['ArrowDown']) py += pSpeed;
            if(keys['ArrowLeft']) px -= pSpeed;
            if(keys['ArrowRight']) px += pSpeed;

            document.getElementById('player').style.left = px + 'px';
            document.getElementById('player').style.top = py + 'px';

            monsters.forEach((m, mi) => {
                const dx = px - m.x, dy = py - m.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                m.x += (dx/dist) * 1.5; m.y += (dy/dist) * 1.5;
                m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
                if(dist < 50) pHP -= 0.1;
            });

            pBullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
                
                monsters.forEach((m, mi) => {
                    if(b.x > m.x && b.x < m.x+80 && b.y > m.y && b.y < m.y+80) {
                        m.hp -= b.damage;
                        if(!b.isSuper) comboCount = Math.min(5, comboCount + 1);
                        
                        b.el.remove(); pBullets.splice(bi, 1);
                        m.el.querySelector('.hp-fill').style.width = (m.hp/m.maxHp*100) + "%";
                        
                        if(m.hp <= 0) {
                            m.el.remove(); monsters.splice(mi, 1);
                            money += 200 * gMult;
                            if(monsters.length === 0) setTimeout(openMenu, 600);
                        }
                    }
                });
            });

            document.getElementById('combo-fill').style.width = (comboCount / 5 * 100) + "%";
            document.getElementById('money').innerText = Math.floor(money);
            document.getElementById('p-hp').innerText = Math.floor(pHP);
            if(pHP <= 0) { alert("Game Over!"); location.reload(); }
        }
        requestAnimationFrame(loop);
    }

    openMenu();
    requestAnimationFrame(loop);
</script>
</body>
</html>
