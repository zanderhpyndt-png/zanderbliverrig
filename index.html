<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Shadow Striker</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --blood: #8e0000; --cyan: #00f2ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Arial', sans-serif; overflow: hidden; user-select: none; }

        /* Lommelygte effekt */
        #flashlight {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle 200px at var(--x) var(--y), transparent 0%, rgba(0,0,0,0.98) 100%);
            z-index: 100; pointer-events: none; transition: background 0.1s;
        }

        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
        }

        .hud {
            position: fixed; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-around;
            background: linear-gradient(to bottom, rgba(0,0,0,1), transparent); z-index: 150;
            font-family: 'Orbitron';
        }

        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #050505; cursor: crosshair; }

        #player { position: absolute; width: 50px; height: 60px; font-size: 40px; z-index: 60; text-align: center; }

        .monster {
            position: absolute; width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            z-index: 40; filter: drop-shadow(0 0 10px var(--blood));
            font-size: 60px;
        }

        .btn {
            background: #111; color: #fff; border: 1px solid var(--gold);
            padding: 12px; cursor: pointer; font-family: 'Orbitron';
            margin: 5px; width: 250px; border-radius: 5px;
        }

        /* Skud & Partikler */
        .p-bullet { position: absolute; width: 8px; height: 8px; background: var(--cyan); border-radius: 50%; box-shadow: 0 0 15px var(--cyan); z-index: 55; }
        .m-bullet { position: absolute; width: 10px; height: 10px; background: red; border-radius: 50%; z-index: 55; }
    </style>
</head>
<body>

<div id="flashlight"></div>

<div id="menu-overlay">
    <h1 style="color: var(--blood); font-family: 'Creepster'; font-size: 5rem; margin: 0;">KLAR TIL KAMP?</h1>
    <p style="font-family: 'Orbitron';">GULD: <b id="menu-money">0</b></p>
    <button class="btn" onclick="buy('dmg')">OPGRADER SKADE (Pris: <span id="p-dmg-cost">200</span>)</button>
    <button class="btn" onclick="buy('heal')">KØB LIV (150 KR)</button>
    <button class="btn" style="background: var(--blood); margin-top: 20px;" onclick="closeMenu()">START NÆSTE BØLGE</button>
</div>

<div class="hud">
    <div>GULD: <b id="money" style="color: var(--gold);">0</b></div>
    <div>SEKTOR: <b id="lvl">0</b></div>
    <div style="color: #4cd137;">LIV: <b id="p-hp">100</b></div>
</div>

<div id="game-container">
    <div id="player">👨</div>
</div>

<script>
    let money = 0, lvl = 0, pHP = 100, pDmg = 25, pSpeed = 6, inMenu = true;
    let px = window.innerWidth/2, py = window.innerHeight/2;
    let mouseX = 0, mouseY = 0;
    let dmgPrice = 200;

    const keys = {}, monsters = [], mBullets = [], pBullets = [];
    const container = document.getElementById('game-container');

    // Mus og skydning
    window.addEventListener('mousemove', e => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        document.documentElement.style.setProperty('--x', mouseX + 'px');
        document.documentElement.style.setProperty('--y', mouseY + 'px');
    });

    window.addEventListener('mousedown', () => {
        if(!inMenu) fireBullet();
    });

    window.addEventListener('keydown', e => {
        if(e.code === 'Escape') openMenu();
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function openMenu() { inMenu = true; document.getElementById('menu-overlay').style.display = 'flex'; }
    function closeMenu() { inMenu = false; document.getElementById('menu-overlay').style.display = 'none'; if(monsters.length === 0) spawnWave(); }

    function spawnWave() {
        lvl++;
        const count = Math.ceil(lvl / 2);
        for(let i=0; i < count; i++) {
            const el = document.createElement('div');
            el.className = 'monster';
            el.innerText = '👹';
            container.appendChild(el);
            monsters.push({ el, x: Math.random() * window.innerWidth, y: -100, hp: 50 * lvl });
        }
    }

    function fireBullet() {
        // Muzzle flash effekt
        document.getElementById('flashlight').style.background = "radial-gradient(circle 300px at var(--x) var(--y), rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.98) 100%)";
        setTimeout(() => {
            document.getElementById('flashlight').style.background = "radial-gradient(circle 200px at var(--x) var(--y), transparent 0%, rgba(0,0,0,0.98) 100%)";
        }, 50);

        const b = document.createElement('div');
        b.className = 'p-bullet';
        container.appendChild(b);
        const ang = Math.atan2(mouseY - py, mouseX - px);
        pBullets.push({ el: b, x: px+20, y: py+20, vx: Math.cos(ang)*15, vy: Math.sin(ang)*15 });
    }

    function buy(type) {
        if(type === 'dmg' && money >= dmgPrice) {
            money -= dmgPrice; pDmg += 20; dmgPrice = Math.round(dmgPrice * 1.5);
            document.getElementById('p-dmg-cost').innerText = dmgPrice;
        }
        if(type === 'heal' && money >= 150) { money -= 150; pHP = 100; }
        document.getElementById('menu-money').innerText = money;
    }

    function loop() {
        if(!inMenu) {
            // Bevægelse
            if(keys['KeyW']) py -= pSpeed;
            if(keys['KeyS']) py += pSpeed;
            if(keys['KeyA']) px -= pSpeed;
            if(keys['KeyD']) px += pSpeed;
            
            document.getElementById('player').style.left = px + 'px';
            document.getElementById('player').style.top = py + 'px';

            // Monstre jager dig
            monsters.forEach((m, mi) => {
                const dx = px - m.x, dy = py - m.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                m.x += (dx/dist) * (2 + lvl*0.1);
                m.y += (dy/dist) * (2 + lvl*0.1);
                m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
                if(dist < 50) pHP -= 0.2;
            });

            // Opdater spillerens skud
            pBullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
                
                monsters.forEach((m, mi) => {
                    if(b.x > m.x && b.x < m.x+80 && b.y > m.y && b.y < m.y+80) {
                        m.hp -= pDmg;
                        b.el.remove(); pBullets.splice(bi, 1);
                        if(m.hp <= 0) {
                            m.el.remove(); monsters.splice(mi, 1);
                            money += 100 * lvl;
                            if(monsters.length === 0) setTimeout(openMenu, 1000);
                        }
                    }
                });
            });

            document.getElementById('money').innerText = Math.floor(money);
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('p-hp').innerText = Math.floor(pHP);
            if(pHP <= 0) { alert("Mørket tog dig..."); location.reload(); }
        }
        requestAnimationFrame(loop);
    }

    openMenu();
    requestAnimationFrame(loop);
</script>
</body>
</html>
