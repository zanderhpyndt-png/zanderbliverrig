<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Skin & Power Hunter</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --blue: #00a8ff; --red: #ff4757; }
        body { margin: 0; background: #080808; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }

        /* HUD */
        #hud {
            position: fixed; top: 0; width: 100%; padding: 15px;
            display: flex; justify-content: space-around;
            background: rgba(0,0,0,0.9); z-index: 100; border-bottom: 2px solid #333;
        }
        .stat b { color: var(--gold); font-family: 'Orbitron'; }

        /* Game Area */
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #151515, #000); }

        #player {
            position: absolute; width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            font-size: 25px; border-radius: 8px; z-index: 10;
            transition: background 0.3s, box-shadow 0.3s;
        }

        #monster {
            position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%);
            width: 180px; height: 180px; background: #1a1a1a;
            border-radius: 50%; box-shadow: 0 0 60px var(--red);
            display: flex; justify-content: center; align-items: center; z-index: 5;
        }

        /* Projektiler */
        .bullet { position: absolute; border-radius: 50%; z-index: 8; }
        .m-bullet { width: 12px; height: 12px; background: var(--red); box-shadow: 0 0 10px red; }
        .p-bullet { width: 10px; height: 10px; background: #fff; box-shadow: 0 0 10px var(--blue); }

        /* Sidebar Shop */
        #shop-sidebar {
            position: fixed; left: 0; top: 75px; bottom: 0;
            width: 240px; background: rgba(15, 15, 15, 0.95);
            padding: 15px; border-right: 2px solid #444; overflow-y: auto; z-index: 100;
        }
        .shop-section { margin-bottom: 25px; }
        .shop-section h3 { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .item { background: #222; padding: 10px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; }
        .item:hover { border-color: var(--gold); }
        .item b { display: block; font-size: 0.9rem; margin-bottom: 5px; }
        
        button { 
            width: 100%; background: var(--gold); border: none; padding: 6px; 
            font-weight: bold; cursor: pointer; border-radius: 4px;
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* HP Bars */
        .hp-container { width: 200px; height: 12px; background: #222; border: 1px solid #555; position: absolute; top: -30px; left: -10px; }
        .hp-fill { height: 100%; width: 100%; transition: 0.1s; }
        #p-hp-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 400px; height: 25px; background: #111; border: 2px solid white; z-index: 100; }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat">GULD: <b id="money">0</b></div>
    <div class="stat">SKADE: <b id="stat-dmg">1</b></div>
    <div class="stat">LVL: <b id="lvl">1</b></div>
</div>

<div id="shop-sidebar">
    <div class="shop-section">
        <h3>⚔️ STYRKE</h3>
        <div class="item">
            <b>Træn Muskler</b>
            <small>+2 Skade</small>
            <button id="buy-dmg" onclick="buy('dmg')">Pris: 75</button>
        </div>
        <div class="item">
            <b>Super Ammunition</b>
            <small>+10 Skade</small>
            <button id="buy-big-dmg" onclick="buy('big-dmg')">Pris: 500</button>
        </div>
    </div>

    <div class="shop-section">
        <h3>🎭 AVATARS / SKINS</h3>
        <div class="item">
            <b>🥷 Ninja (Hurtig)</b>
            <small>Fart: 1.5x | Pris: 300</small>
            <button id="skin-ninja" onclick="buySkin('ninja', 300, '🥷', '#2ecc71', 1.5, 0)">Køb</button>
        </div>
        <div class="item">
            <b>🤖 Robot (Tank)</b>
            <small>Forsvar: 20% | Pris: 1000</small>
            <button id="skin-robot" onclick="buySkin('robot', 1000, '🤖', '#95a5a6', 1.0, 2)">Køb</button>
        </div>
        <div class="item">
            <b>👑 Kong Zander</b>
            <small>Guld: 2x | Pris: 5000</small>
            <button id="skin-king" onclick="buySkin('king', 5000, '👑', '#f1c40f', 1.2, 1)">Køb</button>
        </div>
    </div>

    <div class="shop-section">
        <h3>🔫 VÅBEN</h3>
        <div class="item"><b>Auto-Pistol</b><button id="buy-pistol" onclick="buy('pistol')">150</button></div>
        <div class="item"><b>Heal</b><button onclick="buy('heal')">40</button></div>
    </div>
</div>

<div id="game-container">
    <div id="player" style="background: var(--blue); box-shadow: 0 0 15px var(--blue);">🟦</div>
    <div id="monster" onclick="clickMonster()">
        <div class="hp-container"><div id="m-hp-fill" class="hp-fill" style="background: var(--red);"></div></div>
        <div id="m-icon" style="font-size: 70px;">👺</div>
    </div>
</div>

<div id="p-hp-bar"><div id="p-hp-fill" class="hp-fill" style="background: #2ecc71;"></div><small style="position:absolute; width:100%; text-align:center; top:4px; font-weight:bold">DIT LIV</small></div>

<script>
    let money = 0;
    let lvl = 1;
    let pHP = 100;
    let pMaxHP = 100;
    let pDmg = 1;
    let pSpeed = 6;
    let pDefense = 0;
    let goldMult = 1;

    let weaponOwned = false;
    let lastFire = 0;
    let mHP = 50;
    let mMaxHP = 50;

    let px = window.innerWidth / 2;
    let py = window.innerHeight - 150;
    const keys = {};

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function clickMonster() { damageMonster(pDmg); }

    function damageMonster(amt) {
        mHP -= amt;
        money += amt * goldMult;
        if(mHP <= 0) {
            lvl++;
            mMaxHP = Math.round(50 * Math.pow(1.3, lvl));
            mHP = mMaxHP;
            money += 100;
            document.getElementById('m-icon').innerText = ['👹', '👽', '👾', '🧛', '🐲'][lvl % 5];
        }
        updateUI();
    }

    function buy(type) {
        if(type === 'dmg' && money >= 75) { money -= 75; pDmg += 2; }
        if(type === 'big-dmg' && money >= 500) { money -= 500; pDmg += 10; }
        if(type === 'pistol' && money >= 150) { money -= 150; weaponOwned = true; }
        if(type === 'heal' && money >= 40) { money -= 40; pHP = pMaxHP; }
        updateUI();
    }

    function buySkin(id, cost, icon, color, speedMult, def) {
        if(money >= cost) {
            money -= cost;
            document.getElementById('player').innerText = icon;
            document.getElementById('player').style.background = color;
            document.getElementById('player').style.boxShadow = `0 0 20px ${color}`;
            pSpeed = 6 * speedMult;
            pDefense = def;
            if(id === 'king') goldMult = 2;
            document.getElementById('skin-' + id).disabled = true;
            document.getElementById('skin-' + id).innerText = "AKTIV";
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money);
        document.getElementById('lvl').innerText = lvl;
        document.getElementById('stat-dmg').innerText = pDmg;
        document.getElementById('m-hp-fill').style.width = (mHP/mMaxHP*100) + "%";
        document.getElementById('p-hp-fill').style.width = pHP + "%";
        
        document.getElementById('buy-dmg').disabled = money < 75;
        document.getElementById('buy-big-dmg').disabled = money < 500;
        document.getElementById('buy-pistol').disabled = money < 150 || weaponOwned;
    }

    let mBullets = [];
    let pBullets = [];

    function loop(time) {
        if(keys['ArrowUp'] || keys['KeyW']) py -= pSpeed;
        if(keys['ArrowDown'] || keys['KeyS']) py += pSpeed;
        if(keys['ArrowLeft'] || keys['KeyA']) px -= pSpeed;
        if(keys['ArrowRight'] || keys['KeyD']) px += pSpeed;

        px = Math.max(0, Math.min(window.innerWidth - 40, px));
        py = Math.max(0, Math.min(window.innerHeight - 100, py));
        document.getElementById('player').style.left = px + 'px';
        document.getElementById('player').style.top = py + 'px';

        // Auto-fire
        if(weaponOwned && time - lastFire > 600) {
            fireBullet('player');
            lastFire = time;
        }

        // Monster attack
        if(Math.random() < 0.02 + (lvl * 0.003)) fireBullet('monster');

        // Update Bullets
        updateBullets();
        requestAnimationFrame(loop);
    }

    function fireBullet(who) {
        const b = document.createElement('div');
        b.className = 'bullet ' + (who === 'player' ? 'p-bullet' : 'm-bullet');
        const mRect = monster.getBoundingClientRect();
        let startX, startY, angle;

        if(who === 'player') {
            startX = px + 20; startY = py + 20;
            angle = Math.atan2((mRect.top + 90) - py, (mRect.left + 90) - px);
            pBullets.push({ el: b, x: startX, y: startY, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
        } else {
            startX = mRect.left + 90; startY = mRect.top + 90;
            angle = Math.atan2(py - startY, px - startX);
            mBullets.push({ el: b, x: startX, y: startY, vx: Math.cos(angle) * (4 + lvl * 0.2), vy: Math.sin(angle) * (4 + lvl * 0.2) });
        }
        document.getElementById('game-container').appendChild(b);
    }

    function updateBullets() {
        pBullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
            const mRect = monster.getBoundingClientRect();
            if(b.x > mRect.left && b.x < mRect.right && b.y > mRect.top && b.y < mRect.bottom) {
                damageMonster(pDmg); b.el.remove(); pBullets.splice(i, 1);
            }
        });

        mBullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
            if(b.x > px && b.x < px + 40 && b.y > py && b.y < py + 40) {
                pHP -= Math.max(1, 10 - pDefense);
                updateUI();
                b.el.remove(); mBullets.splice(i, 1);
                if(pHP <= 0) { alert("Zander faldt! Du nåede level " + lvl); location.reload(); }
            }
        });
    }

    updateUI();
    requestAnimationFrame(loop);
</script>
</body>
</html>
