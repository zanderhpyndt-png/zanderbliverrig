<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Nightmare Sector</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --blood: #660000; --gold: #ffd700; --laser: #00f2ff; --plasma: #ff00ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; user-select: none; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #111, #000); }

        /* HUD */
        .hud { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.9); z-index: 300; border-bottom: 2px solid var(--blood); }
        .hud b { color: var(--gold); }

        /* Monster */
        .monster { position: absolute; width: 100px; height: 120px; z-index: 40; filter: drop-shadow(0 0 15px var(--blood)); text-align: center; }
        .monster-head { width: 50px; height: 60px; background: #3a443a; border-radius: 40%; position: relative; border: 2px solid #1a1a1a; margin: auto; }
        .monster-smile { position: absolute; bottom: 10px; left: 5px; width: 40px; height: 15px; border-bottom: 4px solid #fff; border-radius: 50%; box-shadow: 0 5px 10px red; }

        /* Spiller & Skud */
        #player { position: absolute; width: 50px; height: 60px; font-size: 45px; z-index: 60; text-align: center; }
        .bullet { position: absolute; border-radius: 50%; pointer-events: none; z-index: 55; }
        .laser-bolt { width: 6px; height: 20px; background: var(--laser); box-shadow: 0 0 15px var(--laser); }
        .shotgun-shell { width: 8px; height: 8px; background: #fff; box-shadow: 0 0 8px #fff; }
        .plasma-orb { width: 25px; height: 25px; background: var(--plasma); box-shadow: 0 0 25px var(--plasma); border: 2px solid #fff; }

        /* Menuer */
        #menu-overlay, #timer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; text-align: center; }
        h1 { font-family: 'Creepster'; font-size: 4rem; color: var(--blood); margin: 0; }
        .btn { background: #111; color: white; border: 1px solid var(--gold); padding: 15px; cursor: pointer; font-family: 'Orbitron'; margin: 10px; width: 300px; border-radius: 5px; transition: 0.2s; }
        .btn:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

<div id="timer-overlay">
    <h1>SEKTOR RENSET</h1>
    <p style="font-size: 1.5rem;">Næste mareridt begynder om:</p>
    <div id="countdown" style="font-size: 5rem; color: var(--blood);">5</div>
</div>

<div id="menu-overlay">
    <h1>UDSTYR</h1>
    <p>GULD: <span id="menu-money">0</span></p>
    <button class="btn" onclick="setWeapon('laser')">LASER (Præcis)</button>
    <button class="btn" onclick="setWeapon('shotgun')">SHOTGUN (Spredning)</button>
    <button class="btn" onclick="setWeapon('plasma')">PLASMA (Tung)</button>
    <button class="btn" onclick="buyDmg()">OPGRADER SKADE (<span id="dmg-cost">500</span> Guld)</button>
    <button class="btn" style="background: var(--blood);" onclick="closeMenu()">FORTSÆT</button>
</div>

<div class="hud">
    <div>GULD: <b id="money-ui">0</b></div>
    <div>SEKTOR: <b id="sector-ui">1</b></div>
    <div>VÅBEN: <b id="weapon-ui" style="color: var(--laser);">LASER</b></div>
    <div>LIV: <b id="hp-ui" style="color: red;">100</b></div>
</div>

<div id="game-container">
    <div id="player">👨</div>
</div>

<script>
    let money = 0, sector = 1, hp = 100, dmgBase = 50, dmgCost = 500;
    let currentWeapon = 'laser', inMenu = false, monsterAlive = false;
    let px = window.innerWidth/2, py = window.innerHeight/2;
    const keys = {}, monsters = [], pBullets = [];
    const container = document.getElementById('game-container');

    window.addEventListener('keydown', e => {
        if(e.code === 'Escape') inMenu ? closeMenu() : openMenu();
        if(e.code === 'Enter' && !keys[e.code] && !inMenu && monsterAlive) fireWeapon();
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function openMenu() { inMenu = true; document.getElementById('menu-overlay').style.display = 'flex'; document.getElementById('menu-money').innerText = money; }
    function closeMenu() { inMenu = false; document.getElementById('menu-overlay').style.display = 'none'; }

    function setWeapon(type) {
        currentWeapon = type;
        const ui = document.getElementById('weapon-ui');
        ui.innerText = type.toUpperCase();
        ui.style.color = type === 'laser' ? 'var(--laser)' : (type === 'plasma' ? 'var(--plasma)' : '#fff');
    }

    function buyDmg() {
        if(money >= dmgCost) {
            money -= dmgCost;
            dmgBase += 50;
            dmgCost = Math.round(dmgCost * 1.5);
            document.getElementById('dmg-cost').innerText = dmgCost;
            document.getElementById('menu-money').innerText = money;
            updateUI();
        }
    }

    function fireWeapon() {
        if(monsters.length === 0) return;
        const target = monsters[0];
        const ang = Math.atan2(target.y - py, target.x - px);

        if(currentWeapon === 'laser') {
            createBullet('laser-bolt', ang, 22, dmgBase);
        } else if(currentWeapon === 'shotgun') {
            for(let i = -2; i <= 2; i++) createBullet('shotgun-shell', ang + (i * 0.2), 16, dmgBase * 0.4);
        } else if(currentWeapon === 'plasma') {
            createBullet('plasma-orb', ang, 9, dmgBase * 3);
        }
    }

    function createBullet(cls, ang, spd, d) {
        const el = document.createElement('div');
        el.className = 'bullet ' + cls;
        container.appendChild(el);
        pBullets.push({ el, x: px+20, y: py+20, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd, d });
    }

    function startNextSector() {
        monsterAlive = false;
        document.getElementById('timer-overlay').style.display = 'flex';
        let count = 5;
        const timer = setInterval(() => {
            count--;
            document.getElementById('countdown').innerText = count;
            if(count <= 0) {
                clearInterval(timer);
                document.getElementById('timer-overlay').style.display = 'none';
                document.getElementById('countdown').innerText = "5";
                spawnMonster();
            }
        }, 1000);
    }

    function spawnMonster() {
        const div = document.createElement('div');
        div.className = 'monster';
        div.innerHTML = `<div class="monster-head"><div class="monster-smile"></div></div><div style="font-size: 50px;">🧟</div>`;
        container.appendChild(div);
        monsters.push({ el: div, x: Math.random() * window.innerWidth, y: -150, hp: 100 * Math.pow(1.3, sector), maxHp: 100 * Math.pow(1.3, sector) });
        monsterAlive = true;
    }

    function updateUI() {
        document.getElementById('money-ui').innerText = Math.floor(money);
        document.getElementById('sector-ui').innerText = sector;
        document.getElementById('hp-ui').innerText = Math.max(0, Math.floor(hp));
    }

    function loop() {
        if(!inMenu) {
            if(keys['ArrowUp']) py -= 7;
            if(keys['ArrowDown']) py += 7;
            if(keys['ArrowLeft']) px -= 7;
            if(keys['ArrowRight']) px += 7;

            document.getElementById('player').style.left = px + 'px';
            document.getElementById('player').style.top = py + 'px';

            monsters.forEach((m, mi) => {
                const dx = px - m.x, dy = py - m.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                m.x += (dx/dist) * (2 + sector * 0.1);
                m.y += (dy/dist) * (2 + sector * 0.1);
                m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
                if(dist < 50) { hp -= 0.5; updateUI(); }
                if(hp <= 0) { alert("DU BLEV OPSLUGT AF MARERIDTET!"); location.reload(); }
            });

            pBullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
                if(currentWeapon === 'laser') b.el.style.transform = `rotate(${Math.atan2(b.vy, b.vx) + Math.PI/2}rad)`;

                monsters.forEach((m, mi) => {
                    if(b.x > m.x && b.x < m.x+100 && b.y > m.y && b.y < m.y+120) {
                        m.hp -= b.d;
                        b.el.remove(); pBullets.splice(bi, 1);
                        if(m.hp <= 0) {
                            m.el.remove(); monsters.splice(mi, 1);
                            money += 500 * sector;
                            sector++;
                            updateUI();
                            startNextSector();
                        }
                    }
                });
            });
        }
        requestAnimationFrame(loop);
    }

    spawnMonster();
    requestAnimationFrame(loop);
</script>
</body>
</html>
