<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Hacker Terminal</title>

<style>
    body {
        background: black;
        color: #00ff00;
        font-family: "Courier New", monospace;
        margin: 0;
        padding: 20px;
    }

    #terminal {
        height: 90vh;
        overflow-y: auto;
        white-space: pre-wrap;
    }

    .input-line {
        display: flex;
    }

    .prompt {
        margin-right: 5px;
    }

    input {
        background: transparent;
        border: none;
        color: #00ff00;
        font-family: inherit;
        font-size: 18px;
        outline: none;
        width: 100%;
    }
</style>
</head>
<body>

<div id="terminal">
    <div>FAKE HACKER TERMINAL v1.0</div>
    <div>Skriv en kommando og tryk Enter.</div>
    <br>
</div>

<script>
const terminal = document.getElementById("terminal");

function createInput() {
    const line = document.createElement("div");
    line.className = "input-line";

    line.innerHTML = `
        <span class="prompt">root@system:~$</span>
        <input type="text" autofocus>
    `;

    terminal.appendChild(line);

    const input = line.querySelector("input");
    input.focus();

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const command = input.value;
            input.disabled = true;

            processCommand(command);

            createInput();

            terminal.scrollTop = terminal.scrollHeight;
        }
    });
}

function processCommand(command) {
    const output = document.createElement("div");

    switch(command.toLowerCase()) {
        case "hack":
            output.textContent =
                "Forbinder til server...\n" +
                "Omgår firewall...\n" +
                "Adgang opnået!";
            break;

        case "scan":
            output.textContent =
                "Scanner netværk...\n" +
                "3 enheder fundet.";
            break;

        case "help":
            output.textContent =
                "Kommandoer:\n" +
                "hack\n" +
                "scan\n" +
                "clear\n" +
                "help";
            break;

        case "clear":
            terminal.innerHTML = "";
            return;

        default:
            output.textContent =
                `'${command}' er ikke genkendt. Skriv "help".`;
    }

    terminal.appendChild(output);
}

createInput();
</script>

</body>
</html>
