<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <title>Nightwatch: Realism Edition</title>
    <style>
        :root { --glow: #00ff41; --danger: #ff3131; }
        body { margin: 0; background: #000; color: var(--glow); font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }

        /* Realistisk mørke og vignette */
        #game-view { position: relative; width: 100vw; height: 100vh; box-shadow: inset 0 0 150px #000; }
        #vignette { position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%); pointer-events: none; z-index: 15; }

        /* Kontoret med dybde */
        #office { 
            position: absolute; width: 180vw; height: 100vh; left: -40vw; 
            background: #111 url('https://transparenttextures.com');
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.15s ease-out;
        }

        /* Døre med tekstur */
        .door-frame { position: absolute; bottom: 0; width: 20vw; height: 85vh; background: #050505; border: 8px solid #222; box-shadow: 0 0 50px #000; }
        #frame-l { left: 15vw; } #frame-r { right: 15vw; }
        .door { 
            position: absolute; top: -100%; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(90deg, #222 0%, #333 50%, #222 100%);
            border-bottom: 20px solid #111; transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        .door::after { content: ''; width: 80%; height: 2px; background: rgba(255,255,255,0.05); position: absolute; top: 20%; }
        .door.closed { top: 0; }

        /* Lys-kegle */
        #flashlight { 
            position: absolute; inset: 0; z-index: 12; pointer-events: none;
            background: radial-gradient(circle at center, rgba(255,255,230,0.15) 0%, transparent 60%);
            display: none; mix-blend-mode: overlay;
        }

        /* Knapper og paneler */
        .panel { position: absolute; bottom: 35%; padding: 10px; background: #1a1a1a; border: 2px solid #333; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
        #panel-l { left: 4vw; } #panel-r { right: 4vw; }
        .btn { width: 50px; height: 50px; border-radius: 5px; cursor: pointer; border: 3px solid #000; position: relative; }
        .btn-door { background: #4a0000; } .btn-door.active { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .btn-light { background: #4a4a00; } .btn-light.active { background: #ffff00; box-shadow: 0 0 15px #ffff00; }

        /* Monitor med Scanlines */
        #monitor { 
            position: absolute; inset: 0; background: #000; z-index: 500; display: none;
            border: 40px solid #1a1a1a; overflow: hidden;
        }
        #monitor::before { 
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 501; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }
        #monitor-ui { position: absolute; top: 40px; left: 40px; font-size: 20px; z-index: 502; text-shadow: 2px 2px #000; }

        /* UI */
        #hud { position: absolute; bottom: 30px; left: 30px; z-index: 1000; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="vignette"></div>
<div id="flashlight"></div>

<div id="hud">
    <div style="font-size: 32px;"><span id="hr">12</span> AM</div>
    <div style="color: #666;">Power: <span id="pwr" style="color: var(--glow);">100</span>%</div>
</div>

<div id="game-view">
    <div id="office">
        <div id="panel-l" class="panel">
            <div class="btn btn-door" onclick="toggleDoor('l', this)"></div>
            <div class="btn btn-light" onmousedown="setLight(true, 'l', this)" onmouseup="setLight(false, 'l', this)"></div>
        </div>
        <div id="frame-l" class="door-frame"><div id="door-l" class="door"></div></div>

        <div id="frame-r" class="door-frame"><div id="door-r" class="door"></div></div>
        <div id="panel-r" class="panel">
            <div class="btn btn-door" onclick="toggleDoor('r', this)"></div>
            <div class="btn btn-light" onmousedown="setLight(true, 'r', this)" onmouseup="setLight(false, 'r', this)"></div>
        </div>
    </div>

    <div id="monitor" onclick="toggleMonitor()">
        <div id="monitor-ui">REC ● CAM 01<br><span id="ai-hint">NO SIGNAL</span></div>
        <img id="cam-img" src="https://unsplash.com" style="width:100%; height:100%; object-fit:cover; opacity: 0.3;">
    </div>

    <div style="position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:300px; height:40px; background:#222; z-index:100; cursor:pointer; text-align:center; line-height:40px; border:2px solid #333;" onclick="toggleMonitor()">MONITOR SYSTEM</div>
</div>

<script>
    let power = 100, hour = 12, ticks = 0, aiPos = 0;
    let doors = {l: false, r: false}, cam = false;

    // Realistisk Panorering (Smidig bevægelse)
    document.addEventListener('mousemove', (e) => {
        let x = (e.clientX / window.innerWidth - 0.5) * 60;
        document.getElementById('office').style.transform = `translateX(${-x}vw)`;
    });

    // Game Logic
    const mainLoop = setInterval(() => {
        // Power consumption logic
        let drain = 0.1;
        if (doors.l) drain += 0.2;
        if (doors.r) drain += 0.2;
        if (cam) drain += 0.3;
        
        power -= drain;
        document.getElementById('pwr').innerText = Math.max(0, Math.floor(power));

        if (power <= 0) gameOver("POWER OUTAGE");

        // Clock logic
        ticks++;
        if (ticks >= 60) {
            ticks = 0;
            hour = hour === 12 ? 1 : hour + 1;
            document.getElementById('hr').innerText = hour;
            if (hour === 6) gameOver("YOU SURVIVED", true);
        }

        // AI Movement
        if (ticks % 5 === 0 && Math.random() > 0.5) {
            aiPos++;
            if (aiPos > 5) {
                if (doors.l) { aiPos = 0; }
                else { gameOver("THEY GOT IN"); }
            }
            updateMonitor();
        }
    }, 1000);

    function toggleDoor(s, b) {
        doors[s] = !doors[s];
        document.getElementById('door-'+s).classList.toggle('closed');
        b.classList.toggle('active');
    }

    function setLight(on, side, b) {
        const fl = document.getElementById('flashlight');
        fl.style.display = on ? 'block' : 'none';
        fl.style.background = `radial-gradient(circle at ${side==='l'?'30%':'70%'}, rgba(255,255,230,0.2) 0%, transparent 50%)`;
        b.classList.toggle('active', on);
    }

    function toggleMonitor() {
        cam = !cam;
        document.getElementById('monitor').style.display = cam ? 'block' : 'none';
    }

    function updateMonitor() {
        const hint = document.getElementById('ai-hint');
        const img = document.getElementById('cam-img');
        if (aiPos > 3) {
            hint.innerText = "MOVEMENT DETECTED";
            img.style.opacity = "0.5";
        } else {
            hint.innerText = "SIGNAL STABLE";
            img.style.opacity = "0.2";
        }
    }

    function gameOver(msg, win = false) {
        clearInterval(mainLoop);
        document.body.innerHTML = `<div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; color:${win?'#0f0':'#f00'};"><h1>${msg}</h1><button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; padding:10px; cursor:pointer;">RESTART</button></div>`;
    }
</script>
</body>
</html>
