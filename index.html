<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Gun Runner</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #1a1a2e, #000); }

        /* HUD */
        .hud { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); z-index: 100; font-family: 'Orbitron'; border-bottom: 1px solid #333; }
        .stat b { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        /* Menu */
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(10px); }
        .shop-grid { display: grid; grid-template-columns: repeat(3, 250px); gap: 20px; }
        .shop-box { background: rgba(20,20,30,0.95); border: 1px solid var(--blue); padding: 15px; border-radius: 10px; text-align: center; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 5px; background: var(--blue); color: black; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; margin-top: 5px; }
        .btn:disabled { background: #444; color: #888; }

        /* Entities */
        #player { position: absolute; width: 50px; height: 50px; font-size: 40px; z-index: 60; display: flex; align-items: center; justify-content: center; }
        .monster { position: absolute; width: 80px; height: 80px; font-size: 60px; z-index: 40; filter: drop-shadow(0 0 15px red); }
        .bullet { position: absolute; background: white; border-radius: 50%; box-shadow: 0 0 10px var(--blue); z-index: 55; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="stat">GULD: <b id="money">0</b></div>
        <div class="stat">VÅBEN: <b id="gun-name">Ingen</b></div>
        <div class="stat">LIV: <b id="p-hp" style="color: #ff4757;">100</b></div>
    </div>

    <div id="player">👨</div>

    <div id="menu-overlay">
        <h1 style="font-family: 'Orbitron'; color: var(--gold); font-size: 2.5rem;">VÅBEN ARSENAL</h1>
        <div class="shop-grid">
            <!-- Våben -->
            <div class="shop-box">
                <h3 style="color:var(--pink)">VÅBEN</h3>
                <button class="btn" id="buy-pistol" onclick="buy('gun_pistol', 200)">PISTOL (200)</button>
                <button class="btn" id="buy-shotgun" onclick="buy('gun_shotgun', 1000)">SHOTGUN (1000)</button>
                <button class="btn" id="buy-mini" onclick="buy('gun_mini', 3000)">MINIGUN (3000)</button>
            </div>
            <!-- Upgrades -->
            <div class="shop-box">
                <h3 style="color:var(--pink)">UPGRADES</h3>
                <button class="btn" id="buy-dmg" onclick="buy('dmg', 150)">MERE SKADE (<span id="cost-dmg">150</span>)</button>
                <button class="btn" id="buy-speed" onclick="buy('speed', 400)">KUGLE FART (400)</button>
                <button class="btn" onclick="buy('heal', 100)">REPARER (100)</button>
            </div>
            <!-- Avatars -->
            <div class="shop-box">
                <h3 style="color:var(--pink)">AVATARS</h3>
                <button class="btn" id="btn-ninja" onclick="buyAvatar('ninja', 500, '🥷', 1.8)">NINJA (500)</button>
                <button class="btn" id="btn-king" onclick="buyAvatar('king', 5000, '👑', 1.3)">KING (5000)</button>
            </div>
        </div>
        <p style="margin-top:20px; color: var(--blue);">TRYK ESC FOR AT FORTSÆTTE | ENTER FOR AT SKYDE</p>
    </div>
</div>

<script>
    let money = 0, lvl = 1, pHP = 100, pMaxHP = 100, pDmg = 20, pSpeed = 7, gMult = 2;
    let bSpeed = 15, gunType = "none", isPaused = false, enterPressed = false;
    let px = window.innerWidth/2, py = window.innerHeight/2;
    let prices = { dmg: 150 };

    const keys = {}, monsters = [], pBullets = [];
    const container = document.getElementById('game-container');

    window.addEventListener('keydown', e => {
        if(e.code === 'Escape') toggleMenu();
        // ANTI-HOLD: Tjekker om Enter allerede er nede
        if(!isPaused && e.code === 'Enter' && !enterPressed) {
            fireGun();
            enterPressed = true;
        }
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => {
        if(e.code === 'Enter') enterPressed = false;
        keys[e.code] = false;
    });

    function toggleMenu() {
        isPaused = !isPaused;
        document.getElementById('menu-overlay').style.display = isPaused ? 'flex' : 'none';
        updateUI();
    }

    function fireGun() {
        if(gunType === "none" || monsters.length === 0) return;
        
        let target = monsters[0]; // Sigt efter det første monster
        let ang = Math.atan2(target.y - py, target.x - px);
        
        let shots = 1;
        let spread = 0;
        if(gunType === "shotgun") { shots = 5; spread = 0.4; }
        if(gunType === "minigun") { shots = 1; } // Minigun er hurtig men skyder stadig kun pr tryk her

        for(let i=0; i<shots; i++) {
            const bEl = document.createElement('div');
            bEl.className = 'bullet';
            bEl.style.width = '10px'; bEl.style.height = '10px';
            container.appendChild(bEl);
            let sAng = ang + (Math.random() * spread - spread/2);
            pBullets.push({
                el: bEl, x: px+20, y: py+20,
                vx: Math.cos(sAng) * bSpeed, vy: Math.sin(sAng) * bSpeed,
                damage: pDmg
            });
        }
    }

    function buy(type, cost) {
        let currentCost = (type === 'dmg') ? prices.dmg : cost;
        if(money >= currentCost) {
            money -= currentCost;
            if(type === 'gun_pistol') { gunType = "pistol"; document.getElementById('buy-pistol').disabled = true; }
            if(type === 'gun_shotgun') { gunType = "shotgun"; document.getElementById('buy-shotgun').disabled = true; }
            if(type === 'gun_mini') { gunType = "minigun"; document.getElementById('buy-mini').disabled = true; }
            if(type === 'dmg') { pDmg += 30; prices.dmg = Math.round(prices.dmg * 1.5); }
            if(type === 'speed') { bSpeed += 5; }
            if(type === 'heal') { pHP = pMaxHP; }
            updateUI();
        }
    }

    function buyAvatar(id, cost, icon, speed) {
        if(money >= cost) {
            money -= cost;
            document.getElementById('player').innerText = icon;
            pSpeed = 7 * speed;
            if(id === 'king') gMult = 15; // Mega rig mode
            document.getElementById('btn-' + id).disabled = true;
            updateUI();
        }
    }

    function spawnMonster() {
        const el = document.createElement('div');
        el.className = 'monster';
        el.innerText = '👹';
        container.appendChild(el);
        monsters.push({ el, x: Math.random()*window.innerWidth, y: -100, hp: 100 * Math.pow(1.3, lvl) });
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money);
        document.getElementById('p-hp').innerText = Math.floor(pHP);
        document.getElementById('gun-name').innerText = gunType.toUpperCase();
        document.getElementById('cost-dmg').innerText = prices.dmg;
        document.getElementById('buy-dmg').disabled = money < prices.dmg;
    }

    function loop() {
        if(!isPaused) {
            if(keys['ArrowUp']) py -= pSpeed;
            if(keys['ArrowDown']) py += pSpeed;
            if(keys['ArrowLeft']) px -= pSpeed;
            if(keys['ArrowRight']) px += pSpeed;

            document.getElementById('player').style.left = px + 'px';
            document.getElementById('player').style.top = py + 'px';

            if(monsters.length < 1) spawnMonster();

            monsters.forEach((m, mi) => {
                let dx = px - m.x, dy = py - m.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                m.x += (dx/dist) * (2 + lvl*0.2);
                m.y += (dy/dist) * (2 + lvl*0.2);
                m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
                if(dist < 50) pHP -= 0.5;
            });

            pBullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
                monsters.forEach((m, mi) => {
                    if(b.x > m.x && b.x < m.x+80 && b.y > m.y && b.y < m.y+80) {
                        m.hp -= b.damage;
                        b.el.remove(); pBullets.splice(bi, 1);
                        if(m.hp <= 0) {
                            m.el.remove(); monsters.splice(mi, 1);
                            money += 500 * lvl * gMult; lvl++; updateUI();
                        }
                    }
                });
            });
            if(pHP <= 0) location.reload();
        }
        requestAnimationFrame(loop);
    }
    updateUI();
    requestAnimationFrame(loop);
</script>
</body>
</html>
