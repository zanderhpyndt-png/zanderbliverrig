<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>JS:GO - Tactical Strike</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid #00ff00;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #hud {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-around;
            color: white; font-size: 24px; font-weight: bold; text-shadow: 2px 2px black;
        }
        #menu {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; cursor: pointer;
        }
        .stats { color: #ffcc00; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>STRIKE SOURCE: HTML</h1>
        <p>KLIK FOR AT STARTE MISSIONEN</p>
        <p style="font-size: 14px;">WASD = Flyt | Mus = Sigt | Venstreklik = Skyd</p>
    </div>

    <div id="crosshair"></div>
    <div id="hud">
        <div>HEALTH: <span id="hp" style="color: #0f0;">100</span></div>
        <div>KILLS: <span id="kills" class="stats">0</span></div>
        <div>AMMO: <span id="ammo">30</span>/90</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Himmel
        scene.fog = new THREE.Fog(0x87ceeb, 1, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const light = new THREE.HemisphereLight(0xeeeeff, 0x444422, 1);
        scene.add(light);

        // --- FLOOR & MAP ---
        const grid = new THREE.GridHelper(100, 50, 0x000000, 0x000000);
        scene.add(grid);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x777777}));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Walls (Banen)
        function addWall(x, z, w, d) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(w, 4, d), new THREE.MeshStandardMaterial({color: 0x444444}));
            wall.position.set(x, 2, z);
            scene.add(wall);
        }
        addWall(0, -20, 30, 1); // Lang væg
        addWall(15, -10, 1, 20); // Side væg
