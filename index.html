<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Horror Survival: Night Shift</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Kontoret */
        #office { width: 80%; height: 70%; border: 5px solid #333; background: #111; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #office-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        
        /* Skærm-overlay (Statisk støj) */
        #static { position: absolute; inset: 0; background: url('https://giphy.com'); opacity: 0.05; pointer-events: none; }

        /* Kamera-system */
        #camera-monitor { position: absolute; inset: 0; background: #000; display: none; flex-wrap: wrap; padding: 20px; z-index: 20; }
        .cam-view { width: 45%; height: 45%; border: 2px solid #0f0; margin: 5px; position: relative; background: #050505; color: #0f0; font-size: 12px; }
        .cam-label { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); }

        /* HUD */
        #hud { position: absolute; bottom: 20px; width: 80%; display: flex; justify-content: space-between; font-size: 20px; z-index: 30; }
        .btn { padding: 15px 30px; background: #222; border: 2px solid #0f0; color: #0f0; cursor: pointer; text-transform: uppercase; }
        .btn:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="office">
        <div id="static"></div>
        <div id="office-content" style="font-size: 40px;">DU ER PÅ KONTORET</div>
        
        <!-- Kamera skærm -->
        <div id="camera-monitor">
            <div class="cam-view"><span class="cam-label">CAM 01: INDGANG</span><div id="enemy-01"></div></div>
            <div class="cam-view"><span class="cam-label">CAM 02: KØKKEN</span></div>
            <div class="cam-view"><span class="cam-label">CAM 03: GANG</span></div>
            <div class="cam-view"><span class="cam-label">CAM 04: LAGER</span></div>
        </div>
    </div>

    <div id="hud">
        <div>STRØM: <span id="power">100</span>%</div>
        <button class="btn" onclick="toggleCams()">Overvågning</button>
        <div>KLOKKEN: <span id="time">12</span> AM</div>
    </div>
</div>

<script>
    let power = 100;
    let hour = 12;
    let camOpen = false;

    // Dræn strøm
    setInterval(() => {
        if (power > 0) {
            power -= camOpen ? 0.5 : 0.1;
            document.getElementById('power').innerText = Math.floor(power);
        } else {
            document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%;'>STRØMMEN GIK... DU TABTE!</h1>";
        }
    }, 1000);

    // Tid skifter
    setInterval(() => {
        hour = (hour === 12) ? 1 : hour + 1;
        document.getElementById('time').innerText = hour;
        if (hour === 6) alert("Du overlevede natten!");
    }, 60000); // 1 minut realtid = 1 time i spillet

    function toggleCams() {
        const monitor = document.getElementById('camera-monitor');
        camOpen = !camOpen;
        monitor.style.display = camOpen ? 'flex' : 'none';
    }

    // Tilfældig fjende-optræden på CAM 01
    setInterval(() => {
        const enemy = document.getElementById('enemy-01');
        if (Math.random() > 0.7) {
            enemy.innerHTML = "<h2 style='color:red; text-align:center;'>NOGEN ER HER!</h2>";
        } else {
            enemy.innerHTML = "";
        }
    }, 3000);
</script>

</body>
</html>
