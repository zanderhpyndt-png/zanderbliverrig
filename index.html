<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Bullet Hunter</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0; background: #050505; color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            user-select: none;
        }

        /* HUD */
        #hud {
            position: fixed; top: 0; width: 100%; padding: 15px;
            display: flex; justify-content: space-around;
            background: rgba(0,0,0,0.8); z-index: 100;
            border-bottom: 2px solid #444;
        }
        .stat b { color: #ffd700; font-family: 'Orbitron'; }

        /* Game Canvas Area */
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        /* Spilleren */
        #player {
            position: absolute; width: 40px; height: 40px;
            background: #00a8ff; border: 2px solid white;
            box-shadow: 0 0 15px #00a8ff; border-radius: 5px;
            z-index: 10; transition: transform 0.1s;
        }

        /* Monsteret */
        #monster {
            position: absolute; left: 50%; top: 40%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            background: #1a1a1a; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 0 40px #ff4757;
            display: flex; justify-content: center; align-items: center;
            cursor: crosshair; z-index: 5; transition: 0.2s;
        }
        #monster:active { scale: 0.95; }
        #monster::after { content: '👁️'; font-size: 40px; }

        /* Projektiler */
        .bullet {
            position: absolute; width: 12px; height: 12px;
            background: #ff4757; border-radius: 50%;
            box-shadow: 0 0 10px #ff4757; z-index: 8;
        }

        /* Shop */
        #shop {
            position: fixed; bottom: 0; width: 100%;
            padding: 15px; background: #111;
            display: flex; justify-content: center; gap: 20px;
        }
        .item { background: #222; padding: 10px; border-radius: 5px; border: 1px solid #d4af37; }
        button { cursor: pointer; background: #d4af37; border: none; padding: 5px 10px; font-weight: bold; }

        /* HP Bars */
        .hp-bar { width: 150px; height: 10px; background: #333; margin-top: 5px; }
        .hp-fill { height: 100%; background: #ff4757; width: 100%; }
        #p-hp-fill { background: #2ecc71; }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat">GULD: <b id="money">0</b></div>
    <div class="stat">LEVEL: <b id="lvl">1</b></div>
</div>

<div id="game-container">
    <div id="player"></div>
    
    <div id="monster" onclick="hitMonster()">
        <div style="position: absolute; top: -40px; text-align: center; width: 200px;">
            <div class="hp-bar" style="margin: 0 auto;"><div id="m-hp-fill" class="hp-fill"></div></div>
        </div>
    </div>
</div>

<div id="shop">
    <div class="item">⚔️ Skade: <span id="dmg-val">1</span> <button onclick="buy('dmg')">50 kr</button></div>
    <div class="item">🛡️ Liv: <span id="hp-val">100</span> <button onclick="buy('heal')">20 kr</button></div>
    <div style="color: #666; font-size: 0.8rem;">Brug PILTASTER til at gå!</div>
</div>

<script>
    let money = 0;
    let lvl = 1;
    let pHP = 100;
    let pMaxHP = 100;
    let pDmg = 1;

    // Spiller position
    let px = window.innerWidth / 2 - 20;
    let py = window.innerHeight - 150;
    const pSpeed = 7;
    const keys = {};

    // Monster stats
    let mHP = 20;
    let mMaxHP = 20;
    let bullets = [];

    const player = document.getElementById('player');
    const monster = document.getElementById('monster');

    // Kontrol
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function hitMonster() {
        mHP -= pDmg;
        money += pDmg;
        if(mHP <= 0) spawnNew();
        updateUI();
    }

    function spawnNew() {
        lvl++;
        money += 20;
        mMaxHP = Math.round(20 * Math.pow(1.2, lvl));
        mHP = mMaxHP;
        monster.style.background = `hsl(${Math.random() * 360}, 50%, 20%)`;
    }

    function buy(type) {
        if(type === 'dmg' && money >= 50) { money -= 50; pDmg++; }
        if(type === 'heal' && money >= 20) { money -= 20; pHP = pMaxHP; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('money').innerText = money;
        document.getElementById('lvl').innerText = lvl;
        document.getElementById('dmg-val').innerText = pDmg;
        document.getElementById('m-hp-fill').style.width = (mHP/mMaxHP*100) + "%";
        document.getElementById('p-hp-fill-ui'); // Not used, handled in loop
    }

    // Spil Loop
    function loop() {
        // Bevægelse
        if(keys['ArrowUp'] || keys['KeyW']) py -= pSpeed;
        if(keys['ArrowDown'] || keys['KeyS']) py += pSpeed;
        if(keys['ArrowLeft'] || keys['KeyA']) px -= pSpeed;
        if(keys['ArrowRight'] || keys['KeyD']) px += pSpeed;

        // Grænser
        px = Math.max(0, Math.min(window.innerWidth - 40, px));
        py = Math.max(0, Math.min(window.innerHeight - 100, py));
        
        player.style.left = px + 'px';
        player.style.top = py + 'px';

        // Monster skyder
        if(Math.random() < 0.03 + (lvl * 0.005)) {
            createBullet();
        }

        // Opdater projektiler
        bullets.forEach((b, index) => {
            b.x += b.vx;
            b.y += b.vy;
            b.el.style.left = b.x + 'px';
            b.el.style.top = b.y + 'px';

            // Collision check
            if(px < b.x + 12 && px + 40 > b.x && py < b.y + 12 && py + 40 > b.y) {
                pHP -= 5;
                b.el.remove();
                bullets.splice(index, 1);
                if(pHP <= 0) { alert("Game Over! Du nåede level " + lvl); location.reload(); }
            }

            // Fjern hvis ude af skærm
            if(b.y > window.innerHeight) {
                b.el.remove();
                bullets.splice(index, 1);
            }
        });

        requestAnimationFrame(loop);
    }

    function createBullet() {
        const el = document.createElement('div');
        el.className = 'bullet';
        const mRect = monster.getBoundingClientRect();
        let bx = mRect.left + mRect.width/2;
        let by = mRect.top + mRect.height/2;
        
        // Retning mod spiller
        const angle = Math.atan2(py - by, px - bx);
        const speed = 3 + (lvl * 0.2);
        
        bullets.push({
            el: el,
            x: bx,
            y: by,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed
        });
        document.getElementById('game-container').appendChild(el);
    }

    loop();
    updateUI();
</script>

</body>
</html>
