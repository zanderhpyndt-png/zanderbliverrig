<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZanderBliverRig</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    overflow: hidden;
    background: linear-gradient(270deg, #000000, #1a1a1a, #333333);
    background-size: 600% 600%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position:0%}
    50% {background-position:100%}
    100% {background-position:0%}
}

h1 {
    margin-top: 50px;
    font-size: 3em;
    text-shadow: 0 0 20px gold;
}

.counter, .moneyBox {
    margin-top: 20px;
    font-size: 1.5em;
    background: rgba(0,0,0,0.5);
    padding: 15px;
    border-radius: 15px;
    display: inline-block;
}

button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    background: gold;
    color: black;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px gold;
}

.money {
    position: fixed;
    top: -50px;
    font-size: 2em;
    animation: fall linear infinite;
}

@keyframes fall {
    to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<h1>💰 ZanderBliverRig 💰</h1>
<p>Start din rejse mod rigdom 🚀</p>

<div class="counter">
Besøgende: <span id="visitCount">0</span>
</div>

<br>

<div class="moneyBox">
Dine penge: <span id="money">0</span> kr
</div>

<br>

<button onclick="earnMoney()">Tjen penge 💸</button>

<script>
// Besøgstæller (lokal)
let visits = localStorage.getItem('visitCount');
visits = visits ? parseInt(visits) + 1 : 1;
localStorage.setItem('visitCount', visits);
document.getElementById('visitCount').innerText = visits;

// Penge system
let money = localStorage.getItem('money');
money = money ? parseInt(money) : 0;

function updateMoney() {
    document.getElementById('money').innerText = money;
}

function earnMoney() {
    let earned = Math.floor(Math.random() * 10) + 1;
    money += earned;
    localStorage.setItem('money', money);
    updateMoney();
}

// Auto penge (passiv indkomst 😏)
setInterval(() => {
    money += 1;
    localStorage.setItem('money', money);
    updateMoney();
}, 2000);

updateMoney();

// Money rain
function createMoney() {
    const el = document.createElement('div');
    el.classList.add('money');
    el.innerText = '💸';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 5000);
}

setInterval(createMoney, 300);
</script>

</body>
</html>
