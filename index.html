<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>JS:GO Elite - Next Gen</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #ui {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-around;
            color: #00ff00; font-size: 24px; pointer-events: none;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: #00ff00;
            border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 5px #00ff00;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color: #00ff00; letter-spacing: 5px;">TACTICAL ELITE</h1>
    <p>KLIK FOR AT DEPLOYE</p>
</div>

<div id="crosshair"></div>
<div id="ui">
    <div>HEALTH: 100</div>
    <div>KILLS: <span id="kills">0</span></div>
    <div>AMMO: <span id="ammo">30</span>/90</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // --- SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050508);
    scene.fog = new THREE.Fog(0x050508, 5, 45);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- LYS (Kritisk for detaljer) ---
    const ambient = new THREE.AmbientLight(0x4040ff, 0.2); // Blåligt nattelys
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 1.5);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);

    const muzzleFlash = new THREE.PointLight(0xffaa00, 0, 10);
    scene.add(muzzleFlash);

    // --- BANE-DETALJER ---
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.5 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Rustne vægge
    function createWall(x, z, w, h, d) {
        const wall = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 })
        );
        wall.position.set(x, h/2, z);
        wall.castShadow = true;
        wall.receiveShadow = true;
        scene.add(wall);
    }
    createWall(0, -10, 20, 5, 1);
    createWall(10, 0, 1, 5, 20);

    // --- VÅBEN (Guld Skin) ---
    const gunGroup = new THREE.Group();
    const gunGeo = new THREE.BoxGeometry(0.1, 0.2, 0.8);
    const gunMat = new THREE.MeshStandardMaterial({ 
        color: 0xffd700, // GULD
        metalness: 1, 
        roughness: 0.2 
    });
    const gun = new THREE.Mesh(gunGeo, gunMat);
    gunGroup.add(gun);
    scene.add(gunGroup);

    // --- FJENDER OG PARTIKLER ---
    const enemies = [];
    const particles = [];

    function createBlood(pos) {
        for(let i=0; i<10; i++) {
            const p = new THREE.Mesh(
                new THREE.SphereGeometry(0.05),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            p.position.copy(pos);
            p.userData.velocity = new THREE.Vector3(
                (Math.random()-0.5)*0.2, (Math.random())*0.2, (Math.random()-0.5)*0.2
            );
            scene.add(p);
            particles.push(p);
            setTimeout(() => { scene.remove(p); particles.shift(); }, 1000);
        }
    }

    function spawnBot() {
        const bot = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 1.8, 0.8),
            new THREE.MeshStandardMaterial({ color: 0x440000 })
        );
        bot.position.set(Math.random()*16-8, 0.9, -Math.random()*15-2);
        bot.castShadow = true;
        scene.add(bot);
        enemies.push(bot);
    }
    for(let i=0; i<5; i++) spawnBot();

    // --- KONTROL ---
    const controls = new PointerLockControls(camera, document.body);
    document.getElementById('overlay').onclick = () => controls.lock();
    controls.onLock = () => document.getElementById('overlay').style.display = 'none';

    let kills = 0, ammo = 30;
    const raycaster = new THREE.Raycaster();

    window.addEventListener('mousedown', () => {
        if(!controls.isLocked || ammo <= 0) return;
        ammo--;
        document.getElementById('ammo').innerText = ammo;

        // Muzzle Flash
        muzzleFlash.position.copy(camera.position);
        muzzleFlash.intensity = 50;
        setTimeout(() => muzzleFlash.intensity = 0, 50);

        // Skud-animation
        gun.position.z += 0.2;
        setTimeout(() => gun.position.z -= 0.2, 50);

        // Hit Detection
        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
        const hits = raycaster.intersectObjects(enemies);
        
        if(hits.length > 0) {
            const target = hits[0].object;
            createBlood(hits[0].point);
            target.position.y = -10; // "Dør"
            kills++;
            document.getElementById('kills').innerText = kills;
            setTimeout(() => target.position.y = 0.9, 2000);
        }
    });

    // --- ANIMATION LOOP ---
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if(controls.isLocked) {
            // Opdater våben position (Viewmodel)
            gunGroup.position.copy(camera.position);
            gunGroup.rotation.copy(camera.rotation);
            gunGroup.updateMatrix();
            gunGroup.translateZ(-0.6);
            gunGroup.translateX(0.3);
            gunGroup.translateY(-0.3);

            // Flyt partikler (blod)
            particles.forEach(p => {
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= 0.01; // Tyngdekraft
            });
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
