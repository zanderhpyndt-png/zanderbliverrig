<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>CS:GO Arcade</title>
    <style>
        body {
            margin: 0; background: #1a1a1a; color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center;
            user-select: none; overflow: hidden;
        }

        #game-viewport {
            position: relative; width: 900px; height: 600px;
            background: url('https://e0.pxfuel.com/wallpapers/152/491/desktop-wallpaper-counter-strike-global-offensive-dust-2-background-cs-go-dust-2.jpg');
            background-size: cover; border: 5px solid #333;
            cursor: crosshair; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Rekyl-effekt */
        .recoil { animation: shake 0.1s; }
        @keyframes shake {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px) rotate(1deg); }
            100% { transform: translateY(0); }
        }

        .terrorist {
            position: absolute; width: 70px; height: 100px;
            background: url('https://www.pngarts.com/files/3/Counter-Strike-PNG-Image-Transparent-Background.png');
            background-size: contain; background-repeat: no-repeat;
            transition: top 0.5s, left 0.5s;
        }

        .blood {
            position: absolute; width: 40px; height: 40px;
            background: radial-gradient(circle, rgba(255,0,0,1) 0%, rgba(139,0,0,0) 70%);
            pointer-events: none; animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: scale(2); } }

        #hud {
            display: flex; justify-content: space-between;
            width: 900px; padding: 10px; font-size: 30px;
            text-shadow: 2px 2px black;
        }
    </style>
</head>
<body onclick="shoot(event)">

    <h1>DUST 2 - REFLEX TRAINER</h1>
    
    <div id="hud">
        <div>KILLS: <span id="score">0</span></div>
        <div style="color: #ff4500;">TIME: <span id="timer">30</span>s</div>
    </div>

    <div id="game-viewport" id="viewport">
        </div>

    <script>
        const viewport = document.getElementById('game-viewport');
        const scoreDoc = document.getElementById('score');
        const timerDoc = document.getElementById('timer');
        
        let score = 0;
        let timeLeft = 30;
        let gameActive = true;

        // Nedtælling
        const countdown = setInterval(() => {
            timeLeft--;
            timerDoc.innerText = timeLeft;
            if(timeLeft <= 0) {
                gameActive = false;
                clearInterval(countdown);
                alert("GAME OVER! Din score: " + score);
                location.reload();
            }
        }, 1000);

        function spawnEnemy() {
            if(!gameActive) return;

            const enemy = document.createElement('div');
            enemy.classList.add('terrorist');
            
            // Tilfældig startposition
            enemy.style.left = Math.random() * 800 + "px";
            enemy.style.top = Math.random() * 450 + "px";

            // Gør dem "levende" - de flytter sig hvert sekund
            const movement = setInterval(() => {
                enemy.style.left = Math.random() * 800 + "px";
                enemy.style.top = Math.random() * 450 + "px";
            }, 1000);

            enemy.onclick = (e) => {
                e.stopPropagation();
                score++;
                scoreDoc.innerText = score;
                
                // Blod-effekt
                spawnBlood(e.pageX, e.pageY);
                
                clearInterval(movement);
                enemy.remove();
                spawnEnemy(); // Spawn en ny med det samme
            };

            viewport.appendChild(enemy);
        }

        function spawnBlood(x, y) {
            const blood = document.createElement('div');
            blood.classList.add('blood');
            blood.style.left = (x - viewport.offsetLeft - 20) + 'px';
            blood.style.top = (y - viewport.offsetTop - 20) + 'px';
            viewport.appendChild(blood);
            setTimeout(() => blood.remove(), 500);
        }

        function shoot(e) {
            if(!gameActive) return;
            
            // Rekyl-animation på hele banen
            viewport.classList.remove('recoil');
            void viewport.offsetWidth; // Trigger reflow
            viewport.classList.add('recoil');

            // Her kan du tilføje en lyd hvis du vil:
            // new Audio('https://www.soundjay.com/mechanical/gun-shot-01.mp3').play();
        }

        // Start med 4 fjender
        for(let i = 0; i < 4; i++) spawnEnemy();

    </script>
</body>
</html>
