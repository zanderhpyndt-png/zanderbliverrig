<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <title>Nightwatch: Bright Edition</title>
    <style>
        :root { 
            /* Lysere neon-farver */
            --terminal: #33ff33; 
            --warn: #ffdb4d; 
            --crit: #ff6666;
            /* Lysere baggrundspaneler */
            --panel-bg: #2a2a2a;
            --office-bg: #1a1a1a;
        }

        body { 
            margin: 0; 
            background: #151515; /* Lysere grundbase */
            color: var(--terminal); 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            user-select: none;
        }

        /* 📺 Svagere scanlines for bedre læsbarhed */
        body::before {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(255, 255, 255, 0.02) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 2000; background-size: 100% 4px; pointer-events: none;
        }

        /* 🔦 Mere oplyst kontor */
        #viewport { position: relative; width: 100vw; height: 100vh; overflow: hidden; perspective: 1000px; }
        
        #office { 
            position: absolute; width: 200vw; height: 100vh; left: -50vw; 
            background: var(--office-bg);
            background-image: 
                radial-gradient(circle at 50% 50%, #333 0%, #1a1a1a 70%),
                repeating-linear-gradient(90deg, #222 0, #222 2px, transparent 2px, transparent 15vw);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s ease-out;
        }

        /* 🚪 Dørsystemer med tydeligere kanter */
        .door-bay { 
            position: absolute; bottom: 0; width: 22vw; height: 85vh; 
            background: #111; 
            border: 12px solid #333;
            box-shadow: inset 0 0 100px rgba(51, 255, 51, 0.05), 0 0 40px rgba(0,0,0,0.5);
        }
        #bay-l { left: 15vw; border-right: 20px solid #444; } 
        #bay-r { right: 15vw; border-left: 20px solid #444; }

        .door-slab { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(to bottom, #444, #222);
            border-bottom: 5px solid var(--terminal);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* Status Paneler */
        .ui-panel {
            position: absolute;
            bottom: 20px;
            padding: 15px;
            background: var(--panel-bg);
            border: 2px solid var(--terminal);
            box-shadow: 0 0 15px rgba(26, 255, 26, 0.3);
        }
    </style>
</head>
<body>
    <div id="viewport">
        <div id="office">
            <div id="bay-l" class="door-bay">
                <div id="door-l" class="door-slab"></div>
            </div>
            
            <div id="bay-r" class="door-bay">
                <div id="door-r" class="door-slab"></div>
            </div>
        </div>
    </div>

    <div class="ui-panel" style="left: 20px;">
        STATUS: SYSTEM ONLINE<br>
        POWER: 100%
    </div>

    <script>
        // Simpelt kig-omkring parallax
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            document.getElementById('office').style.transform = `translateX(${-x}px)`;
        });
    </script>
</body>
</html>
