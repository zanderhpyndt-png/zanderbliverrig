<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Dimension 3</title>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }

        /* HUD */
        #ui {
            position: fixed; top: 20px; width: 100%;
            display: flex; justify-content: space-around;
            color: #00f2ff; pointer-events: none; z-index: 10;
        }
        .stat b { color: gold; font-size: 1.5rem; }

        /* Shop / Menu */
        #shop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; color: white;
        }
        .btn {
            background: #00f2ff; color: black; border: none; padding: 15px 30px;
            margin: 10px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold;
            border-radius: 5px; width: 250px;
        }
        .btn:disabled { background: #333; color: #666; }

        #crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid rgba(0, 242, 255, 0.5);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">GULD: <b id="money">0</b></div>
    <div class="stat">SEKTOR: <b id="lvl">1</b></div>
    <div class="stat">HP: <b id="hp" style="color: #ff4d4d;">100</b></div>
</div>

<div id="crosshair"></div>

<div id="shop">
    <h1 style="color: gold;">PAUSED - UPGRADES</h1>
    <button class="btn" id="buy-dmg" onclick="buy('dmg')">SKADE: 200 KR</button>
    <button class="btn" id="buy-hp" onclick="buy('hp')">MAX HP: 300 KR</button>
    <button class="btn" style="background: white;" onclick="toggleShop()">FORTSÆT (ESC)</button>
</div>

<script>
    let scene, camera, renderer, player, playerModel;
    let money = 0, lvl = 1, hp = 100, dmg = 50, isPaused = false;
    let monsters = [], bullets = [];
    const keys = {};

    init();
    animate();

    function init() {
        // 1. Scene & Camera
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.05);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 15);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lights
        const light = new THREE.PointLight(0x00f2ff, 2, 50);
        light.position.set(0, 10, 0);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 3. Floor
        const grid = new THREE.GridHelper(200, 50, 0x00f2ff, 0x222222);
        scene.add(grid);

        // 4. Detaljeret Player Model (Agent Zander)
        player = new THREE.Group();
        
        const bodyGeo = new THREE.BoxGeometry(1, 1.5, 0.5);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        player.add(body);

        const headGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const headMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.1;
        player.add(head);

        const visorGeo = new THREE.BoxGeometry(0.65, 0.15, 0.4);
        const visorMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
        const visor = new THREE.Mesh(visorGeo, visorMat);
        visor.position.set(0, 1.1, 0.15);
        player.add(visor);

        scene.add(player);

        // Controls
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Escape') toggleShop();
            if(e.code === 'Enter' && !isPaused) fire();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
    }

    function toggleShop() {
        isPaused = !isPaused;
        document.getElementById('shop').style.display = isPaused ? 'flex' : 'none';
    }

    function spawnMonster() {
        const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const mat = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x330000 });
        const m = new THREE.Mesh(geo, mat);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 30 + Math.random() * 10;
        m.position.set(Math.cos(angle) * dist, 0.75, Math.sin(angle) * dist);
        
        m.hp = 100 * lvl;
        scene.add(m);
        monsters.push(m);
    }

    function fire() {
        if (monsters.length === 0) return;
        
        const bGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const bMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });
        const b = new THREE.Mesh(bGeo, bMat);
        b.position.copy(player.position);
        b.position.y = 1;

        // Auto aim find tætteste
        let target = monsters[0];
        let minDist = player.position.distanceTo(target.position);
        monsters.forEach(m => {
            let d = player.position.distanceTo(m.position);
            if(d < minDist) { minDist = d; target = m; }
        });

        const dir = new THREE.Vector3().subVectors(target.position, player.position).normalize();
        b.velocity = dir.multiplyScalar(0.8);
        
        // Roter spiller mod monster
        player.lookAt(target.position.x, 0, target.position.z);

        scene.add(b);
        bullets.push(b);
    }

    function buy(type) {
        if(type === 'dmg' && money >= 200) { money -= 200; dmg += 50; }
        if(type === 'hp' && money >= 300) { money -= 300; hp = 100; }
        updateUI();
    }

    function updateUI() {
        document.getElementById('money').innerText = money;
        document.getElementById('lvl').innerText = lvl;
        document.getElementById('hp').innerText = Math.floor(hp);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (isPaused) return;

        // Player Move
        const speed = 0.2;
        if(keys['ArrowUp'] || keys['KeyW']) player.position.z -= speed;
        if(keys['ArrowDown'] || keys['KeyS']) player.position.z += speed;
        if(keys['ArrowLeft'] || keys['KeyA']) player.position.x -= speed;
        if(keys['ArrowRight'] || keys['KeyD']) player.position.x += speed;

        camera.position.x = player.position.x;
        camera.position.z = player.position.z + 15;
        camera.lookAt(player.position);

        // Monster Logic
        if(monsters.length < 1 + (lvl/2)) spawnMonster();

        monsters.forEach((m, index) => {
            const dir = new THREE.Vector3().subVectors(player.position, m.position).normalize();
            m.position.add(dir.multiplyScalar(0.05 + (lvl * 0.005)));
            
            if(player.position.distanceTo(m.position) < 1.5) {
                hp -= 0.2;
                updateUI();
                if(hp <= 0) location.reload();
            }
        });

        // Bullet Logic
        bullets.forEach((b, bIdx) => {
            b.position.add(b.velocity);
            if(b.position.length() > 100) {
                scene.remove(b);
                bullets.splice(bIdx, 1);
            }

            monsters.forEach((m, mIdx) => {
                if(b.position.distanceTo(m.position) < 1.5) {
                    m.hp -= dmg;
                    scene.remove(b);
                    bullets.splice(bIdx, 1);
                    if(m.hp <= 0) {
                        money += 100;
                        lvl++;
                        scene.remove(m);
                        monsters.splice(mIdx, 1);
                        updateUI();
                    }
                }
            });
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
