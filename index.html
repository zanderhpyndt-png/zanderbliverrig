<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: The Final Mission</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --pink: #ff00ff; --gold: #ffd700; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; user-select: none; }
        
        /* HUD */
        .hud { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.85); z-index: 100; font-family: 'Orbitron'; border-bottom: 2px solid var(--blue); }
        .stat b { color: var(--blue); text-shadow: 0 0 10px var(--blue); }

        /* Slutskærm */
        #end-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #000); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        #end-screen h1 { font-family: 'Orbitron'; font-size: 4rem; color: var(--gold); margin: 0; }

        /* Menu */
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(8px); }
        .shop-grid { display: grid; grid-template-columns: repeat(2, 300px); gap: 20px; }
        .shop-box { background: rgba(20,20,35,0.9); border: 1px solid var(--blue); padding: 20px; border-radius: 15px; text-align: center; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--blue); color: black; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; margin-top: 10px; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: white; transform: scale(1.05); }
        .btn:disabled { background: #333; color: #666; cursor: default; }

        /* Entities */
        #player { position: absolute; width: 50px; height: 50px; font-size: 45px; z-index: 60; display: flex; align-items: center; justify-content: center; }
        .monster { position: absolute; width: 90px; height: 90px; font-size: 70px; z-index: 40; filter: drop-shadow(0 0 20px rgba(255,0,0,0.5)); transition: transform 0.1s; }
        .bullet { position: absolute; background: var(--blue); border-radius: 50%; box-shadow: 0 0 12px var(--blue); z-index: 55; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #0f0f1a, #000); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="stat">GULD: <b id="money">0</b></div>
        <div class="stat">SEKTOR: <b id="lvl-display">1 / 25</b></div>
        <div class="stat">LIV: <b id="p-hp" style="color: #ff4757;">100</b></div>
    </div>

    <div id="player">👨</div>

    <!-- Menu -->
    <div id="menu-overlay">
        <h1 style="font-family: 'Orbitron'; color: var(--gold); font-size: 2.5rem; margin-bottom: 20px;">FORSYNINGER</h1>
        <div class="shop-grid">
            <div class="shop-box">
                <h3 style="color:var(--pink)">VÅBEN OPGRADERING</h3>
                <button class="btn" id="buy-dmg" onclick="buy('dmg')">MERE SKADE [<span id="cost-dmg">150</span>]</button>
                <button class="btn" id="buy-shotgun" onclick="buy('gun_shotgun', 1500)">SHOTGUN (1500)</button>
                <button class="btn" id="buy-mini" onclick="buy('gun_mini', 5000)">MINIGUN (5000)</button>
            </div>
            <div class="shop-box">
                <h3 style="color:var(--pink)">ZANDER STATS</h3>
                <button class="btn" id="buy-speed" onclick="buy('speed', 500)">BEVÆGELSE (500)</button>
                <button class="btn" onclick="buy('heal', 100)">REPARER (100)</button>
                <button class="btn" id="btn-king" onclick="buyAvatar('king', 3000, '👑', 10)">KONGELIG BONUS (3000)</button>
            </div>
        </div>
        <p style="margin-top:30px; color: var(--blue); letter-spacing: 2px;">TRYK [ESC] FOR AT FORTSÆTTE</p>
    </div>

    <!-- Slutskærm -->
    <div id="end-screen">
        <p style="font-size: 1.5rem; letter-spacing: 5px;">MISSION FULDFØRT</p>
        <h1>ZANDER ER KONGE</h1>
        <p style="margin-top: 20px; color: #888;">Du har renset alle 25 sektorer og sikret fremtiden.</p>
        <button class="btn" style="width: 250px; background: var(--gold);" onclick="location.reload()">SPIL IGEN</button>
    </div>
</div>

<script>
    let money = 0, lvl = 1, pHP = 100, pMaxHP = 100, pDmg = 35, pSpeed = 7, gMult = 2;
    let gunType = "pistol", isPaused = false, enterPressed = false;
    let px = window.innerWidth/2, py = window.innerHeight/2;
    let prices = { dmg: 150, speed: 500 };

    const keys = {}, monsters = [], pBullets = [];
    const container = document.getElementById('game-container');

    window.addEventListener('keydown', e => {
        if(e.code === 'Escape') toggleMenu();
        if(!isPaused && e.code === 'Enter' && !enterPressed) {
            fireGun();
            enterPressed = true;
        }
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => {
        if(e.code === 'Enter') enterPressed = false;
        keys[e.code] = false;
    });

    function toggleMenu() {
        if(lvl > 25) return;
        isPaused = !isPaused;
        document.getElementById('menu-overlay').style.display = isPaused ? 'flex' : 'none';
        updateUI();
    }

    function fireGun() {
        if(monsters.length === 0) return;
        let target = monsters[0];
        let ang = Math.atan2(target.y - py, target.x - px);
        let shots = (gunType === "shotgun") ? 5 : 1;
        let spread = (gunType === "shotgun") ? 0.5 : 0;

        for(let i=0; i<shots; i++) {
            const bEl = document.createElement('div');
            bEl.className = 'bullet';
            bEl.style.width = '12px'; bEl.style.height = '12px';
            container.appendChild(bEl);
            let sAng = ang + (Math.random() * spread - spread/2);
            pBullets.push({
                el: bEl, x: px+25, y: py+25,
                vx: Math.cos(sAng) * 18, vy: Math.sin(sAng) * 18,
                damage: pDmg
            });
        }
    }

    function buy(type, cost) {
        let currentCost = (prices[type]) ? prices[type] : cost;
        if(money >= currentCost) {
            money -= currentCost;
            if(type === 'gun_shotgun') { gunType = "shotgun"; document.getElementById('buy-shotgun').disabled = true; }
            if(type === 'gun_mini') { gunType = "minigun"; pDmg += 50; document.getElementById('buy-mini').disabled = true; }
            if(type === 'dmg') { pDmg += 40; prices.dmg = Math.round(prices.dmg * 1.6); }
            if(type === 'speed') { pSpeed += 2; prices.speed = Math.round(prices.speed * 2); }
            if(type === 'heal') { pHP = pMaxHP; }
            updateUI();
        }
    }

    function buyAvatar(id, cost, icon, mult) {
        if(money >= cost) {
            money -= cost;
            document.getElementById('player').innerText = icon;
            gMult = mult;
            document.getElementById('btn-king').disabled = true;
            updateUI();
        }
    }

    function spawnMonster() {
        if(lvl > 25) return;
        const el = document.createElement('div');
        el.className = 'monster';
        el.innerText = ['👾', '👹', '👽', '🧛'][Math.floor(Math.random()*4)];
        container.appendChild(el);
        monsters.push({ el, x: Math.random()*window.innerWidth, y: -100, hp: 100 * Math.pow(1.3, lvl) });
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money);
        document.getElementById('p-hp').innerText = Math.floor(pHP);
        document.getElementById('lvl-display').innerText = lvl + " / 25";
        document.getElementById('cost-dmg').innerText = prices.dmg;
        document.getElementById('buy-dmg').disabled = money < prices.dmg;
        document.getElementById('buy-speed').disabled = money < prices.speed;
    }

    function loop() {
        if(!isPaused && lvl <= 25) {
            if(keys['ArrowUp']) py -= pSpeed;
            if(keys['ArrowDown']) py += pSpeed;
            if(keys['ArrowLeft']) px -= pSpeed;
            if(keys['ArrowRight']) px += pSpeed;

            document.getElementById('player').style.left = px + 'px';
            document.getElementById('player').style.top = py + 'px';

            if(monsters.length < 1) spawnMonster();

            monsters.forEach((m, mi) => {
                let dx = px - m.x, dy = py - m.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                m.x += (dx/dist) * (2 + lvl*0.15);
                m.y += (dy/dist) * (2 + lvl*0.15);
                m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
                if(dist < 50) pHP -= 0.6;
            });

            pBullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
                monsters.forEach((m, mi) => {
                    if(b.x > m.x && b.x < m.x+90 && b.y > m.y && b.y < m.y+90) {
                        m.hp -= b.damage;
                        b.el.remove(); pBullets.splice(bi, 1);
                        if(m.hp <= 0) {
                            m.el.remove(); monsters.splice(mi, 1);
                            money += 400 * lvl * gMult; 
                            lvl++;
                            if(lvl > 25) { document.getElementById('end-screen').style.display = 'flex'; }
                            updateUI();
                        }
                    }
                });
            });
            if(pHP <= 0) { alert("MISSION FEJLEDE! Prøv igen."); location.reload(); }
        }
        requestAnimationFrame(loop);
    }
    updateUI();
    requestAnimationFrame(loop);
</script>
</body>
</html>
