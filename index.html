<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <title>Nightwatch Horror</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            overflow: hidden; 
            user-select: none; 
        }

        /* Panorering af kontoret */
        #game-view { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
        }

        #office { 
            position: absolute; 
            width: 150vw; 
            height: 100vh; 
            left: -25vw; 
            background: linear-gradient(90deg, #050505 0%, #1a1a1a 50%, #050505 100%); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.1s ease-out; 
        }

        /* Døre */
        .door { 
            position: absolute; 
            width: 15vw; 
            height: 80vh; 
            background: #222; 
            bottom: 0; 
            border: 4px solid #111; 
            transition: 0.5s ease-in-out; 
            z-index: 5; 
        }

        #door-left { left: 15vw; }
        #door-right { right: 15vw; }

        .door.closed { transform: translateY(0); background: #333; }
        .door.open { transform: translateY(-100%); }

        /* Lys og knapper */
        .btn-panel {
            position: absolute;
            bottom: 30%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        #panel-l { left: 5vw; }
        #panel-r { right: 5vw; }

        .btn {
            width: 50px;
            height: 50px;
            background: #444;
            border: 3px solid #666;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn-door.active { background: #f00; }
        .btn-light.active { background: #ff0; box-shadow: 0 0 20px #ff0; }

        /* Monitor / Kamera */
        #monitor-toggle { 
            position: absolute; 
            bottom: 0; 
            left: 35%; 
            width: 30%; 
            height: 40px; 
            background: rgba(50, 50, 50, 0.8); 
            border: 2px solid #444; 
            text-align: center; 
            color: white;
            line-height: 40px; 
            cursor: pointer; 
            z-index: 50; 
            border-radius: 10px 10px 0 0; 
        }

        #camera-screen { 
            position: absolute; 
            inset: 0; 
            background: #111; 
            display: none; 
            z-index: 100; 
            border: 20px solid #333;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .static {
            position: absolute;
            inset: 0;
            background: url('https://giphy.com');
            opacity: 0.1;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-view">
    <div id="office">
        <!-- Venstre dør og knapper -->
        <div id="panel-l" class="btn-panel">
            <div class="btn btn-door" onclick="toggleDoor('door-left', this)"></div>
            <div class="btn btn-light" onmousedown="toggleLight(true)" onmouseup="toggleLight(false)"></div>
        </div>
        <div id="door-left" class="door open"></div>

        <!-- Højre dør og knapper -->
        <div id="door-right" class="door open"></div>
        <div id="panel-r" class="btn-panel">
            <div class="btn btn-door" onclick="toggleDoor('door-right', this)"></div>
            <div class="btn btn-light" onmousedown="toggleLight(true)" onmouseup="toggleLight(false)"></div>
        </div>
    </div>

    <div id="monitor-toggle" onclick="toggleCameras()">OVERVÅGNING</div>

    <div id="camera-screen">
        <div class="static"></div>
        <h1>CAM 01 - INDGANG</h1>
        <button onclick="toggleCameras()" style="z-index: 101;">LUK KAMERA</button>
    </div>
</div>

<script>
    const office = document.getElementById('office');
    const camScreen = document.getElementById('camera-screen');

    // 1. Panorering med musen
    document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const move = (x - 0.5) * 50; // Flytter kontoret baseret på musens position
        office.style.transform = `translateX(${-move}vw)`;
    });

    // 2. Dør-logik
    function toggleDoor(id, btn) {
        const door = document.getElementById(id);
        door.classList.toggle('open');
        door.classList.toggle('closed');
        btn.classList.toggle('active');
    }

    // 3. Lys-logik
    function toggleLight(on) {
        office.style.background = on ? 
            'linear-gradient(90deg, #1a1a1a 0%, #444 50%, #1a1a1a 100%)' : 
            'linear-gradient(90deg, #050505 0%, #1a1a1a 50%, #050505 100%)';
    }

    // 4. Kamera-logik
    function toggleCameras() {
        if (camScreen.style.display === 'flex') {
            camScreen.style.display = 'none';
        } else {
            camScreen.style.display = 'flex';
        }
    }
</script>

</body>
</html>
