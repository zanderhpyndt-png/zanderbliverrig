<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Monster Slayer Pro</title>
    <style>
        :root {
            --gold: #ffd700;
            --blood: #8e0000;
            --hp-green: #2ecc71;
        }

        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            display: flex;
            justify-content: space-around;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .stat { text-align: center; }
        .stat b { display: block; font-size: 1.5rem; color: var(--gold); }

        /* Game Arena */
        #arena {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: radial-gradient(circle, #111 0%, #000 100%);
            cursor: crosshair;
        }

        /* Det "Realistiske" Monster */
        .monster {
            position: absolute;
            width: 120px;
            height: 120px;
            background: #2c3e50;
            border-radius: 20% 70% 30% 50%; /* Organisk form */
            box-shadow: inset -10px -10px 20px #000, 0 0 30px rgba(255,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s, background 0.3s;
            animation: breathe 2s infinite ease-in-out;
        }

        .monster::before { /* Øje */
            content: '';
            width: 40px; height: 10px;
            background: red;
            box-shadow: 0 0 15px red;
            border-radius: 50%;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(5deg); }
        }

        /* HP Bar over monster */
        .m-hp-wrap {
            position: absolute;
            top: -25px;
            width: 100%;
            height: 8px;
            background: #000;
            border: 1px solid #444;
        }
        .m-hp-fill { height: 100%; background: var(--blood); transition: width 0.1s; }

        /* UI elements */
        #shop {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .btn {
            background: #222;
            border: 1px solid var(--gold);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover { background: var(--gold); color: black; }

        /* Effects */
        .blood {
            position: absolute;
            width: 10px; height: 10px;
            background: var(--blood);
            border-radius: 50%;
            pointer-events: none;
            animation: explode 0.5s forwards;
        }

        @keyframes explode {
            to { transform: translate(var(--x), var(--y)); opacity: 0; }
        }

        .p-hp-bar {
            position: fixed;
            left: 20px; top: 100px;
            width: 200px; height: 20px;
            background: #222;
            border: 2px solid white;
        }
        #p-fill { height: 100%; background: var(--hp-green); width: 100%; }

    </style>
</head>
<body>

<div id="hud">
    <div class="stat">PENGE<b id="money">0</b></div>
    <div class="stat">LEVEL<b id="lvl">1</b></div>
</div>

<div class="p-hp-bar"><div id="p-fill"></div><small style="position:absolute; top:2px; left:5px">DIT LIV</small></div>

<div id="arena" onclick="missedClick(event)">
    <div id="monster" class="monster" onclick="hitMonster(event)">
        <div class="m-hp-wrap"><div id="m-fill" class="m-hp-fill"></div></div>
    </div>
</div>

<div id="shop">
    <button class="btn" onclick="buy('dmg')">SKADE (50 kr)</button>
    <button class="btn" onclick="buy('heal')">HEAL (25 kr)</button>
</div>

<script>
    let money = 0;
    let lvl = 1;
    let pHP = 100;
    let pDmg = 1;

    let mMaxHP = 10;
    let mHP = 10;
    let mDmg = 5;

    const monsterEl = document.getElementById('monster');
    const arena = document.getElementById('arena');

    function hitMonster(e) {
        e.stopPropagation(); // Undgå at ramme arenaen også
        mHP -= pDmg;
        money += pDmg;
        
        // Spawn blod
        for(let i=0; i<5; i++) spawnBlood(e.clientX, e.clientY);
        
        if (mHP <= 0) {
            killMonster();
        } else {
            moveMonster(); // Flyt sig ved hver hit for at gøre det svært
        }
        updateUI();
    }

    function killMonster() {
        lvl++;
        money += lvl * 5;
        mMaxHP = Math.round(10 * Math.pow(1.2, lvl));
        mHP = mMaxHP;
        mDmg = Math.round(5 * Math.pow(1.1, lvl));
        
        // Gør det større
        let newSize = 100 + (lvl * 2);
        monsterEl.style.width = newSize + "px";
        monsterEl.style.height = newSize + "px";
        
        moveMonster();
    }

    function moveMonster() {
        const maxX = window.innerWidth - 150;
        const maxY = window.innerHeight - 250;
        const minX = 50;
        const minY = 150;

        const randomX = Math.floor(Math.random() * (maxX - minX)) + minX;
        const randomY = Math.floor(Math.random() * (maxY - minY)) + minY;

        monsterEl.style.left = randomX + "px";
        monsterEl.style.top = randomY + "px";
        
        // Farve skifter baseret på HP
        let hpPercent = (mHP / mMaxHP) * 100;
        monsterEl.style.background = `rgb(${255 - hpPercent}, 60, 80)`;
    }

    function monsterAttack() {
        pHP -= mDmg;
        document.body.style.boxShadow = "inset 0 0 50px red";
        setTimeout(() => document.body.style.boxShadow = "none", 150);

        if (pHP <= 0) {
            alert("Du blev slagtet! Level reset.");
            pHP = 100;
            lvl = Math.max(1, lvl - 2);
            killMonster();
        }
        updateUI();
    }

    function spawnBlood(x, y) {
        const b = document.createElement('div');
        b.className = 'blood';
        b.style.left = x + 'px';
        b.style.top = y + 'px';
        b.style.setProperty('--x', (Math.random() * 100 - 50) + 'px');
        b.style.setProperty('--y', (Math.random() * 100 - 50) + 'px');
        document.body.appendChild(b);
        setTimeout(() => b.remove(), 500);
    }

    function buy(type) {
        if (type === 'dmg' && money >= 50) {
            money -= 50; pDmg += 2;
        } else if (type === 'heal' && money >= 25) {
            money -= 25; pHP = 100;
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('money').innerText = money;
        document.getElementById('lvl').innerText = lvl;
        document.getElementById('m-fill').style.width = (mHP / mMaxHP * 100) + "%";
        document.getElementById('p-fill').style.width = pHP + "%";
    }

    function missedClick(e) {
        // Hvis man misser monstret
    }

    // Monsteret angriber langsommere i starten
    setInterval(() => {
        monsterAttack();
    }, 3000);

    // Start position
    moveMonster();
    updateUI();

</script>

</body>
</html>
