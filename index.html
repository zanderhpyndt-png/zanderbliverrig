<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Minecraft 2D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#87ceeb;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    left:10px;
    top:10px;
    background:rgba(255,255,255,.85);
    padding:10px;
    border-radius:8px;
    font-family:Arial,sans-serif;
}
</style>
</head>
<body>

<div id="ui">
WASD = Bevægelse<br>
Venstre klik = Bryd blok<br>
Højre klik = Placer blok<br>
Lilla portal = Nether<br>
Sort portal = End
</div>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const TILE = 32;
const WORLD_W = 120;
const WORLD_H = 40;

let dimension = "overworld";

const world = [];

function generateOverworld(){

    for(let y=0;y<WORLD_H;y++){

        world[y] = [];

        for(let x=0;x<WORLD_W;x++){

            if(y > 15)
                world[y][x] = "dirt";

            else if(y === 15)
                world[y][x] = "grass";

            else
                world[y][x] = "air";
        }
    }

    world[14][20] = "portal";
    world[14][50] = "endportal";
}

generateOverworld();

const player = {
    x:200,
    y:100,
    w:24,
    h:40,
    vx:0,
    vy:0,
    speed:4,
    jump:-12,
    onGround:false
};

const dragon = {
    active:false,
    x:800,
    y:200,
    w:140,
    h:70,
    hp:200
};

const camera = {
    x:0,
    y:0
};

const keys = {};

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("contextmenu",e=>{
    e.preventDefault();
});

canvas.addEventListener("mousedown",e=>{

    const wx = Math.floor((e.clientX + camera.x)/TILE);
    const wy = Math.floor((e.clientY + camera.y)/TILE);

    if(
        wx >= 0 &&
        wy >= 0 &&
        wx < WORLD_W &&
        wy < WORLD_H
    ){

        if(e.button === 0){

            if(dragon.active){

                const mx = e.clientX + camera.x;
                const my = e.clientY + camera.y;

                if(
                    mx > dragon.x &&
                    mx < dragon.x + dragon.w &&
                    my > dragon.y &&
                    my < dragon.y + dragon.h
                ){
                    dragon.hp -= 10;

                    if(dragon.hp <= 0){

                        dragon.active = false;

                        setTimeout(()=>{
                            alert("Du besejrede Enderdragen!");
                        },50);
                    }

                    return;
                }
            }

            if(
                world[wy][wx] !== "portal" &&
                world[wy][wx] !== "endportal"
            ){
                world[wy][wx] = "air";
            }
        }

        if(e.button === 2){

            if(world[wy][wx] === "air"){
                world[wy][wx] = "dirt";
            }
        }
    }
});

function solid(px,py){

    const tx = Math.floor(px/TILE);
    const ty = Math.floor(py/TILE);

    if(
        tx < 0 ||
        ty < 0 ||
        tx >= WORLD_W ||
        ty >= WORLD_H
    ) return false;

    return world[ty][tx] !== "air";
}

function generateNether(){

    dimension = "nether";

    for(let y=0;y<WORLD_H;y++){

        world[y] = [];

        for(let x=0;x<WORLD_W;x++){

            if(y > 12)
                world[y][x] = "netherrack";
            else
                world[y][x] = "air";
        }
    }

    world[11][10] = "portal";

    player.x = 150;
    player.y = 100;
}

function spawnDragon(){

    dragon.active = true;
    dragon.hp = 200;
    dragon.x = 800;
    dragon.y = 150;
}

function generateEnd(){

    dimension = "end";

    for(let y=0;y<WORLD_H;y++){

        world[y] = [];

        for(let x=0;x<WORLD_W;x++){

            if(y > 18)
                world[y][x] = "endstone";
            else
                world[y][x] = "air";
        }
    }

    spawnDragon();

    player.x = 100;
    player.y = 100;
}

function checkPortals(){

    const tx = Math.floor(
        (player.x + player.w/2)/TILE
    );

    const ty = Math.floor(
        (player.y + player.h/2)/TILE
    );

    const block = world[ty]?.[tx];

    if(block === "portal"){

        if(dimension === "overworld"){
            generateNether();
        }else{
            generateOverworld();
            dimension = "overworld";
        }
    }

    if(block === "endportal"){
        generateEnd();
    }
}

function updateDragon(){

    if(!dragon.active) return;

    dragon.x += Math.sin(Date.now()/500)*3;

    if(player.x < dragon.x){
        dragon.x -= 1.2;
    }else{
        dragon.x += 1.2;
    }
}

function update(){

    player.vx = 0;

    if(keys["a"])
        player.vx = -player.speed;

    if(keys["d"])
        player.vx = player.speed;

    if(keys["w"] && player.onGround){

        player.vy = player.jump;
        player.onGround = false;
    }

    player.vy += 0.6;

    player.x += player.vx;
    player.y += player.vy;

    player.onGround = false;

    const leftFoot = solid(
        player.x,
        player.y + player.h
    );

    const rightFoot = solid(
        player.x + player.w,
        player.y + player.h
    );

    if(player.vy > 0 && (leftFoot || rightFoot)){

        player.y =
            Math.floor(
                (player.y + player.h)/TILE
            ) * TILE - player.h;

        player.vy = 0;
        player.onGround = true;
    }

    checkPortals();
    updateDragon();

    camera.x =
        player.x - canvas.width/2;

    camera.y =
        player.y - canvas.height/2;
}

function drawBlock(block,x,y){

    switch(block){

        case "grass":
            ctx.fillStyle = "#3cb043";
            break;

        case "dirt":
            ctx.fillStyle = "#8b5a2b";
            break;

        case "netherrack":
            ctx.fillStyle = "#8b0000";
            break;

        case "endstone":
            ctx.fillStyle = "#d9d39f";
            break;

        case "portal":
            ctx.fillStyle = "purple";
            break;

        case "endportal":
            ctx.fillStyle = "black";
            break;

        default:
            return;
    }

    ctx.fillRect(x,y,TILE,TILE);

    ctx.strokeStyle = "#00000022";
    ctx.strokeRect(x,y,TILE,TILE);
}

function draw(){

    if(dimension === "nether"){
        ctx.fillStyle = "#3b0000";
    }
    else if(dimension === "end"){
        ctx.fillStyle = "#111";
    }
    else{
        ctx.fillStyle = "#87ceeb";
    }

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let y=0;y<WORLD_H;y++){

        for(let x=0;x<WORLD_W;x++){

            const block = world[y][x];

            if(block === "air")
                continue;

            drawBlock(
                block,
                x*TILE-camera.x,
                y*TILE-camera.y
            );
        }
    }

    ctx.fillStyle = "red";

    ctx.fillRect(
        player.x-camera.x,
        player.y-camera.y,
        player.w,
        player.h
    );

    if(dragon.active){

        ctx.fillStyle = "black";

        ctx.fillRect(
            dragon.x-camera.x,
            dragon.y-camera.y,
            dragon.w,
            dragon.h
        );

        ctx.fillStyle = "purple";

        ctx.fillRect(
            dragon.x-camera.x+25,
            dragon.y-camera.y+20,
            15,
            15
        );

        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText(
            "Dragon HP: " + dragon.hp,
            20,
            90
        );
    }

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";

    ctx.fillText(
        "Dimension: " + dimension,
        20,
        40
    );
}

function gameLoop(){

    update();
    draw();

    requestAnimationFrame(
        gameLoop
    );
}

gameLoop();

window.addEventListener(
    "resize",
    ()=>{
        canvas.width = innerWidth;
        canvas.height = innerHeight;
    }
);

</script>

</body>
</html>
