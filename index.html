<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS:GO Ultimate - GitHub</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #loading-screen {
            position: absolute; width: 100%; height: 100%;
            background: #000; color: #ff9900;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }
        #play-button {
            padding: 20px 50px; font-size: 24px; background: #ff9900;
            color: black; border: none; cursor: pointer; border-radius: 8px;
            font-weight: bold; display: none; /* Vises kun når spillet er klar */
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 14px; height: 14px;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #crosshair:before { content: ''; position: absolute; top: 6px; width: 14px; height: 2px; background: #0f0; }
        #crosshair:after { content: ''; position: absolute; left: 6px; height: 14px; width: 2px; background: #0f0; }
        #hud {
            position: absolute; bottom: 20px; width: 100%; display: flex;
            justify-content: space-around; color: white; font-size: 24px;
            text-shadow: 2px 2px black; pointer-events: none;
        }
        #error-log { color: red; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 id="status">INDLÆSER SPIL...</h1>
        <button id="play-button">KLIK FOR AT DEPLOYE</button>
        <div id="error-log"></div>
    </div>

    <div id="crosshair"></div>
    <div id="hud">
        <div>HP: 100</div>
        <div>KILLS: <span id="kills">0</span></div>
        <div>AMMO: <span id="ammo">30</span></div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { PointerLockControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

        const status = document.getElementById('status');
        const playBtn = document.getElementById('play-button');
        const errorLog = document.getElementById('error-log');

        try {
            // --- ENGINE ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 1, 50);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- LYS ---
            const light = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(light);

            // --- BANEN ---
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x222222 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // --- VÅBEN ---
            const gun = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.2, 0.6),
                new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 })
            );
            scene.add(gun);

            // --- FJENDER ---
            const enemies = [];
            for(let i=0; i<5; i++) {
                const e = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0xff0000}));
                e.position.set(Math.random()*20-10, 1, -Math.random()*20-5);
                scene.add(e);
                enemies.push(e);
            }

            // --- KONTROL ---
            const controls = new PointerLockControls(camera, document.body);
            playBtn.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => document.getElementById('loading-screen').style.display = 'none');
            controls.addEventListener('unlock', () => document.getElementById('loading-screen').style.display = 'flex');

            // Skyd
            let kills = 0, ammo = 30;
            const raycaster = new THREE.Raycaster();
            window.addEventListener('mousedown', () => {
                if(!controls.isLocked || ammo <= 0) return;
                ammo--;
                document.getElementById('ammo').innerText = ammo;
                
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const hits = raycaster.intersectObjects(enemies);
                if(hits.length > 0) {
                    hits[0].object.position.y = -10;
                    kills++;
                    document.getElementById('kills').innerText = kills;
                    setTimeout(() => hits[0].object.position.y = 1, 2000);
                }
            });

            // Bevægelse
            let keys = {};
            document.addEventListener('keydown', e => keys[e.code] = true);
            document.addEventListener('keyup', e => keys[e.code] = false);

            const velocity = new THREE.Vector3();
            function animate() {
                requestAnimationFrame(animate);
                if(controls.isLocked) {
                    velocity.z = (Number(keys['KeyW']) - Number(keys['KeyS'])) * 0.15;
                    velocity.x = (Number(keys['KeyD']) - Number(keys['KeyA'])) * 0.15;
                    controls.moveForward(velocity.z);
                    controls.moveRight(velocity.x);

                    // Gun follow
                    gun.position.copy(camera.position);
                    gun.rotation.copy(camera.rotation);
                    gun.updateMatrix();
                    gun.translateZ(-0.5); gun.translateX(0.2); gun.translateY(-0.2);
                }
                renderer.render(scene, camera);
            }

            // KLAR TIL START
            status.innerText = "KLAR TIL KAMP!";
            playBtn.style.display = "block";
            animate();

        } catch (err) {
            status.innerText = "FEJL VED INDLÆSNING!";
            errorLog.innerText = err.message;
            console.error(err);
        }
    </script>
</body>
</html>
