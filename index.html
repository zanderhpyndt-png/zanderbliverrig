<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Simpelt CS:GO-agtigt Skydespil</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            border: 4px solid #555;
            cursor: crosshair; /* Gør musen til et sigtekorn */
            margin-top: 20px;
        }

        .target {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: red;
            border-radius: 50%;
            border: 3px solid white;
            transition: transform 0.1s;
        }

        #ui {
            margin-top: 10px;
            font-size: 24px;
        }

        .score-board {
            color: #00ff00;
        }
    </style>
</head>
<body>

    <h1>Aim Trainer v1.0</h1>
    <div id="ui">Points: <span id="score" class="score-board">0</span></div>
    
    <div id="game-container" onclick="playShootSound()">
        </div>

    <script>
        const container = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        let score = 0;

        // Funktion til at lave et mål (Target)
        function createTarget() {
            const target = document.createElement('div');
            target.classList.add('target');

            // Find en tilfældig position indenfor containeren
            const x = Math.random() * (container.offsetWidth - 50);
            const y = Math.random() * (container.offsetHeight - 50);

            target.style.left = x + 'px';
            target.style.top = y + 'px';

            // Når man klikker på målet
            target.onclick = function(e) {
                e.stopPropagation(); // Forhindrer at vi skyder "ved siden af"
                score++;
                scoreElement.innerText = score;
                this.remove(); // Fjern målet
                createTarget(); // Lav et nyt med det samme
            };

            container.appendChild(target);

            // Målet forsvinder af sig selv efter 1.5 sekund, hvis man er for langsom
            setTimeout(() => {
                if (target.parentNode) {
                    target.remove();
                    createTarget();
                }
            }, 1500);
        }

        // Start spillet med 3 mål
        for(let i = 0; i < 3; i++) {
            createTarget();
        }

        // Simpel lydeffekt (hvis du har en fil)
        function playShootSound() {
            // Her kunne du indsætte en lydfil: new Audio('gunshot.mp3').play();
            console.log("Skud affyret!");
        }
    </script>
</body>
</html>
