<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Minecraft 2D</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#87ceeb;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const TILE = 32;
const WORLD_W = 150;
const WORLD_H = 60;

let dimension = "Overworld";

const inventory = {
    coal:0,
    iron:0,
    gold:0,
    diamond:0
};

const world = [];

function generateWorld(){

    for(let y=0;y<WORLD_H;y++){

        world[y]=[];

        for(let x=0;x<WORLD_W;x++){

            if(y < 18){
                world[y][x]="air";
            }

            else if(y===18){
                world[y][x]="grass";
            }

            else{

                let r=Math.random();

                if(y>45 && r<0.01){
                    world[y][x]="diamond";
                }
                else if(y>35 && r<0.03){
                    world[y][x]="gold";
                }
                else if(y>28 && r<0.06){
                    world[y][x]="iron";
                }
                else if(r<0.12){
                    world[y][x]="coal";
                }
                else{
                    world[y][x]="stone";
                }
            }
        }
    }

    world[17][20]="portal";
    world[17][60]="endportal";
}

generateWorld();

const player={
    x:200,
    y:100,
    w:24,
    h:40,
    vx:0,
    vy:0,
    speed:4,
    jump:-12,
    onGround:false
};

const dragon={
    active:false,
    x:1000,
    y:150,
    w:150,
    h:70,
    hp:200
};

const camera={
    x:0,
    y:0
};

const keys={};

window.addEventListener("keydown",e=>{
    keys[e.code]=true;
});

window.addEventListener("keyup",e=>{
    keys[e.code]=false;
});

canvas.addEventListener("contextmenu",e=>{
    e.preventDefault();
});

function spawnDragon(){
    dragon.active=true;
    dragon.hp=200;
}

function generateNether(){

    dimension="Nether";

    for(let y=0;y<WORLD_H;y++){

        world[y]=[];

        for(let x=0;x<WORLD_W;x++){

            if(y>15){
                world[y][x]="netherrack";
            }else{
                world[y][x]="air";
            }
        }
    }

    world[14][10]="portal";

    player.x=150;
    player.y=100;
}

function generateEnd(){

    dimension="End";

    for(let y=0;y<WORLD_H;y++){

        world[y]=[];

        for(let x=0;x<WORLD_W;x++){

            if(y>20){
                world[y][x]="endstone";
            }else{
                world[y][x]="air";
            }
        }
    }

    spawnDragon();

    player.x=150;
    player.y=100;
}

function solid(px,py){

    const tx=Math.floor(px/TILE);
    const ty=Math.floor(py/TILE);

    if(
        tx<0 ||
        ty<0 ||
        tx>=WORLD_W ||
        ty>=WORLD_H
    ) return false;

    return world[ty][tx]!="air";
}

canvas.addEventListener("mousedown",e=>{

    const wx=Math.floor((e.clientX+camera.x)/TILE);
    const wy=Math.floor((e.clientY+camera.y)/TILE);

    if(
        wx<0 ||
        wy<0 ||
        wx>=WORLD_W ||
        wy>=WORLD_H
    ) return;

    const block=world[wy][wx];

    if(e.button===0){

        const mx=e.clientX+camera.x;
        const my=e.clientY+camera.y;

        if(
            dragon.active &&
            mx>dragon.x &&
            mx<dragon.x+dragon.w &&
            my>dragon.y &&
            my<dragon.y+dragon.h
        ){

            dragon.hp-=10;

            if(dragon.hp<=0){

                dragon.active=false;

                alert("Du besejrede Enderdragen!");
            }

            return;
        }

        if(block==="coal") inventory.coal++;
        if(block==="iron") inventory.iron++;
        if(block==="gold") inventory.gold++;
        if(block==="diamond") inventory.diamond++;

        if(
            block!=="portal" &&
            block!=="endportal"
        ){
            world[wy][wx]="air";
        }
    }

    if(e.button===2){

        if(world[wy][wx]==="air"){
            world[wy][wx]="stone";
        }
    }
});

function update(){

    player.vx=0;

    if(keys["KeyA"])
        player.vx=-player.speed;

    if(keys["KeyD"])
        player.vx=player.speed;

    if(
        keys["KeyW"] &&
        player.onGround
    ){
        player.vy=player.jump;
    }

    player.vy+=0.6;

    player.x+=player.vx;
    player.y+=player.vy;

    player.onGround=false;

    if(
        player.vy>0 &&
        (
            solid(player.x,player.y+player.h) ||
            solid(player.x+player.w,player.y+player.h)
        )
    ){

        player.y=
        Math.floor((player.y+player.h)/TILE)
        *TILE-player.h;

        player.vy=0;
        player.onGround=true;
    }

    const tx=Math.floor(
        (player.x+player.w/2)/TILE
    );

    const ty=Math.floor(
        (player.y+player.h/2)/TILE
    );

    const block=world[ty]?.[tx];

    if(block==="portal"){

        if(dimension==="Overworld"){
            generateNether();
        }
        else{
            generateWorld();
            dimension="Overworld";
        }
    }

    if(block==="endportal"){
        generateEnd();
    }

    if(dragon.active){

        if(player.x<dragon.x){
            dragon.x-=1.5;
        }else{
            dragon.x+=1.5;
        }
    }

    camera.x=
        player.x-canvas.width/2;

    camera.y=
        player.y-canvas.height/2;
}

function drawBlock(block,x,y){

    const colors={
        grass:"#2faa2f",
        stone:"#777",
        coal:"#222",
        iron:"#b8875f",
        gold:"#ffd700",
        diamond:"#00ffff",
        portal:"purple",
        endportal:"black",
        netherrack:"#7a0000",
        endstone:"#d8d39f"
    };

    ctx.fillStyle=colors[block];
    ctx.fillRect(x,y,TILE,TILE);

    ctx.strokeStyle="#00000022";
    ctx.strokeRect(x,y,TILE,TILE);
}

function draw(){

    if(dimension==="Nether"){
        ctx.fillStyle="#300";
    }
    else if(dimension==="End"){
        ctx.fillStyle="#111";
    }
    else{
        ctx.fillStyle="#87ceeb";
    }

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    for(let y=0;y<WORLD_H;y++){

        for(let x=0;x<WORLD_W;x++){

            const block=world[y][x];

            if(block==="air")
                continue;

            drawBlock(
                block,
                x*TILE-camera.x,
                y*TILE-camera.y
            );
        }
    }

    ctx.fillStyle="red";

    ctx.fillRect(
        player.x-camera.x,
        player.y-camera.y,
        player.w,
        player.h
    );

    if(dragon.active){

        ctx.fillStyle="black";

        ctx.fillRect(
            dragon.x-camera.x,
            dragon.y-camera.y,
            dragon.w,
            dragon.h
        );

        ctx.fillStyle="white";

        ctx.fillText(
            "Dragon HP: "+dragon.hp,
            20,
            90
        );
    }

    ctx.fillStyle="white";
    ctx.font="20px Arial";

    ctx.fillText(
        "Dimension: "+dimension,
        20,
        30
    );

    ctx.fillText(
        "Coal:"+inventory.coal+
        " Iron:"+inventory.iron+
        " Gold:"+inventory.gold+
        " Diamond:"+inventory.diamond,
        20,
        60
    );
}

function gameLoop(){

    update();
    draw();

    requestAnimationFrame(
        gameLoop
    );
}

gameLoop();

</script>

</body>
</html>
