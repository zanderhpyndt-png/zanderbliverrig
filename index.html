<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>ZANDER FIFA 3D</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Arial', sans-serif; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; z-index: 10; }
        .score { font-size: 3rem; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #power-bar-container { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); width: 200px; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid white; display: none; }
        #power-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #2ecc71, #e74c3c); }
        #msg { font-size: 5rem; color: gold; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; }
    </style>
</head>
<body>

<div id="ui">
    <div class="score">MÅL: <span id="score">0</span></div>
    <p>HOLD MUSEN FOR AT SKYDE - SLIP FOR AT RAMME</p>
</div>

<div id="power-bar-container"><div id="power-bar"></div></div>
<div id="msg">MÅÅÅÅL!</div>

<script>
    let scene, camera, renderer, ball, goalie, goal;
    let score = 0, power = 0, isCharging = false;
    let ballVelocity = new THREE.Vector3();
    let ballMoving = false;
    let mouseX = 0;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Himmel

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 10);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lys
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7.5);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // Græsbane
        const grassGeo = new THREE.PlaneGeometry(100, 100);
        const grassMat = new THREE.MeshPhongMaterial({ color: 0x2ecc71 });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.rotation.x = -Math.PI / 2;
        scene.add(grass);

        // Målet
        goal = new THREE.Group();
        const postMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5, 0.2), postMat);
        leftPost.position.set(-5, 2.5, -20);
        const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.2, 5, 0.2), postMat);
        rightPost.position.set(5, 2.5, -20);
        const crossbar = new THREE.Mesh(new THREE.BoxGeometry(10.2, 0.2, 0.2), postMat);
        crossbar.position.set(0, 5, -20);
        goal.add(leftPost, rightPost, crossbar);
        scene.add(goal);

        // Fodbolden
        const ballGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const ballMat = new THREE.MeshPhongMaterial({ color: 0xffffff, wireframe: false });
        ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, 0.4, 5);
        scene.add(ball);

        // Målmanden
        const goalieGeo = new THREE.BoxGeometry(1, 2, 0.5);
        const goalieMat = new THREE.MeshPhongMaterial({ color: 0x3498db });
        goalie = new THREE.Mesh(goalieGeo, goalieMat);
        goalie.position.set(0, 1, -19);
        scene.add(goalie);

        // Events
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        });

        window.addEventListener('mousedown', () => {
            if (!ballMoving) {
                isCharging = true;
                document.getElementById('power-bar-container').style.display = 'block';
            }
        });

        window.addEventListener('mouseup', () => {
            if (isCharging) {
                shoot();
                isCharging = false;
                document.getElementById('power-bar-container').style.display = 'none';
            }
        });
    }

    function shoot() {
        ballMoving = true;
        const targetX = mouseX * 10;
        const targetY = (power / 100) * 6;
        
        ballVelocity.set(
            (targetX - ball.position.x) * 0.05,
            targetY * 0.1,
            -0.8
        );
        power = 0;
    }

    function resetBall() {
        ballMoving = false;
        ball.position.set(0, 0.4, 5);
        ballVelocity.set(0, 0, 0);
        goalie.position.x = 0;
    }

    function animate() {
        requestAnimationFrame(animate);

        if (isCharging) {
            power = Math.min(power + 1.5, 100);
            document.getElementById('power-bar').style.width = power + "%";
        }

        if (ballMoving) {
            ball.position.add(ballVelocity);
            ballVelocity.y -= 0.005; // Tyngdekraft
            ball.rotation.x += 0.1;

            // Målmand AI (følger bolden)
            if (ball.position.z < -5) {
                const moveSpeed = 0.08;
                if (goalie.position.x < ball.position.x) goalie.position.x += moveSpeed;
                if (goalie.position.x > ball.position.x) goalie.position.x -= moveSpeed;
            }

            // Tjek for mål
            if (ball.position.z <= -20) {
                if (Math.abs(ball.position.x) < 5 && ball.position.y < 5 && ball.position.y > 0) {
                    // MÅÅÅL
                    if (Math.abs(ball.position.x - goalie.position.x) > 1.5) {
                        score++;
                        document.getElementById('score').innerText = score;
                        showMsg("MÅÅÅÅL!");
                    } else {
                        showMsg("REDET!");
                    }
                } else {
                    showMsg("VED SIDEN AF!");
                }
                resetBall();
            }

            // Rammer jorden
            if (ball.position.y < 0.4) {
                ball.position.y = 0.4;
                ballVelocity.y *= -0.3; // Hop
            }
        }

        renderer.render(scene, camera);
    }

    function showMsg(txt) {
        const el = document.getElementById('msg');
        el.innerText = txt;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 1500);
    }
</script>
</body>
</html>
