<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: 3D Zombie Hunt</title>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; }
        
        #ui { position: fixed; top: 20px; width: 100%; display: flex; justify-content: space-around; color: gold; z-index: 10; pointer-events: none; text-shadow: 2px 2px 5px black; }
        .stat-val { color: #00f2ff; font-size: 1.5rem; }

        #shop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; }
        #shop h1 { font-family: 'Creepster'; font-size: 5rem; color: #4a0000; margin: 0; }
        .btn { background: #111; color: gold; border: 2px solid gold; padding: 15px 40px; margin: 10px; cursor: pointer; font-family: 'Orbitron'; font-weight: bold; border-radius: 5px; width: 300px; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: gold; color: black; }
    </style>
</head>
<body>

<div id="ui">
    <div>GULD: <span id="money-ui" class="stat-val">0</span></div>
    <div>SEKTOR: <span id="lvl-ui" class="stat-val">1</span></div>
    <div>LIV: <span id="hp-ui" class="stat-val" style="color: #ff4d4d;">100</span></div>
</div>

<div id="shop">
    <h1>UDSTYR</h1>
    <p>DIN FORMUE: <span id="money-shop">0</span> KR</p>
    <button class="btn" onclick="buy('dmg')">STÆRKERE SKUD (250 KR)</button>
    <button class="btn" onclick="buy('hp')">MEDKIT (100 KR)</button>
    <button class="btn" style="background: white; color: black; border: none;" onclick="toggleShop()">FORTSÆT (ESC)</button>
</div>

<script>
    let scene, camera, renderer, player, isPaused = false;
    let money = 0, sector = 1, hp = 100, dmg = 50;
    let monsters = [], bullets = [];
    const keys = {};

    window.onload = init;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x020202, 5, 45);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // STÆRKT LYS (Fixer din sorte skærm)
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        // GULV
        const grid = new THREE.GridHelper(100, 25, 0x4a0000, 0x111111);
        scene.add(grid);

        // DETALJERET SPILLER (Menneske-lignende)
        player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.4, 0.5), new THREE.MeshPhongMaterial({color: 0x111111}));
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshPhongMaterial({color: 0xffdbac}));
        head.position.y = 0.9;
        const arm = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.8, 0.2), new THREE.MeshPhongMaterial({color: 0x111111}));
        arm.position.set(0.5, 0.3, 0.3); // Holder en "pistol"
        player.add(body, head, arm);
        scene.add(player);

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Escape') toggleShop();
            if(e.code === 'Enter' && !isPaused) shoot();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        
        animate();
    }

    function toggleShop() {
        isPaused = !isPaused;
        document.getElementById('shop').style.display = isPaused ? 'flex' : 'none';
        document.getElementById('money-shop').innerText = money;
    }

    function buy(type) {
        if(type === 'dmg' && money >= 250) { money -= 250; dmg += 40; }
        if(type === 'hp' && money >= 100) { money -= 100; hp = 100; }
        updateUI();
    }

    function spawnMonster() {
        const zombie = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.6, 0.6), new THREE.MeshPhongMaterial({color: 0x2e4d2e}));
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshPhongMaterial({color: 0x4d664d}));
        head.position.y = 1.1;
        zombie.add(body, head);
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 30;
        zombie.position.set(Math.cos(angle)*dist, 0.8, Math.sin(angle)*dist);
        zombie.hp = 80 * sector;
        
        scene.add(zombie);
        monsters.push(zombie);
    }

    function shoot() {
        if(monsters.length === 0) return;
        let target = monsters[0];
        monsters.forEach(m => { if(player.position.distanceTo(m.position) < player.position.distanceTo(target.position)) target = m; });

        const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
        b.position.copy(player.position);
        b.position.y = 1;
        const dir = new THREE.Vector3().subVectors(target.position, player.position).normalize();
        b.vel = dir.multiplyScalar(0.9);
        player.lookAt(target.position.x, 0, target.position.z);
        scene.add(b);
        bullets.push(b);
    }

    function updateUI() {
        document.getElementById('money-ui').innerText = money;
        document.getElementById('lvl-ui').innerText = sector;
        document.getElementById('hp-ui').innerText = Math.floor(hp);
    }

    function animate() {
        requestAnimationFrame(animate);
        if(isPaused) return;

        // Bevægelse
        if(keys['ArrowUp'] || keys['KeyW']) player.position.z -= 0.15;
        if(keys['ArrowDown'] || keys['KeyS']) player.position.z += 0.15;
        if(keys['ArrowLeft'] || keys['KeyA']) player.position.x -= 0.15;
        if(keys['ArrowRight'] || keys['KeyD']) player.position.x += 0.15;

        camera.position.set(player.position.x, player.position.y + 12, player.position.z + 15);
        camera.lookAt(player.position);

        if(monsters.length < 1 + (sector/2)) spawnMonster();

        monsters.forEach((m, mi) => {
            const dir = new THREE.Vector3().subVectors(player.position, m.position).normalize();
            m.position.add(dir.multiplyScalar(0.04 + sector*0.005));
            m.lookAt(player.position);
            if(player.position.distanceTo(m.position) < 1.5) {
                hp -= 0.2; updateUI();
                if(hp <= 0) location.reload();
            }
        });

        bullets.forEach((b, bi) => {
            b.position.add(b.vel);
            monsters.forEach((m, mi) => {
                if(b.position.distanceTo(m.position) < 1.5) {
                    m.hp -= dmg; scene.remove(b); bullets.splice(bi, 1);
                    if(m.hp <= 0) { scene.remove(m); monsters.splice(mi, 1); money += 150; sector++; updateUI(); }
                }
            });
            if(b.position.distanceTo(player.position) > 50) { scene.remove(b); bullets.splice(bi, 1); }
        });

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
