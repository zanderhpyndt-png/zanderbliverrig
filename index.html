<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Web-Strike: HTML Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 15px; height: 15px;
            border: 2px solid #0f0; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 30px; left: 30px;
            color: #0f0; font-size: 28px; text-shadow: 2px 2px #000;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>WEB-STRIKE 1.6</h1>
        <p>KLIK FOR AT STARTE</p>
        <p style="font-size: 14px;">(WASD = GÅ | MUS = SIGT | KLIK = SKYD)</p>
    </div>

    <div id="crosshair"></div>
    <div id="ui">HP: 100 | AMMO: 30/90</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- SCENE & KAMERA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);
        scene.fog = new THREE.Fog(0x333333, 0, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- BELYSNING ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffccaa, 1);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // --- BANEN (GULV & VÆGGE) ---
        const loader = new THREE.TextureLoader();
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        function createBox(x, y, z, w, h, d) {
            const box = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshStandardMaterial({ color: 0x554433 })
            );
            box.position.set(x, y, z);
            scene.add(box);
        }
        // "Dust 2" kasser
        createBox(5, 1, -5, 2, 2, 2);
        createBox(-7, 1.5, -10, 3, 3, 3);
        createBox(0, 5, -20, 20, 10, 1); // En væg

        // --- VÅBEN (Pistol model) ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.2, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x111111 })
        );
        gunGroup.add(gunBody);
        scene.add(gunGroup);

        // --- CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        const overlay = document.getElementById('overlay');

        overlay.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => overlay.style.display = 'none');
        controls.addEventListener('unlock', () => overlay.style.display = 'flex');

        let moveF = false, moveB = false, moveL = false, moveR = false;
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveF = true;
            if(e.code === 'KeyS') moveB = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveF = false;
            if(e.code === 'KeyS') moveB = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });

        // --- SKYDE LOGIK ---
        let isShooting = false;
        window.addEventListener('mousedown', () => {
            if(!controls.isLocked) return;
            isShooting = true;
            
            // Rekyl animation
            gunGroup.position.z += 0.1;
            camera.rotation.x += 0.02;
            
            setTimeout(() => {
                gunGroup.position.z -= 0.1;
                isShooting = false;
            }, 50);
        });

        // --- GAME LOOP ---
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked) {
                // Bevægelse
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveF) - Number(moveB);
                direction.x = Number(moveR) - Number(moveL);
                direction.normalize();

                if (moveF || moveB) velocity.z -= direction.z * 100.0 * delta;
                if (moveL || moveR) velocity.x -= direction.x * 100.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Våben følger kameraet
                gunGroup.position.copy(camera.position);
                gunGroup.rotation.copy(camera.rotation);
                gunGroup.updateMatrix();
                gunGroup.translateZ(-0.6);
                gunGroup.translateX(0.3);
                gunGroup.translateY(-0.3);

                // View bobbing (kameraet ryster let når man går)
                if(moveF || moveB || moveL || moveR) {
                    camera.position.y = 1.6 + Math.sin(performance.now() * 0.01) * 0.02;
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
