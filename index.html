<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <title>Nightwatch: 6 AM Challenge</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        
        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 1000; background: rgba(0,0,0,0.8); padding: 15px; border: 2px solid #0f0; }
        .usage-bar { color: #f00; letter-spacing: 2px; }

        /* Kontoret */
        #game-view { position: relative; width: 100vw; height: 100vh; }
        #office { 
            position: absolute; width: 150vw; height: 100vh; left: -25vw; 
            background: #111; 
            background-image: repeating-linear-gradient(90deg, #151515 0px, #151515 100px, #111 100px, #111 200px);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s ease-out;
        }

        /* Lys-filter */
        #darkness { position: absolute; inset: 0; background: rgba(0,0,0,0.9); pointer-events: none; z-index: 10; transition: 0.1s; }

        /* Døre */
        .door-frame { position: absolute; bottom: 0; width: 15vw; height: 80vh; background: #000; border: 5px solid #333; }
        #frame-l { left: 15vw; } #frame-r { right: 15vw; }
        .door { position: absolute; top: -100%; left: 0; width: 100%; height: 100%; background: #444; transition: 0.3s; }
        .door.closed { top: 0; }

        /* Knapper */
        .btns { position: absolute; bottom: 30%; display: flex; flex-direction: column; gap: 10px; z-index: 20; }
        #btns-l { left: 5vw; } #btns-r { right: 5vw; }
        .btn { width: 60px; height: 40px; background: #222; border: 2px solid #444; color: #fff; cursor: pointer; font-size: 10px; }
        .btn.active-door { background: #f00; }
        .btn.active-light { background: #ff0; color: #000; }

        /* Monitor */
        #mon-toggle { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 30%; height: 40px; background: #333; z-index: 100; cursor: pointer; text-align: center; line-height: 40px; border-radius: 10px 10px 0 0; }
        #cam-screen { position: absolute; inset: 0; background: #021a02; z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Monster i døren (Visualisering) */
        #monster-l { position: absolute; bottom: 10%; left: 17vw; font-size: 100px; display: none; z-index: 5; }
    </style>
</head>
<body>

<div id="hud">
    <div style="font-size: 24px;">KL: <span id="clock">12</span> AM</div>
    <div>STRØM: <span id="pwr">100</span>%</div>
    <div>FORBRUG: <span id="use" class="usage-bar">I</span></div>
</div>

<div id="game-view">
    <div id="darkness"></div>
    <div id="monster-l">🤡</div>

    <div id="office">
        <div id="btns-l" class="btns">
            <button class="btn" onclick="toggleD('l', this)">DØR</button>
            <button class="btn" onmousedown="light(true, this)" onmouseup="light(false, this)">LYS</button>
        </div>
        <div id="frame-l" class="door-frame"><div id="door-l" class="door"></div></div>

        <div id="frame-r" class="door-frame"><div id="door-r" class="door"></div></div>
        <div id="btns-r" class="btns">
            <button class="btn" onclick="toggleD('r', this)">DØR</button>
            <button class="btn" onmousedown="light(true, this)" onmouseup="light(false, this)">LYS</button>
        </div>
    </div>

    <div id="mon-toggle" onclick="toggleC()">OVERVÅGNING</div>

    <div id="cam-screen">
        <h2 id="cam-info">CAM 01: HOVEDGANG</h2>
        <div id="ai-dist" style="font-size: 30px;">Alt er stille...</div>
        <button onclick="toggleC()" style="margin-top: 30px; padding: 15px;">LUK MONITOR</button>
    </div>
</div>

<script>
    let pwr = 100, hour = 12, timeTicks = 0, aiPos = 0;
    let doors = {l: false, r: false}, lightOn = false, camOn = false;

    // Panorering
    document.addEventListener('mousemove', (e) => {
        let x = (e.clientX / window.innerWidth - 0.5) * 50;
        document.getElementById('office').style.transform = `translateX(${-x}vw)`;
    });

    // Gameloop (Hvert sekund)
    const loop = setInterval(() => {
        // Strømforbrug
        let consumption = 1 + (doors.l?1:0) + (doors.r?1:0) + (lightOn?1:0) + (camOn?2:0);
        pwr -= (consumption * 0.12);
        document.getElementById('pwr').innerText = Math.floor(pwr);
        document.getElementById('use').innerText = "I".repeat(consumption);

        if (pwr <= 0) endGame("STRØMMEN GIK... DU ER FORSVUNDET I MØRKET.");

        // Tid
        timeTicks++;
        if (timeTicks >= 45) { // 45 sekunder pr. time
            timeTicks = 0;
            hour = (hour === 12) ? 1 : hour + 1;
            document.getElementById('clock').innerText = hour;
            if (hour === 6) endGame("KLOKKEN ER 06:00! DU OVERLEVEDE!", true);
        }

        // AI Bevægelse (Hvert 4. sekund)
        if (timeTicks % 4 === 0) {
            if (Math.random() > 0.4) {
                aiPos++;
                updateCam();
                if (aiPos >= 5) {
                    if (doors.l) { aiPos = 0; updateCam(); } 
                    else { endGame("JUMPSCARE! MONSTRET FANGEDE DIG."); }
                }
            }
        }
        
        // Vis monster hvis lyset er tændt og han er ved døren
        document.getElementById('monster-l').style.display = (lightOn && aiPos === 4) ? "block" : "none";

    }, 1000);

    function toggleD(s, b) {
        doors[s] = !doors[s];
        document.getElementById('door-'+s).classList.toggle('closed');
        b.classList.toggle('active-door');
    }

    function light(on, b) {
        lightOn = on;
        document.getElementById('darkness').style.background = on ? "transparent" : "rgba(0,0,0,0.9)";
        b.classList.toggle('active-light', on);
    }

    function toggleC() {
        camOn = !camOn;
        document.getElementById('cam-screen').style.display = camOn ? "flex" : "none";
    }

    function updateCam() {
        const d = document.getElementById('ai-dist');
        if (aiPos < 2) d.innerText = "Intet at se...";
        else if (aiPos < 4) d.innerText = "Noget bevæger sig i skyggerne!";
        else d.innerText = "ADVARSEL: EKSTREM NÆRHED!";
    }

    function endGame(m, win = false) {
        clearInterval(loop);
        document.body.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#000; color:${win?'#0f0':'red'};"><h1>${win?'SEJR':'GAME OVER'}</h1><p>${m}</p><button onclick="location.reload()">SPIL IGEN</button></div>`;
    }
</script>
</body>
</html>
