<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZanderBliverRig</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
    background: black;
}

h1 {
    margin-top: 40px;
    text-shadow: 0 0 15px gold;
}

.box {
    margin: 15px;
    padding: 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    display: inline-block;
}

button {
    padding: 10px 20px;
    margin: 5px;
    background: gold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<h1>💰 ZanderBliverRig 💰</h1>

<div class="box">
Besøgende: <span id="visits">0</span>
</div>

<br>

<div class="box">
Dine penge: <span id="money">0</span> kr
</div>

<br>

<button onclick="earn()">Tjen penge 💸</button>

<h2>🛒 Shop</h2>

<div class="box">
<p>💪 Bedre klik (+1)</p>
<p>Pris: <span id="priceClick">50</span></p>
<button onclick="buyClick()">Køb</button>
</div>

<div class="box">
<p>🏭 Auto penge (+1/s)</p>
<p>Pris: <span id="priceAuto">100</span></p>
<button onclick="buyAuto()">Køb</button>
</div>

<script>
// BESØGENDE
let visits = localStorage.getItem("visits") || 0;
visits++;
localStorage.setItem("visits", visits);
document.getElementById("visits").innerText = visits;

// DATA
let money = parseInt(localStorage.getItem("money")) || 0;
let clickPower = parseInt(localStorage.getItem("clickPower")) || 1;
let auto = parseInt(localStorage.getItem("auto")) || 0;

let priceClick = parseInt(localStorage.getItem("priceClick")) || 50;
let priceAuto = parseInt(localStorage.getItem("priceAuto")) || 100;

// UPDATE UI
function update() {
    document.getElementById("money").innerText = money;
    document.getElementById("priceClick").innerText = priceClick;
    document.getElementById("priceAuto").innerText = priceAuto;
}

// TJEN PENGE
function earn() {
    money += clickPower;
    save();
}

// KØB CLICK UPGRADE
function buyClick() {
    if (money >= priceClick) {
        money -= priceClick;
        clickPower++;
        priceClick = Math.floor(priceClick * 1.5);
        save();
    }
}

// KØB AUTO
function buyAuto() {
    if (money >= priceAuto) {
        money -= priceAuto;
        auto++;
        priceAuto = Math.floor(priceAuto * 1.7);
        save();
    }
}

// AUTO INCOME
setInterval(() => {
    money += auto;
    save();
}, 1000);

// GEM
function save() {
    localStorage.setItem("money", money);
    localStorage.setItem("clickPower", clickPower);
    localStorage.setItem("auto", auto);
    localStorage.setItem("priceClick", priceClick);
    localStorage.setItem("priceAuto", priceAuto);
    update();
}

update();
</script>

</body>
</html>
