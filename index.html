<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: The Final Sector</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --red: #ff4757; --blue: #00a8ff; --neon: #0ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; user-select: none; }

        /* Menu Skærm */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
        }

        /* Slutskærm */
        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ffd700, #000);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; text-align: center;
        }

        .hud {
            position: fixed; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-around;
            background: linear-gradient(to bottom, black, transparent); z-index: 100;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; background: #050505; }

        /* Monster placeret længere nede */
        #monster {
            position: absolute; left: 50%; top: 70%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; background: #111;
            border-radius: 50%; box-shadow: 0 0 50px rgba(255,0,0,0.3);
            display: flex; justify-content: center; align-items: center; z-index: 40;
            border: 3px solid #222;
        }

        #player {
            position: absolute; width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; border-radius: 10px; z-index: 60;
            background: #111; border: 2px solid var(--blue);
            box-shadow: 0 0 20px var(--blue);
        }

        /* Knapper og Shop */
        .btn {
            background: #222; color: var(--gold); border: 2px solid var(--gold);
            padding: 15px 30px; cursor: pointer; font-family: 'Orbitron';
            margin: 10px; border-radius: 5px; transition: 0.2s;
        }
        .btn:hover { background: var(--gold); color: black; transform: scale(1.1); }
        .btn:disabled { opacity: 0.3; cursor: default; }

        .hp-bar-bg { width: 100%; height: 10px; background: #111; margin-top: 5px; border-radius: 5px; }
        .hp-fill { height: 100%; background: var(--red); width: 100%; transition: width 0.1s; }
        .particle { position: absolute; width: 5px; height: 5px; background: var(--red); pointer-events: none; border-radius: 50%; }
        .bullet { position: absolute; z-index: 55; }
        .p-bullet { width: 4px; height: 15px; background: var(--neon); box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<!-- Menu Overlay -->
<div id="menu-overlay">
    <h1 style="color: var(--gold); font-size: 3rem;">ZANDER HUNTER</h1>
    <p>Guld: <span id="menu-money">0</span></p>
    <div style="display: flex; gap: 20px;">
        <div style="text-align: center;">
            <div style="font-size: 40px;">🥷</div>
            <button class="btn" id="btn-ninja" onclick="buySkin('ninja', 1000, '🥷', 1.8, 2)">NINJA (1000)</button>
        </div>
        <div style="text-align: center;">
            <div style="font-size: 40px;">👑</div>
            <button class="btn" id="btn-king" onclick="buySkin('king', 5000, '👑', 1.2, 5)">KONGE (5000)</button>
        </div>
    </div>
    <button class="btn" style="margin-top: 50px; background: var(--blue); color: white; border-color: white;" onclick="closeMenu()">TILBAGE TIL KAMP</button>
</div>

<!-- Victory Screen -->
<div id="win-screen">
    <h1 style="font-family: 'Press Start 2P'; font-size: 3rem;">DU VANDT!</h1>
    <p style="font-size: 1.5rem;">Zander har renset alle sektorer og er nu den rigeste jæger i universet.</p>
    <h2 id="final-gold" style="color: black;"></h2>
    <button class="btn" onclick="location.reload()">SPIL IGEN</button>
</div>

<div class="hud">
    <div>GULD: <b id="money">0</b></div>
    <div>SEKTOR: <b id="lvl">1/20</b></div>
    <button class="btn" style="padding: 5px 15px; margin: 0;" onclick="openMenu()">MENU / SHOP</button>
</div>

<div id="game-container">
    <div id="player">🟦</div>
    <div id="monster" onclick="attackMonster()">
        <div style="position: absolute; top: -60px; width: 200px; text-align: center;">
            <div class="hp-bar-bg"><div id="m-hp-fill" class="hp-fill"></div></div>
        </div>
        <div id="m-icon" style="font-size: 80px;">💀</div>
    </div>
</div>

<script>
    let money = 0, lvl = 1, pHP = 100, pMaxHP = 100, pDmg = 5, pSpeed = 7, gMult = 2, monsterAlive = true, inMenu = false;
    let mHP = 60, mMaxHP = 60, px = window.innerWidth/2, py = 100;
    const keys = {}, mBullets = [], pBullets = [], particles = [];

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'Enter' && monsterAlive && !inMenu) attackMonster();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function openMenu() { inMenu = true; document.getElementById('menu-overlay').style.display = 'flex'; updateUI(); }
    function closeMenu() { inMenu = false; document.getElementById('menu-overlay').style.display = 'none'; }

    function attackMonster() {
        if(!monsterAlive || inMenu) return;
        const mR = document.getElementById('monster').getBoundingClientRect();
        for(let i=0; i<8; i++) spawnParticle(mR.left + 100, mR.top + 100);
        damageMonster(pDmg);
    }

    function spawnParticle(x, y) {
        const p = { el: document.createElement('div'), x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.8)*12, life: 1 };
        p.el.className = 'particle'; document.getElementById('game-container').appendChild(p.el);
        particles.push(p);
    }

    function damageMonster(amt) {
        mHP -= amt;
        money += amt * gMult;
        if(mHP <= 0) {
            monsterAlive = false;
            money += 500 * lvl;
            if(lvl >= 20) {
                endGame();
            } else {
                setTimeout(nextLevel, 2000); // 2 sek pause før automatisk næste monster
            }
        }
        updateUI();
    }

    function nextLevel() {
        lvl++;
        mMaxHP = Math.round(60 * Math.pow(1.3, lvl));
        mHP = mMaxHP;
        monsterAlive = true;
        document.getElementById('m-icon').innerText = ['💀', '👾', '👹', '🧛', '🤖'][lvl % 5];
        updateUI();
    }

    function buySkin(id, cost, icon, speed, mult) {
        if(money >= cost) {
            money -= cost;
            document.getElementById('player').innerText = icon;
            pSpeed = 7 * speed; gMult = mult;
            document.getElementById('btn-' + id).disabled = true;
            updateUI();
        }
    }

    function endGame() {
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('final-gold').innerText = "TOTAL GULD: " + Math.floor(money);
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money);
        document.getElementById('menu-money').innerText = Math.floor(money);
        document.getElementById('lvl').innerText = lvl + "/20";
        document.getElementById('m-hp-fill').style.width = (mHP/mMaxHP*100) + "%";
        
        document.getElementById('btn-ninja').disabled = money < 1000;
        document.getElementById('btn-king').disabled = money < 5000;
    }

    function loop() {
        if(!inMenu) {
            if(keys['ArrowUp'] || keys['KeyW']) py -= pSpeed;
            if(keys['ArrowDown'] || keys['KeyS']) py += pSpeed;
            if(keys['ArrowLeft'] || keys['KeyA']) px -= pSpeed;
            if(keys['ArrowRight'] || keys['KeyD']) px += pSpeed;
            
            px = Math.max(0, Math.min(window.innerWidth-45, px));
            py = Math.max(0, Math.min(window.innerHeight-100, py));
            document.getElementById('player').style.left = px + 'px';
            document.getElementById('player').style.top = py + 'px';

            particles.forEach((p, i) => {
                p.vy += 0.5; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                p.el.style.left = p.x+'px'; p.el.style.top = p.y+'px'; p.el.style.opacity = p.life;
                if(p.life <= 0) { p.el.remove(); particles.splice(i, 1); }
            });
        }
        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
    updateUI();
</script>
</body>
</html>
