<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Fortnite Velocity</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --fortnite-blue: #007bff; --gold: #ffd700; --fuel: #ff9f43; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Bangers', cursive; color: white; }

        /* Sonic-style Scrolling Baggrund */
        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            background: linear-gradient(#1e90ff, #70a1ff);
            overflow: hidden;
        }

        #scrolling-bg {
            position: absolute; width: 200%; height: 100%;
            background-image: url('https://transparenttextures.com');
            opacity: 0.1; animation: scrollBg 10s linear infinite;
        }
        @keyframes scrollBg { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Jorden */
        #ground { 
            position: absolute; bottom: 0; width: 100%; height: 50px; 
            background: #2ed573; border-top: 5px solid #26ae60; z-index: 10;
        }

        /* Zander med Jetpack */
        #player {
            position: absolute; width: 60px; height: 60px;
            left: 100px; bottom: 50px; font-size: 45px;
            z-index: 20; display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s;
        }
        .flame {
            position: absolute; bottom: -10px; width: 10px; height: 20px;
            background: orange; border-radius: 50%; opacity: 0;
            filter: blur(2px); animation: flicker 0.1s infinite;
        }
        @keyframes flicker { 0% { height: 15px; } 100% { height: 25px; opacity: 1; } }

        /* UI / Fortnite HUD */
        #hud { position: fixed; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; z-index: 100; pointer-events: none; }
        .fortnite-card { background: rgba(0,0,0,0.7); border: 3px solid var(--fortnite-blue); padding: 10px 20px; border-radius: 10px; transform: skew(-10deg); }
        
        #fuel-wrap { position: fixed; bottom: 80px; left: 100px; width: 60px; height: 10px; background: #333; border: 2px solid #fff; }
        #fuel-fill { height: 100%; width: 100%; background: var(--fuel); transition: 0.1s; }

        /* Menu */
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .shop-btn { background: var(--fortnite-blue); color: white; border: none; padding: 15px 40px; font-family: 'Bangers'; font-size: 1.5rem; cursor: pointer; margin: 10px; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); }
        .shop-btn:hover { background: white; color: var(--fortnite-blue); }

        /* Combat VFX */
        .hitmarker { position: absolute; color: red; font-weight: bold; font-size: 20px; pointer-events: none; animation: popOut 0.3s forwards; }
        @keyframes popOut { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        .bullet { position: absolute; width: 25px; height: 6px; background: #ffff00; border-radius: 3px; box-shadow: 0 0 10px #ffff00; }
        .monster { position: absolute; font-size: 50px; z-index: 15; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="scrolling-bg"></div>
    <div id="ground"></div>
    
    <div id="player">
        👨
        <div class="flame" id="flame-l" style="left: 10px;"></div>
        <div class="flame" id="flame-r" style="right: 10px;"></div>
    </div>
</div>

<div id="hud">
    <div class="fortnite-card">GULD: <span id="money-ui" style="color:var(--gold)">0</span></div>
    <div class="fortnite-card">SEKTOR: <span id="lvl-ui">1</span></div>
    <div class="fortnite-card">HP: <span id="hp-ui" style="color: #2ed573;">100</span></div>
</div>

<div id="fuel-wrap"><div id="fuel-fill"></div></div>

<div id="menu">
    <h1 style="font-size: 5rem; color: var(--fortnite-blue);">VAULT SHOP</h1>
    <button class="shop-btn" onclick="buy('dmg')">MERE DAMAGE (300 GULD)</button>
    <button class="shop-btn" onclick="buyAvatar('🤖', 1000)">CYBORG SKIN (1000)</button>
    <button class="shop-btn" onclick="buyAvatar('👑', 5000)">GALAXY KING (5000)</button>
    <p>TRYK ESC FOR AT FORTSÆTTE</p>
</div>

<script>
    let money = 0, lvl = 1, hp = 100, pDmg = 50, pSpeed = 8, fuel = 100;
    let px = 100, py = 0, vy = 0;
    let monsters = [], bullets = [];
    let inMenu = false;
    const keys = {};

    window.addEventListener('keydown', e => {
        if(e.code === 'Escape') toggleMenu();
        if(e.code === 'Enter' && !inMenu) fire();
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function toggleMenu() {
        inMenu = !inMenu;
        document.getElementById('menu').style.display = inMenu ? 'flex' : 'none';
    }

    function fire() {
        const b = document.createElement('div');
        b.className = 'bullet';
        document.getElementById('game-container').appendChild(b);
        bullets.push({ el: b, x: px + 60, y: window.innerHeight - 100 - py, vx: 25 });
    }

    function buy(type) {
        if(money >= 300) { money -= 300; pDmg += 50; toggleMenu(); }
    }

    function buyAvatar(icon, cost) {
        if(money >= cost) { money -= cost; document.getElementById('player').firstChild.textContent = icon; toggleMenu(); }
    }

    function createHitmarker(x, y) {
        const h = document.createElement('div');
        h.className = 'hitmarker';
        h.innerText = '✕';
        h.style.left = x + 'px'; h.style.top = y + 'px';
        document.getElementById('game-container').appendChild(h);
        setTimeout(() => h.remove(), 300);
    }

    function spawnMonster() {
        if(monsters.length > 3 + lvl) return;
        const el = document.createElement('div');
        el.className = 'monster';
        el.innerText = ['🧟', '👺', '👾'][Math.floor(Math.random()*3)];
        document.getElementById('game-container').appendChild(el);
        monsters.push({
            el, x: window.innerWidth + 100, y: Math.random() * (window.innerHeight - 150),
            hp: 100 * lvl, speed: 4 + (lvl * 0.5)
        });
    }

    function loop() {
        if(!inMenu) {
            // Jetpack Flyvning (Fortnite inspiration)
            let thrusting = false;
            if(keys['ArrowUp'] && fuel > 0) {
                vy = 8;
                fuel -= 1.5;
                thrusting = true;
            } else if(keys['ArrowDown']) {
                vy = -8;
            } else {
                vy *= 0.9; // Glidende stop
            }

            // Flamme-effekt
            document.getElementById('flame-l').style.opacity = thrusting ? '1' : '0';
            document.getElementById('flame-r').style.opacity = thrusting ? '1' : '0';

            py += vy;
            
            // Grænser og Fuel-regen
            if(py <= 0) { py = 0; fuel = Math.min(100, fuel + 1); }
            if(py > window.innerHeight - 120) py = window.innerHeight - 120;

            const pEl = document.getElementById('player');
            pEl.style.bottom = (50 + py) + 'px';
            document.getElementById('fuel-fill').style.width = fuel + "%";

            // Monstre
            if(Math.random() < 0.02) spawnMonster();
            monsters.forEach((m, mi) => {
                m.x -= m.speed;
                m.el.style.left = m.x + 'px';
                m.el.style.top = m.y + 'px';
                
                // Collision
                if(m.x < px + 50 && m.x > px - 20 && (window.innerHeight - py - 100) < m.y + 50 && (window.innerHeight - py - 100) > m.y - 50) {
                    hp -= 1;
                    if(hp <= 0) location.reload();
                }
                if(m.x < -100) { m.el.remove(); monsters.splice(mi, 1); }
            });

            // Skud
            bullets.forEach((b, bi) => {
                b.x += b.vx;
                b.el.style.left = b.x + 'px';
                b.el.style.top = b.y + 'px';
                monsters.forEach((m, mi) => {
                    if(b.x > m.x && b.x < m.x + 80 && b.y > m.y && b.y < m.y + 80) {
                        m.hp -= pDmg;
                        createHitmarker(b.x, b.y);
                        b.el.remove(); bullets.splice(bi, 1);
                        if(m.hp <= 0) {
                            m.el.remove(); monsters.splice(mi, 1);
                            money += 200;
                            if(money % 1000 === 0) lvl++;
                        }
                    }
                });
                if(b.x > window.innerWidth) { b.el.remove(); bullets.splice(bi, 1); }
            });

            // Opdater UI
            document.getElementById('money-ui').innerText = money;
            document.getElementById('lvl-ui').innerText = lvl;
            document.getElementById('hp-ui').innerText = Math.floor(hp);
        }
        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
