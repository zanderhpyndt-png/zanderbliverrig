<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Particle Hunter</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --blue: #00a8ff; --red: #ff4757; }
        body { margin: 0; background: #080808; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; user-select: none; }

        #hud {
            position: fixed; top: 0; width: 100%; padding: 15px;
            display: flex; justify-content: space-around;
            background: rgba(0,0,0,0.9); z-index: 100; border-bottom: 2px solid #333;
        }
        .stat b { color: var(--gold); font-family: 'Orbitron'; }

        #game-container { position: relative; width: 100vw; height: 100vh; background: #050505; }

        #player {
            position: absolute; width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            font-size: 25px; border-radius: 8px; z-index: 10;
        }

        #monster {
            position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%);
            width: 180px; height: 180px; background: #1a1a1a;
            border-radius: 50%; box-shadow: 0 0 60px var(--red);
            display: flex; justify-content: center; align-items: center; z-index: 5;
            transition: transform 0.05s;
        }

        /* Partikler */
        .particle {
            position: absolute; width: 6px; height: 6px;
            background: var(--red); border-radius: 50%;
            pointer-events: none; z-index: 15;
            animation: explode 0.6s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        .bullet { position: absolute; border-radius: 50%; z-index: 8; }
        .m-bullet { width: 12px; height: 12px; background: var(--red); box-shadow: 0 0 10px red; }
        .p-bullet { width: 10px; height: 10px; background: #fff; box-shadow: 0 0 10px var(--blue); }

        #shop-sidebar {
            position: fixed; left: 0; top: 75px; bottom: 0;
            width: 220px; background: rgba(15, 15, 15, 0.95);
            padding: 15px; border-right: 2px solid #444; overflow-y: auto; z-index: 100;
        }
        .item { background: #222; padding: 10px; margin: 8px 0; border-radius: 6px; font-size: 0.8rem; }
        button { width: 100%; background: var(--gold); border: none; padding: 6px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        .hp-container { width: 200px; height: 12px; background: #222; border: 1px solid #555; position: absolute; top: -30px; left: -10px; }
        .hp-fill { height: 100%; width: 100%; transition: 0.1s; }
        #p-hp-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 400px; height: 20px; background: #111; border: 2px solid white; z-index: 100; }
    </style>
</head>
<body>

<div id="hud">
    <div class="stat">GULD: <b id="money">0</b></div>
    <div class="stat">SKADE: <b id="stat-dmg">1</b></div>
    <div class="stat">LVL: <b id="lvl">1</b></div>
</div>

<div id="shop-sidebar">
    <div class="item"><b>Træn Muskler (+2)</b><button onclick="buy('dmg', 75)">75 kr</button></div>
    <div class="item"><b>Super Skud (+10)</b><button onclick="buy('big-dmg', 500)">500 kr</button></div>
    <div class="item"><b>Auto-Pistol</b><button id="btn-pistol" onclick="buy('pistol', 150)">150 kr</button></div>
    <div class="item"><b>Heal Full HP</b><button onclick="buy('heal', 40)">40 kr</button></div>
    <p style="font-size: 0.7rem; color: #888; margin-top: 20px;">TIP: Tryk på ENTER for at angribe monsteret lynhurtigt!</p>
</div>

<div id="game-container">
    <div id="player" style="background: var(--blue); box-shadow: 0 0 15px var(--blue);">🟦</div>
    <div id="monster" onclick="attackMonster(event)">
        <div class="hp-container"><div id="m-hp-fill" class="hp-fill" style="background: var(--red);"></div></div>
        <div id="m-icon" style="font-size: 70px;">👺</div>
    </div>
</div>

<div id="p-hp-bar"><div id="p-hp-fill" class="hp-fill" style="background: #2ecc71;"></div></div>

<script>
    let money = 0, lvl = 1, pHP = 100, pMaxHP = 100, pDmg = 1, pSpeed = 6, weaponOwned = false, lastAutoFire = 0;
    let mHP = 50, mMaxHP = 50, px = window.innerWidth/2, py = window.innerHeight-150;
    const keys = {}, mBullets = [], pBullets = [];

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'Enter') attackMonster();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function attackMonster(e) {
        const mRect = document.getElementById('monster').getBoundingClientRect();
        const centerX = mRect.left + mRect.width/2;
        const centerY = mRect.top + mRect.height/2;
        
        // Lav partikler
        for(let i=0; i<8; i++) createParticle(centerX, centerY);
        
        // Ryst monster
        document.getElementById('monster').style.transform = `translate(-50%, -50%) scale(0.9) rotate(${Math.random()*10-5}deg)`;
        setTimeout(() => document.getElementById('monster').style.transform = `translate(-50%, -50%) scale(1)`, 50);

        damageMonster(pDmg);
    }

    function createParticle(x, y) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        p.style.setProperty('--dx', (Math.random()*200-100) + 'px');
        p.style.setProperty('--dy', (Math.random()*200-100) + 'px');
        document.getElementById('game-container').appendChild(p);
        setTimeout(() => p.remove(), 600);
    }

    function damageMonster(amt) {
        mHP -= amt;
        money += amt;
        if(mHP <= 0) {
            lvl++;
            mMaxHP = Math.round(50 * Math.pow(1.3, lvl));
            mHP = mMaxHP;
            money += 100;
            document.getElementById('m-icon').innerText = ['👹', '👽', '👾', '🧛', '🐲'][lvl % 5];
        }
        updateUI();
    }

    function buy(type, cost) {
        if(money >= cost) {
            money -= cost;
            if(type === 'dmg') pDmg += 2;
            if(type === 'big-dmg') pDmg += 10;
            if(type === 'pistol') { weaponOwned = true; document.getElementById('btn-pistol').disabled = true; }
            if(type === 'heal') pHP = pMaxHP;
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money);
        document.getElementById('lvl').innerText = lvl;
        document.getElementById('stat-dmg').innerText = pDmg;
        document.getElementById('m-hp-fill').style.width = (mHP/mMaxHP*100) + "%";
        document.getElementById('p-hp-fill').style.width = pHP + "%";
    }

    function loop(time) {
        if(keys['ArrowUp'] || keys['KeyW']) py -= pSpeed;
        if(keys['ArrowDown'] || keys['KeyS']) py += pSpeed;
        if(keys['ArrowLeft'] || keys['KeyA']) px -= pSpeed;
        if(keys['ArrowRight'] || keys['KeyD']) px += pSpeed;

        px = Math.max(0, Math.min(window.innerWidth - 40, px));
        py = Math.max(0, Math.min(window.innerHeight - 100, py));
        document.getElementById('player').style.left = px + 'px';
        document.getElementById('player').style.top = py + 'px';

        if(weaponOwned && time - lastAutoFire > 600) { fireBullet('player'); lastAutoFire = time; }
        if(Math.random() < 0.02 + (lvl * 0.003)) fireBullet('monster');

        updateBullets();
        requestAnimationFrame(loop);
    }

    function fireBullet(who) {
        const b = document.createElement('div');
        b.className = 'bullet ' + (who === 'player' ? 'p-bullet' : 'm-bullet');
        const mRect = document.getElementById('monster').getBoundingClientRect();
        let startX, startY, angle;

        if(who === 'player') {
            startX = px + 20; startY = py + 20;
            angle = Math.atan2((mRect.top + 90) - py, (mRect.left + 90) - px);
            pBullets.push({ el: b, x: startX, y: startY, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
        } else {
            startX = mRect.left + 90; startY = mRect.top + 90;
            angle = Math.atan2(py - startY, px - startX);
            mBullets.push({ el: b, x: startX, y: startY, vx: Math.cos(angle) * (4 + lvl * 0.2), vy: Math.sin(angle) * (4 + lvl * 0.2) });
        }
        document.getElementById('game-container').appendChild(b);
    }

    function updateBullets() {
        pBullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
            const mRect = document.getElementById('monster').getBoundingClientRect();
            if(b.x > mRect.left && b.x < mRect.right && b.y > mRect.top && b.y < mRect.bottom) {
                damageMonster(pDmg); createParticle(b.x, b.y); b.el.remove(); pBullets.splice(i, 1);
            }
        });
        mBullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
            if(b.x > px && b.x < px + 40 && b.y > py && b.y < py + 40) {
                pHP -= 10; updateUI(); b.el.remove(); mBullets.splice(i, 1);
                if(pHP <= 0) { alert("Zander faldt! Level: " + lvl); location.reload(); }
            }
        });
    }

    updateUI();
    requestAnimationFrame(loop);
</script>
</body>
</html>
