<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: The Final Sector</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --red: #ff4757; --blue: #00a8ff; --neon: #0ff; }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; user-select: none; }

        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
        }

        #win-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ffd700, #000);
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 1000; text-align: center;
        }

        .hud {
            position: fixed; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-around;
            background: linear-gradient(to bottom, black, transparent); z-index: 100;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #111, #000); }

        #monster {
            position: absolute; left: 50%; top: 75%; transform: translate(-50%, -50%);
            width: 180px; height: 180px; background: #111;
            border-radius: 50%; box-shadow: 0 0 50px rgba(255,0,0,0.4);
            display: flex; justify-content: center; align-items: center; z-index: 40;
            border: 3px solid #333; transition: 0.1s;
        }

        #player {
            position: absolute; width: 45px; height: 45px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; border-radius: 10px; z-index: 60;
            background: #111; border: 2px solid var(--blue);
            box-shadow: 0 0 20px var(--blue);
        }

        .btn {
            background: #1a1a1a; color: var(--gold); border: 2px solid var(--gold);
            padding: 12px 25px; cursor: pointer; font-family: 'Orbitron';
            margin: 10px; border-radius: 5px; transition: 0.2s;
        }
        .btn:hover { background: var(--gold); color: black; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }

        .hp-bar-bg { width: 100%; height: 8px; background: #000; margin-top: 10px; border-radius: 5px; overflow: hidden; }
        .hp-fill { height: 100%; background: var(--red); width: 100%; transition: 0.1s; }
        
        .bullet { position: absolute; border-radius: 50%; z-index: 55; }
        .m-bullet { width: 12px; height: 12px; background: var(--red); box-shadow: 0 0 15px var(--red); }
        .particle { position: absolute; width: 4px; height: 4px; background: var(--red); pointer-events: none; }
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 style="color: var(--gold); font-size: 2.5rem;">AVATAR SHOP</h1>
    <p>DIN FORMUE: <span id="menu-money">0</span> KR</p>
    <div style="display: flex; gap: 20px; margin-top: 20px;">
        <div class="shop-item" style="text-align:center;">
            <div style="font-size:40px">🥷</div>
            <button class="btn" id="btn-ninja" onclick="buySkin('ninja', 800, '🥷', '#2ecc71', 1.8, 4)">CYBER NINJA (800)</button>
        </div>
        <div class="shop-item" style="text-align:center;">
            <div style="font-size:40px">🤖</div>
            <button class="btn" id="btn-robot" onclick="buySkin('robot', 2000, '🤖', '#95a5a6', 1.0, 10)">WAR BOT (2000)</button>
        </div>
        <div class="shop-item" style="text-align:center;">
            <div style="font-size:40px">👑</div>
            <button class="btn" id="btn-king" onclick="buySkin('king', 5000, '👑', '#f1c40f', 1.3, 20)">UNIVERSE KING (5000)</button>
        </div>
    </div>
    <p style="margin-top:40px; font-size: 0.8rem; color: #666;">Tryk ESCAPE for at fortsætte kampen</p>
</div>

<div id="win-screen">
    <h1 style="font-family: 'Press Start 2P';">MISSION COMPLETE</h1>
    <p>Zander har overtaget alle sektorer.</p>
    <h2 id="final-gold"></h2>
    <button class="btn" onclick="location.reload()">GENSTART</button>
</div>

<div class="hud">
    <div>GULD: <b id="money">0</b></div>
    <div>SEKTOR: <b id="lvl">1/20</b></div>
    <div style="color: #4cd137;">LIV: <b id="p-hp">100</b></div>
</div>

<div id="game-container">
    <div id="player">🟦</div>
    <div id="monster" onclick="attackMonster()">
        <div style="position: absolute; top: -50px; width: 180px; text-align: center;">
            <div class="hp-bar-bg"><div id="m-hp-fill" class="hp-fill"></div></div>
        </div>
        <div id="m-icon" style="font-size: 70px;">💀</div>
    </div>
</div>

<script>
    let money = 0, lvl = 1, pHP = 100, pMaxHP = 100, pDmg = 6, pSpeed = 7, gMult = 2, monsterAlive = true, inMenu = false;
    let mHP = 60, mMaxHP = 60, px = window.innerWidth/2, py = 100;
    const keys = {}, mBullets = [], particles = [];

    window.addEventListener('keydown', e => {
        if(e.code === 'Escape') inMenu ? closeMenu() : openMenu();
        keys[e.code] = true;
        if(e.code === 'Enter' && monsterAlive && !inMenu) attackMonster();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function openMenu() { inMenu = true; document.getElementById('menu-overlay').style.display = 'flex'; updateUI(); }
    function closeMenu() { inMenu = false; document.getElementById('menu-overlay').style.display = 'none'; }

    function attackMonster() {
        if(!monsterAlive || inMenu) return;
        const mR = document.getElementById('monster').getBoundingClientRect();
        for(let i=0; i<8; i++) spawnParticle(mR.left + 90, mR.top + 90);
        
        mHP -= pDmg;
        money += pDmg * gMult;
        if(mHP <= 0) killMonster();
        updateUI();
    }

    function killMonster() {
        monsterAlive = false;
        money += 400 * lvl;
        if(lvl >= 20) endGame();
        else setTimeout(nextLevel, 2000);
    }

    function nextLevel() {
        lvl++;
        mMaxHP = Math.round(60 * Math.pow(1.35, lvl));
        mHP = mMaxHP;
        monsterAlive = true;
        document.getElementById('m-icon').innerText = ['💀', '👾', '👹', '👽', '🤖'][lvl % 5];
        updateUI();
    }

    function spawnParticle(x, y) {
        const p = { el: document.createElement('div'), x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.8)*12, life: 1 };
        p.el.className = 'particle'; document.getElementById('game-container').appendChild(p.el);
        particles.push(p);
    }

    function fireMonsterBullet() {
        if(!monsterAlive || inMenu) return;
        const b = document.createElement('div');
        b.className = 'bullet m-bullet';
        const mR = document.getElementById('monster').getBoundingClientRect();
        const startX = mR.left + 90, startY = mR.top + 90;
        const ang = Math.atan2(py - startY, px - startX);
        
        mBullets.push({ 
            el: b, x: startX, y: startY, 
            vx: Math.cos(ang) * (4 + lvl * 0.4), 
            vy: Math.sin(ang) * (4 + lvl * 0.4) 
        });
        document.getElementById('game-container').appendChild(b);
    }

    function buySkin(id, cost, icon, color, speed, mult) {
        if(money >= cost) {
            money -= cost;
            const p = document.getElementById('player');
            p.innerText = icon;
            p.style.border = `2px solid ${color}`;
            p.style.boxShadow = `0 0 20px ${color}`;
            pSpeed = 7 * speed; gMult = mult;
            document.getElementById('btn-' + id).disabled = true;
            updateUI();
        }
    }

    function endGame() {
        document.getElementById('win-screen').style.display = 'flex';
        document.getElementById('final-gold').innerText = "FORMUE: " + Math.floor(money) + " KR";
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money);
        document.getElementById('menu-money').innerText = Math.floor(money);
        document.getElementById('lvl').innerText = lvl + "/20";
        document.getElementById('p-hp').innerText = Math.floor(pHP);
        document.getElementById('m-hp-fill').style.width = (mHP/mMaxHP*100) + "%";
        
        document.getElementById('btn-ninja').disabled = money < 800;
        document.getElementById('btn-robot').disabled = money < 2000;
        document.getElementById('btn-king').disabled = money < 5000;
    }

    function loop() {
        if(!inMenu) {
            if(keys['ArrowUp'] || keys['KeyW']) py -= pSpeed;
            if(keys['ArrowDown'] || keys['KeyS']) py += pSpeed;
            if(keys['ArrowLeft'] || keys['KeyA']) px -= pSpeed;
            if(keys['ArrowRight'] || keys['KeyD']) px += pSpeed;
            
            px = Math.max(0, Math.min(window.innerWidth-45, px));
            py = Math.max(0, Math.min(window.innerHeight-100, py));
            document.getElementById('player').style.left = px + 'px';
            document.getElementById('player').style.top = py + 'px';

            if(monsterAlive && Math.random() < 0.02 + (lvl*0.002)) fireMonsterBullet();

            mBullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.left = b.x+'px'; b.el.style.top = b.y+'px';
                if(b.x > px && b.x < px+45 && b.y > py && b.y < py+45) {
                    pHP -= 10; updateUI(); b.el.remove(); mBullets.splice(i, 1);
                    if(pHP <= 0) { alert("MISSION FAILED!"); location.reload(); }
                } else if(b.y > window.innerHeight || b.y < 0) { b.el.remove(); mBullets.splice(i, 1); }
            });

            particles.forEach((p, i) => {
                p.vy += 0.5; p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                p.el.style.left = p.x+'px'; p.el.style.top = p.y+'px'; p.el.style.opacity = p.life;
                if(p.life <= 0) { p.el.remove(); particles.splice(i, 1); }
            });
        }
        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
    updateUI();
</script>
</body>
</html>
