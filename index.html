<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Nightmare Swarm</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --blood: #8e0000; --fog: #0a0a0a; }
        body { margin: 0; background: #000; color: white; font-family: 'Arial', sans-serif; overflow: hidden; user-select: none; }

        /* Lommelygte/Mørke effekt */
        #flashlight {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle 200px at var(--x) var(--y), transparent 0%, rgba(0,0,0,0.98) 100%);
            z-index: 100; pointer-events: none;
        }

        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 500;
        }

        .hud {
            position: fixed; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-around;
            background: linear-gradient(to bottom, rgba(0,0,0,1), transparent); z-index: 150;
            font-family: 'Orbitron'; border-bottom: 1px solid #222;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #050505; }

        #player { position: absolute; width: 50px; height: 60px; font-size: 40px; z-index: 60; text-align: center; }

        .monster {
            position: absolute; width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            z-index: 40; filter: drop-shadow(0 0 10px var(--blood));
            font-size: 60px;
        }

        .shop-box { background: #111; padding: 20px; border: 1px solid #333; border-radius: 10px; text-align: center; }
        .btn {
            background: #000; color: #fff; border: 1px solid #444;
            padding: 12px; cursor: pointer; font-family: 'Orbitron';
            margin: 5px; width: 95%; border-radius: 5px; transition: 0.2s;
        }
        .btn:hover:not(:disabled) { border-color: red; color: red; }

        /* Partikler */
        .p-bullet { position: absolute; width: 6px; height: 6px; background: #00f2ff; border-radius: 50%; box-shadow: 0 0 10px #00f2ff; z-index: 55; }
        .m-bullet { position: absolute; width: 10px; height: 10px; background: red; border-radius: 50%; z-index: 55; box-shadow: 0 0 10px red; }
        .hit-particle { position: absolute; width: 3px; height: 3px; background: orange; border-radius: 50%; pointer-events: none; z-index: 70; }

        #area-text { font-family: 'Creepster'; color: #440000; font-size: 2.5rem; position: fixed; bottom: 20px; left: 20px; z-index: 120; }
    </style>
</head>
<body>

<div id="flashlight"></div>
<div id="area-text">DE DØDES MARK</div>

<div id="menu-overlay">
    <h1 style="color: var(--blood); font-family: 'Creepster'; font-size: 5rem; margin: 0;">OVERLEV</h1>
    <p style="font-family: 'Orbitron';">GULD: <b id="menu-money" style="color:var(--gold)">0</b></p>
    <div class="shop-box">
        <button class="btn" id="btn-dmg" onclick="buy('dmg')">LYSENDE AMMO [<span id="price-dmg">200</span>]</button>
        <button class="btn" id="btn-auto" onclick="buy('auto')">SØGE-DRONE [<span id="price-auto">1000</span>]</button>
        <button class="btn" onclick="buy('heal')">MEDKIT [150]</button>
        <div style="margin-top: 20px;">
             <button class="btn" onclick="buySkin('ninja', 1000, '🥷', 1.5, 3)">NINJA-GEAR (1000)</button>
             <button class="btn" onclick="buySkin('king', 5000, '👑', 1.1, 10)">KONGESKRIDT (5000)</button>
        </div>
    </div>
    <button class="btn" style="width: 200px; margin-top: 30px; background: var(--blood);" onclick="closeMenu()">FORTSÆT MARERIDTET</button>
</div>

<div class="hud">
    <div>GULD: <b id="money" style="color: var(--gold);">0</b></div>
    <div>SEKTOR: <b id="lvl">1/20</b></div>
    <div style="color: #4cd137;">LIV: <b id="p-hp">100</b></div>
</div>

<div id="game-container">
    <div id="player">👨</div>
</div>

<script>
    let money = 0, lvl = 0, pHP = 100, pDmg = 15, pSpeed = 6, gMult = 2, inMenu = true;
    let px = window.innerWidth/2, py = window.innerHeight/2;
    let prices = { dmg: 200, auto: 1000 };
    let autoOwned = false, lastAuto = 0;
    
    const keys = {}, monsters = [], mBullets = [], pBullets = [], hitParticles = [];
    const container = document.getElementById('game-container');

    // Opdater lommelygte position
    window.addEventListener('mousemove', e => {
        document.documentElement.style.setProperty('--x', e.clientX + 'px');
        document.documentElement.style.setProperty('--y', e.clientY + 'px');
    });

    window.addEventListener('keydown', e => {
        if(e.code === 'Escape') inMenu ? closeMenu() : openMenu();
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function openMenu() { 
        inMenu = true; 
        document.getElementById('menu-overlay').style.display = 'flex'; 
        document.getElementById('menu-money').innerText = Math.floor(money);
    }
    
    function closeMenu() { 
        inMenu = false; 
        document.getElementById('menu-overlay').style.display = 'none'; 
        if(monsters.length === 0) spawnSwarm();
    }

    function spawnSwarm() {
        lvl++;
        const count = 1 + Math.floor(lvl / 4); // Flere monstre hver 4. level
        for(let i=0; i < count; i++) {
            createMonster();
        }
    }

    function createMonster() {
        const el = document.createElement('div');
        el.className = 'monster';
        el.innerText = ['👻', '👹', '🧟', '🕷️'][Math.floor(Math.random()*4)];
        container.appendChild(el);
        
        const side = Math.random() > 0.5;
        monsters.push({
            el: el,
            x: side ? -100 : window.innerWidth + 100,
            y: Math.random() * window.innerHeight,
            hp: 50 * Math.pow(1.3, lvl),
            maxHp: 50 * Math.pow(1.3, lvl)
        });
    }

    function buy(type) {
        if(type === 'heal' && money >= 150) { money -= 150; pHP = 100; }
        if(money >= prices[type]) {
            money -= prices[type];
            if(type === 'dmg') { pDmg += 15; prices.dmg = Math.round(prices.dmg * 1.8); }
            if(type === 'auto') { autoOwned = true; prices.auto = Math.round(prices.auto * 2); }
        }
        document.getElementById('price-dmg').innerText = prices.dmg;
        document.getElementById('price-auto').innerText = prices.auto;
        document.getElementById('menu-money').innerText = Math.floor(money);
    }

    function buySkin(id, cost, icon, speed, mult) {
        if(money >= cost) {
            money -= cost;
            document.getElementById('player').innerText = icon;
            pSpeed = 6 * speed; gMult = mult;
            document.getElementById('menu-money').innerText = Math.floor(money);
        }
    }

    function createHitParticle(x, y) {
        for(let i=0; i<5; i++) {
            const p = document.createElement('div');
            p.className = 'hit-particle';
            p.style.left = x + 'px'; p.style.top = y + 'px';
            container.appendChild(p);
            hitParticles.push({ el: p, x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1 });
        }
    }

    function loop(time) {
        if(!inMenu) {
            if(keys['ArrowUp'] || keys['KeyW']) py -= pSpeed;
            if(keys['ArrowDown'] || keys['KeyS']) py += pSpeed;
            if(keys['ArrowLeft'] || keys['KeyA']) px -= pSpeed;
            if(keys['ArrowRight'] || keys['KeyD']) px += pSpeed;
            
            const pEl = document.getElementById('player');
            pEl.style.left = px + 'px'; pEl.style.top = py + 'px';

            // Monstre forfølger
            monsters.forEach((m, i) => {
                const dx = px - m.x, dy = py - m.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                m.x += (dx/dist) * (1.5 + lvl*0.1);
                m.y += (dy/dist) * (1.5 + lvl*0.1);
                m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';

                if(dist < 50) { pHP -= 0.5; } // Berøring skader

                if(Math.random() < 0.01 + (lvl*0.001)) { // Skyd
                    const b = document.createElement('div');
                    b.className = 'm-bullet';
                    container.appendChild(b);
                    mBullets.push({ el: b, x: m.x+30, y: m.y+30, vx: (dx/dist)*6, vy: (dy/dist)*6 });
                }
            });

            // Auto-fire partikel skud
            if(autoOwned && monsters.length > 0 && time - lastAuto > 500) {
                const target = monsters[0];
                const b = document.createElement('div');
                b.className = 'p-bullet';
                container.appendChild(b);
                const ang = Math.atan2(target.y - py, target.x - px);
                pBullets.push({ el: b, x: px+20, y: py+20, vx: Math.cos(ang)*12, vy: Math.sin(ang)*12 });
                lastAuto = time;
            }

            // Opdater skud & Partikler
            pBullets.forEach((b, bi) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
                monsters.forEach((m, mi) => {
                    if(b.x > m.x && b.x < m.x+80 && b.y > m.y && b.y < m.y+80) {
                        m.hp -= pDmg; money += 5 * gMult;
                        createHitParticle(b.x, b.y);
                        b.el.remove(); pBullets.splice(bi, 1);
                        if(m.hp <= 0) {
                            m.el.remove(); monsters.splice(mi, 1);
                            money += 200;
                            if(monsters.length === 0) setTimeout(openMenu, 1000);
                        }
                    }
                });
            });

            mBullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
                if(b.x > px && b.x < px+50 && b.y > py && b.y < py+60) {
                    pHP -= (5 + lvl); b.el.remove(); mBullets.splice(i, 1);
                }
            });

            hitParticles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                p.el.style.left = p.x + 'px'; p.el.style.top = p.y + 'px'; p.el.style.opacity = p.life;
                if(p.life <= 0) { p.el.remove(); hitParticles.splice(i, 1); }
            });

            document.getElementById('money').innerText = Math.floor(money);
            document.getElementById('lvl').innerText = lvl;
            document.getElementById('p-hp').innerText = Math.floor(pHP);
            if(pHP <= 0) { alert("Mørket vandt..."); location.reload(); }
        }
        requestAnimationFrame(loop);
    }

    openMenu();
    requestAnimationFrame(loop);
</script>
</body>
</html>
