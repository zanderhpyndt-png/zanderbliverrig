<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZANDER FIFA 3D PRO</title>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        #ui { position: fixed; top: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 10; }
        
        .hud { padding: 20px; display: flex; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
        .stat-box { text-align: center; border-bottom: 3px solid gold; padding: 10px; min-width: 120px; }
        .stat-box b { font-size: 1.5rem; display: block; color: gold; }

        #power-container { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); width: 300px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 10px; display: none; }
        #power-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00ff00, #ff0000); border-radius: 8px; }

        #msg-container { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; }
        #msg-text { font-size: 6rem; font-weight: 900; text-transform: uppercase; text-shadow: 0 0 20px black; }

        #shop-btn { position: fixed; bottom: 20px; right: 20px; pointer-events: auto; background: gold; color: black; border: none; padding: 15px 30px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #shop-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; pointer-events: auto; flex-direction: column; align-items: center; justify-content: center; }
        .skin-card { background: #222; border: 2px solid gold; padding: 20px; margin: 10px; cursor: pointer; text-align: center; transition: 0.3s; }
        .skin-card:hover { transform: scale(1.1); }
    </style>
</head>
<body>

<div id="ui">
    <div class="hud">
        <div class="stat-box">MÅL<b id="score">0</b></div>
        <div class="stat-box">GULD<b id="gold">0</b></div>
        <div class="stat-box">LEVEL<b id="lvl">1</b></div>
    </div>

    <div id="msg-container"><h1 id="msg-text">MÅÅÅL!</h1></div>
    <div id="power-container"><div id="power-fill"></div></div>
    
    <button id="shop-btn" onclick="toggleShop()">🛒 BOLD SHOP</button>
</div>

<div id="shop-menu">
    <h1 style="color: gold;">VÆLG DIN BOLD</h1>
    <div style="display: flex;">
        <div class="skin-card" onclick="setSkin(0xffffff, 0)"><b>Standard</b><br>Gratis</div>
        <div class="skin-card" onclick="setSkin(0xffd700, 500)"><b>Guld Bold</b><br>500 Guld</div>
        <div class="skin-card" onclick="setSkin(0xff00ff, 1500)"><b>Neon Bold</b><br>1500 Guld</div>
    </div>
    <button id="shop-btn" onclick="toggleShop()" style="position: static; margin-top: 50px;">LUK</button>
</div>

<script>
    let scene, camera, renderer, ball, goalie, goal, floor;
    let score = 0, gold = 0, level = 1, power = 0, isCharging = false;
    let ballVelocity = new THREE.Vector3(), ballSpin = 0;
    let ballMoving = false, isDiving = false;
    let mouseX = 0, lastMouseX = 0;
    let ballColor = 0xffffff;

    const netDepth = -21;
    const goalWidth = 10;
    const goalHeight = 5;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0f);
        scene.fog = new THREE.Fog(0x0a0a0f, 10, 80);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 12);
        camera.lookAt(0, 2, -5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- LYS (Stadion spots) ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);

        const spot1 = new THREE.SpotLight(0xffffff, 1);
        spot1.position.set(10, 20, 10);
        spot1.castShadow = true;
        scene.add(spot1);

        // --- GRÆSBANE ---
        const grassGeo = new THREE.PlaneGeometry(100, 100);
        const grassMat = new THREE.MeshPhongMaterial({ 
            color: 0x27ae60,
            specular: 0x000000,
            shininess: 0
        });
        floor = new THREE.Mesh(grassGeo, grassMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- MÅLET ---
        goal = new THREE.Group();
        const postMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.3, goalHeight, 0.3), postMat);
        leftPost.position.set(-goalWidth/2, goalHeight/2, -20);
        const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.3, goalHeight, 0.3), postMat);
        rightPost.position.set(goalWidth/2, goalHeight/2, -20);
        const crossbar = new THREE.Mesh(new THREE.BoxGeometry(goalWidth+0.3, 0.3, 0.3), postMat);
        crossbar.position.set(0, goalHeight, -20);
        
        // Nettet (semi-transparent)
        const netGeo = new THREE.BoxGeometry(goalWidth, goalHeight, 2);
        const netMat = new THREE.MeshPhongMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.2 });
        const net = new THREE.Mesh(netGeo, netMat);
        net.position.set(0, goalHeight/2, -21);

        goal.add(leftPost, rightPost, crossbar, net);
        scene.add(goal);

        // --- BOLDEN ---
        createBall();

        // --- MÅLMAND (Agent Z) ---
        const goalieGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 0.6), new THREE.MeshPhongMaterial({ color: 0xffcc00 }));
        body.position.y = 0.9;
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshPhongMaterial({ color: 0xffdbac }));
        head.position.y = 2.1;
        goalieGroup.add(body, head);
        goalie = goalieGroup;
        goalie.position.set(0, 0, -19.5);
        scene.add(goalie);

        // --- EVENTS ---
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            if (isCharging) {
                ballSpin = (mouseX - lastMouseX) * 5; // Beregn skru
            }
            lastMouseX = mouseX;
        });

        window.addEventListener('mousedown', () => {
            if (!ballMoving) {
                isCharging = true;
                power = 0;
                document.getElementById('power-container').style.display = 'block';
            }
        });

        window.addEventListener('mouseup', () => {
            if (isCharging) {
                shoot();
                isCharging = false;
                document.getElementById('power-container').style.display = 'none';
            }
        });
    }

    function createBall() {
        if (ball) scene.remove(ball);
        const ballGeo = new THREE.SphereGeometry(0.35, 32, 32);
        const ballMat = new THREE.MeshPhongMaterial({ color: ballColor });
        ball = new THREE.Mesh(ballGeo, ballMat);
        ball.castShadow = true;
        ball.position.set(0, 0.35, 6);
        scene.add(ball);
    }

    function shoot() {
        ballMoving = true;
        const shootPower = (power / 100);
        const targetX = mouseX * 12;
        const targetY = shootPower * 8;
        
        ballVelocity.set(
            (targetX - ball.position.x) * 0.04,
            targetY * 0.08,
            -0.7 - (shootPower * 0.5)
        );
        
        // Målmand AI start
        setTimeout(() => diveGoalie(targetX, targetY), 200);
    }

    function diveGoalie(tx, ty) {
        if (isDiving) return;
        isDiving = true;
        
        // Sværhedsgrad: Målmanden bliver hurtigere/bedre pr level
        const aiAccuracy = Math.random() < (0.3 + (level * 0.05));
        const diveX = aiAccuracy ? tx : tx + (Math.random() * 4 - 2);
        
        const diveTime = 400 / (1 + level * 0.1);
        
        // Simpel animation af målmand
        const startPos = goalie.position.x;
        let elapsed = 0;
        const diveInterval = setInterval(() => {
            elapsed += 16;
            let t = elapsed / 500;
            goalie.position.x = startPos + (diveX * t);
            goalie.rotation.z = -t * (tx > 0 ? 1 : -1); // Kast sig sidelæns
            if (elapsed >= 500) clearInterval(diveInterval);
        }, 16);
    }

    function resetGame(result) {
        ballMoving = false;
        isDiving = false;
        
        if (result === "GOAL") {
            score++; gold += 100;
            if (score % 3 === 0) level++;
            showMsg("MÅÅÅÅL!", "#2ecc71");
        } else {
            showMsg(result, "#e74c3c");
        }

        setTimeout(() => {
            ball.position.set(0, 0.35, 6);
            ballVelocity.set(0,0,0);
            goalie.position.set(0, 0, -19.5);
            goalie.rotation.set(0,0,0);
            document.getElementById('score').innerText = score;
            document.getElementById('gold').innerText = gold;
            document.getElementById('lvl').innerText = level;
        }, 1000);
    }

    function animate() {
        requestAnimationFrame(animate);

        if (isCharging) {
            power = Math.min(power + 2, 100);
            document.getElementById('power-fill').style.width = power + "%";
        }

        if (ballMoving) {
            // Fysik med skru (Magnus effekten)
            ballVelocity.x += ballSpin * 0.001; 
            ball.position.add(ballVelocity);
            ballVelocity.y -= 0.006; // Gravity
            
            ball.rotation.x += 0.2;
            ball.rotation.y += ballSpin * 0.1;

            // --- KOLLISION MÅLMAND ---
            if (ball.position.distanceTo(goalie.position) < 1.5) {
                resetGame("REDET!");
            }

            // --- KOLLISION MÅL ---
            if (ball.position.z <= -20) {
                if (Math.abs(ball.position.x) < goalWidth/2 && ball.position.y < goalHeight && ball.position.y > 0) {
                    resetGame("GOAL");
                } else {
                    resetGame("FORBI!");
                }
            }

            // Rammer jorden
            if (ball.position.y < 0.35) {
                ball.position.y = 0.35;
                ballVelocity.y *= -0.4;
                ballVelocity.z *= 0.9; // Græsmodstand
            }
        }

        renderer.render(scene, camera);
    }

    function showMsg(txt, color) {
        const div = document.getElementById('msg-container');
        const span = document.getElementById('msg-text');
        span.innerText = txt;
        span.style.color = color;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 1000);
    }

    function toggleShop() {
        const shop = document.getElementById('shop-menu');
        shop.style.display = shop.style.display === 'flex' ? 'none' : 'flex';
    }

    function setSkin(color, cost) {
        if (gold >= cost) {
            if (cost > 0) gold -= cost;
            ballColor = color;
            createBall();
            toggleShop();
            document.getElementById('gold').innerText = gold;
        } else {
            alert("Du har ikke nok guld!");
        }
    }
</script>
</body>
</html>
