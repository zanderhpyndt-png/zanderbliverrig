<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Monster Hunter</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --gold: #ffd700;
            --red: #ff4757;
            --bg: #0a0a0c;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* HUD */
        .hud {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            width: 100%;
            border-bottom: 2px solid var(--gold);
        }

        h1 { font-family: 'Orbitron', sans-serif; margin: 0; color: var(--gold); letter-spacing: 3px; }
        .balance { font-size: 2rem; font-weight: bold; color: #4cd137; }

        /* Combat Zone */
        #game-area {
            position: relative;
            width: 100%;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Fjenden */
        .enemy {
            width: 150px;
            height: 150px;
            cursor: crosshair;
            transition: transform 0.1s;
            position: relative;
            filter: drop-shadow(0 0 10px var(--red));
        }

        .enemy:active { transform: scale(0.9); }

        /* Health Bar */
        .hp-container {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 10px;
            background: #333;
            border: 1px solid white;
        }
        .hp-bar { height: 100%; background: var(--red); width: 100%; transition: width 0.1s; }

        /* Shop Area */
        .shop {
            display: flex;
            gap: 15px;
            padding: 20px;
            overflow-x: auto;
            width: 100%;
            background: #111;
        }

        .item {
            min-width: 180px;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
        }

        button {
            background: var(--gold);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        button:disabled { background: #444; color: #888; }

        /* Animationer */
        .dmg-text {
            position: absolute;
            color: var(--red);
            font-weight: 900;
            font-family: 'Orbitron';
            pointer-events: none;
            animation: fly 0.6s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="hud">
    <h1>ZANDER HUNTER</h1>
    <div class="balance"><span id="money">0</span> kr</div>
</div>

<div id="game-area">
    <div id="monster-container" style="position: relative;">
        <div class="hp-container"><div class="hp-bar" id="hp-bar"></div></div>
        <div class="enemy" id="enemy" onclick="shoot(event)">👾</div>
    </div>
</div>

<div class="shop">
    <div class="item">
        <div>🔫 Skarpere skud</div>
        <small>+1 skade per klik</small>
        <button id="buy-dmg" onclick="buy('dmg')">50 kr</button>
    </div>
    <div class="item">
        <div>🤖 Auto-Turret</div>
        <small>Skyder selv 2 gange/sek</small>
        <button id="buy-auto" onclick="buy('auto')">200 kr</button>
    </div>
    <div class="item">
        <div>🚀 Raketstyr</div>
        <small>+10 skade per klik</small>
        <button id="buy-rocket" onclick="buy('rocket')">1500 kr</button>
    </div>
</div>

<script>
    let money = 0;
    let damage = 1;
    let autoDmg = 0;
    
    let enemyHP = 10;
    let maxHP = 10;
    let enemiesKilled = 0;

    const monsters = ['👾', '👹', '👽', '👻', '🤖', '🐲', '🧛', '🧟'];

    function shoot(e) {
        dealDamage(damage, e ? e.clientX : null, e ? e.clientY : null);
    }

    function dealDamage(amount, x, y) {
        enemyHP -= amount;
        money += amount;

        // Vis skade-tekst
        if (x && y) {
            const txt = document.createElement('div');
            txt.className = 'dmg-text';
            txt.style.left = x + 'px';
            txt.style.top = y + 'px';
            txt.innerText = `-${amount}`;
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 600);
        }

        if (enemyHP <= 0) {
            die();
        }
        updateUI();
    }

    function die() {
        enemiesKilled++;
        money += 10; // Bonus for kill
        
        // Gør næste fjende stærkere
        maxHP = Math.round(10 * Math.pow(1.15, enemiesKilled));
        enemyHP = maxHP;
        
        // Skift monster-ikon
        document.getElementById('enemy').innerText = monsters[Math.floor(Math.random() * monsters.length)];
        
        // Lille ryste-effekt
        document.getElementById('game-area').style.background = "rgba(255, 0, 0, 0.2)";
        setTimeout(() => document.getElementById('game-area').style.background = "transparent", 100);
    }

    function buy(type) {
        if (type === 'dmg' && money >= 50) {
            money -= 50; damage += 1;
        } else if (type === 'auto' && money >= 200) {
            money -= 200; autoDmg += 1;
        } else if (type === 'rocket' && money >= 1500) {
            money -= 1500; damage += 10;
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money);
        document.getElementById('hp-bar').style.width = (enemyHP / maxHP * 100) + "%";
        
        document.getElementById('buy-dmg').disabled = money < 50;
        document.getElementById('buy-auto').disabled = money < 200;
        document.getElementById('buy-rocket').disabled = money < 1500;
    }

    // Auto-turret loop
    setInterval(() => {
        if (autoDmg > 0) {
            dealDamage(autoDmg);
        }
    }, 500);

    updateUI();
</script>

</body>
</html>
