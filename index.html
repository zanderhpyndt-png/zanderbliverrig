<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander vs. Gigant-Monstre</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --red: #ff4757;
            --blue: #2e86de;
            --bg: #050505;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Stats Top */
        .header {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-bottom: 3px solid var(--red);
        }

        .stat-box { text-align: center; }
        .stat-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        .stat-value { font-size: 1.5rem; font-family: 'Orbitron'; color: var(--gold); }

        /* Combat Zone */
        #arena {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        /* Monster Styling */
        .monster-container {
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #monster {
            font-size: 100px; /* Starter størrelse */
            cursor: crosshair;
            transition: transform 0.1s, filter 0.3s;
            filter: drop-shadow(0 0 20px var(--red));
        }

        #monster:active { transform: scale(0.9); }

        /* Health Bars */
        .bar-wrap { width: 200px; height: 15px; background: #333; border-radius: 10px; margin: 5px; overflow: hidden; border: 1px solid #555; }
        .bar-fill { height: 100%; width: 100%; transition: width 0.2s; }
        .hp-monster { background: var(--red); }
        .hp-player { background: #4cd137; }

        /* Player HP Display */
        .player-status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            text-align: left;
        }

        /* Shop */
        .shop {
            width: 100%;
            background: #111;
            padding: 15px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-top: 2px solid #333;
        }

        .upgrade {
            min-width: 150px;
            background: #222;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #444;
        }

        button {
            background: var(--blue);
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        button:disabled { background: #333; color: #777; }

        /* Combat Text */
        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            font-family: 'Orbitron';
            animation: floatUp 0.7s forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-80px); opacity: 0; }
        }

        .screen-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: red; opacity: 0; pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

<div class="screen-flash" id="flash"></div>

<div class="header">
    <div class="stat-box">
        <div class="stat-label">Penge</div>
        <div class="stat-value" id="money">0 kr</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">Level</div>
        <div class="stat-value" id="level">1</div>
    </div>
</div>

<div id="arena">
    <div class="monster-container" id="m-cont">
        <span style="font-size: 0.8rem; color: var(--red);">MONSTER HP</span>
        <div class="bar-wrap"><div id="m-hp-bar" class="bar-fill hp-monster"></div></div>
        <div id="monster" onclick="playerAttack(event)">👹</div>
    </div>

    <div class="player-status">
        <span style="font-size: 0.8rem; color: #4cd137;">DIT LIV (ZANDER)</span>
        <div class="bar-wrap"><div id="p-hp-bar" class="bar-fill hp-player"></div></div>
    </div>
</div>

<div class="shop">
    <div class="upgrade">
        <div>⚔️ Skade</div>
        <small id="cost-dmg">Pris: 50</small>
        <button onclick="buy('dmg')">Opgradér</button>
    </div>
    <div class="upgrade">
        <div>🛡️ Rustning</div>
        <small id="cost-armor">Pris: 100</small>
        <button onclick="buy('armor')">Opgradér</button>
    </div>
    <div class="upgrade">
        <div>❤️ Heal</div>
        <small>Pris: 30</small>
        <button onclick="buy('heal')">Køb Liv</button>
    </div>
</div>

<script>
    let money = 0;
    let lvl = 1;
    
    // Player stats
    let pHP = 100;
    let pMaxHP = 100;
    let pDmg = 1;
    let pArmor = 0;

    // Monster stats
    let mHP = 10;
    let mMaxHP = 10;
    let mDmg = 2;
    let mSize = 100;

    const monsters = ['👹', '👾', '🧟', '🧛', '🐉', '💀', '👽', '🤡'];

    function playerAttack(e) {
        mHP -= pDmg;
        money += pDmg;
        spawnText(e.clientX, e.clientY, `-${pDmg}`, 'var(--gold)');
        
        if (mHP <= 0) {
            victory();
        }
        updateUI();
    }

    function monsterAttack() {
        let finalDmg = mDmg - pArmor;
        if (finalDmg < 1) finalDmg = 1;

        pHP -= finalDmg;
        
        // Flash screen red
        const flash = document.getElementById('flash');
        flash.style.opacity = "0.3";
        setTimeout(() => flash.style.opacity = "0", 100);

        if (pHP <= 0) {
            gameOver();
        }
        updateUI();
    }

    function victory() {
        lvl++;
        money += lvl * 10;
        
        // Gør monstret stærkere og større
        mMaxHP = Math.round(10 * Math.pow(1.3, lvl));
        mHP = mMaxHP;
        mDmg = Math.round(2 * Math.pow(1.2, lvl));
        mSize = 100 + (lvl * 5); // Bliver 5px større hver gang
        if (mSize > 300) mSize = 300; // Max størrelse

        document.getElementById('monster').innerText = monsters[Math.floor(Math.random() * monsters.length)];
        document.getElementById('monster').style.fontSize = mSize + "px";
    }

    function gameOver() {
        alert("Du døde! Monstrene stjal nogle af dine penge.");
        money = Math.floor(money * 0.7);
        pHP = pMaxHP;
        lvl = Math.max(1, lvl - 1); // Gå et level ned
        victory(); // Reset monster til det lavere level
    }

    function buy(type) {
        if (type === 'dmg' && money >= (lvl * 50)) {
            money -= (lvl * 50); pDmg += 2;
        } else if (type === 'armor' && money >= 100) {
            money -= 100; pArmor += 1;
        } else if (type === 'heal' && money >= 30) {
            money -= 30; pHP = pMaxHP;
        }
        updateUI();
    }

    function updateUI() {
        document.getElementById('money').innerText = money + " kr";
        document.getElementById('level').innerText = lvl;
        document.getElementById('m-hp-bar').style.width = (mHP / mMaxHP * 100) + "%";
        document.getElementById('p-hp-bar').style.width = (pHP / pMaxHP * 100) + "%";
    }

    function spawnText(x, y, txt, color) {
        const div = document.createElement('div');
        div.className = 'floating-text';
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.style.color = color;
        div.innerText = txt;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 700);
    }

    // Monsteret angriber hvert 2. sekund
    setInterval(() => {
        if (mHP > 0) monsterAttack();
    }, 2000);

    updateUI();
</script>

</body>
</html>
