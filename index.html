<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zander: Omega Warrior</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-gold: #ffd700;
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 25, 0.85);
        }

        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Rajdhani', sans-serif; overflow: hidden; user-select: none;
        }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background-image: 
                radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%),
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
        }

        /* HUD */
        .hud-top {
            position: fixed; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: center; gap: 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 100; font-family: 'Orbitron'; letter-spacing: 2px;
        }
        .stat-val { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); font-size: 1.5rem; }

        /* Sidepanel Shop */
        #shop-panel {
            position: fixed; left: 20px; top: 100px; bottom: 20px;
            width: 280px; background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px; padding: 20px; z-index: 100;
            backdrop-filter: blur(10px); overflow-y: auto;
        }

        .shop-category { margin-bottom: 25px; }
        .shop-category h3 { 
            font-family: 'Orbitron'; font-size: 0.8rem; color: var(--neon-pink);
            border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 15px;
        }

        .upgrade-item {
            background: rgba(255,255,255,0.05); padding: 12px;
            border-radius: 8px; margin-bottom: 10px; border: 1px solid transparent;
            transition: 0.3s;
        }
        .upgrade-item:hover { border-color: var(--neon-blue); background: rgba(0, 242, 255, 0.05); }
        
        .upgrade-info { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 8px; }
        
        .buy-btn {
            width: 100%; padding: 8px; border: none; border-radius: 5px;
            background: var(--neon-blue); color: black; font-weight: bold;
            font-family: 'Rajdhani'; cursor: pointer; transition: 0.2s;
        }
        .buy-btn:disabled { background: #444; color: #888; cursor: default; }

        /* Entities */
        #player {
            position: absolute; width: 60px; height: 60px;
            display: flex; justify-content: center; align-items: center;
            font-size: 50px; z-index: 60; filter: drop-shadow(0 0 15px var(--neon-blue));
        }

        .monster {
            position: absolute; width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
            font-size: 60px; z-index: 40; filter: drop-shadow(0 0 15px rgba(255,0,0,0.5));
            transition: transform 0.2s;
        }

        /* Bullets */
        .p-bullet { position: absolute; width: 15px; height: 15px; background: white; border-radius: 50%; box-shadow: 0 0 15px var(--neon-blue); z-index: 55; }
        .super-bullet { 
            position: absolute; width: 60px; height: 60px; background: var(--neon-gold); 
            border-radius: 50%; box-shadow: 0 0 40px var(--neon-gold); z-index: 56;
        }

        .particle { position: absolute; border-radius: 50%; pointer-events: none; z-index: 70; }

        /* Combo Bar */
        #combo-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 400px; height: 10px; background: rgba(0,0,0,0.5); border: 1px solid #333;
            border-radius: 5px;
        }
        #combo-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); transition: 0.2s; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud-top">
        <div>GULD: <span id="money" class="stat-val">0</span></div>
        <div>SEKTOR: <span id="lvl" class="stat-val">1</span></div>
        <div>LIV: <span id="p-hp" class="stat-val" style="color: #ff4757;">100</span></div>
    </div>

    <div id="shop-panel">
        <div class="shop-category">
            <h3>VÅBEN SYSTEM</h3>
            <div class="upgrade-item">
                <div class="upgrade-info"><span>Skade</span><span id="val-dmg">50</span></div>
                <button class="buy-btn" onclick="buy('dmg')" id="btn-dmg">OPGRADER: 100</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info"><span>Multi-Shot</span><span id="val-multi">1</span></div>
                <button class="buy-btn" onclick="buy('multi')" id="btn-multi">OPGRADER: 1000</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info"><span>Kritisk Chance</span><span id="val-crit">5%</span></div>
                <button class="buy-btn" onclick="buy('crit')" id="btn-crit">OPGRADER: 500</button>
            </div>
        </div>

        <div class="shop-category">
            <h3>OVERLEVELSE</h3>
            <div class="upgrade-item">
                <div class="upgrade-info"><span>Max Liv</span><span id="val-maxhp">100</span></div>
                <button class="buy-btn" onclick="buy('maxhp')" id="btn-maxhp">OPGRADER: 300</button>
            </div>
            <div class="upgrade-item">
                <button class="buy-btn" onclick="buy('heal')" style="background: #2ecc71;">REPARER ALT: 100</button>
            </div>
        </div>

        <div class="shop-category">
            <h3>AVATARS</h3>
            <div class="upgrade-item">
                <button class="buy-btn" onclick="buyAvatar('ninja', 800, '🥷', 1.6)" id="av-ninja">NINJA (800)</button>
            </div>
            <div class="upgrade-item">
                <button class="buy-btn" onclick="buyAvatar('king', 5000, '👑', 1.2)" id="av-king">GALAXY KING (5000)</button>
            </div>
        </div>
    </div>

    <div id="player">👨</div>

    <div id="combo-container">
        <div id="combo-fill"></div>
        <div style="text-align:center; font-size: 0.7rem; margin-top: 5px; color: var(--neon-pink); font-family: 'Orbitron';">ULTIMATE CHARGE</div>
    </div>
</div>

<script>
    let money = 0, lvl = 1, pHP = 100, pMaxHP = 100, pDmg = 50, pSpeed = 8, gMult = 2;
    let critChance = 0.05, multiShot = 1, comboCount = 0;
    let px = window.innerWidth/2, py = window.innerHeight/2;
    let prices = { dmg: 100, multi: 1000, crit: 500, maxhp: 300 };

    const keys = {}, monsters = [], pBullets = [], particles = [];
    const container = document.getElementById('game-container');

    window.addEventListener('keydown', e => {
        if(e.code === 'Enter') fireWeapon();
        keys[e.code] = true;
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function fireWeapon() {
        if(monsters.length === 0) return;
        
        let target = monsters[0];
        let minDist = Infinity;
        monsters.forEach(m => {
            let d = Math.sqrt((m.x-px)**2 + (m.y-py)**2);
            if(d < minDist) { minDist = d; target = m; }
        });

        const isSuper = comboCount >= 10;
        const count = isSuper ? 1 : multiShot;
        const spread = 0.2;

        for(let i=0; i<count; i++) {
            const bEl = document.createElement('div');
            bEl.className = isSuper ? 'super-bullet' : 'p-bullet';
            container.appendChild(bEl);

            let ang = Math.atan2(target.y - py, target.x - px);
            if(count > 1) ang += (i - (count-1)/2) * spread;

            let dmg = pDmg;
            if(Math.random() < critChance) dmg *= 2;
            if(isSuper) dmg *= 5;

            pBullets.push({
                el: bEl, x: px+20, y: py+20,
                vx: Math.cos(ang)*18, vy: Math.sin(ang)*18,
                damage: dmg, isSuper: isSuper
            });
        }

        if(isSuper) { comboCount = 0; shakeScreen(20); }
    }

    function buy(type) {
        if(money >= prices[type]) {
            money -= prices[type];
            if(type === 'dmg') { pDmg += 25; prices.dmg = Math.round(prices.dmg * 1.4); }
            if(type === 'multi') { multiShot++; prices.multi = Math.round(prices.multi * 3); }
            if(type === 'crit') { critChance += 0.05; prices.crit = Math.round(prices.crit * 2); }
            if(type === 'maxhp') { pMaxHP += 50; pHP += 50; prices.maxhp = Math.round(prices.maxhp * 1.5); }
            if(type === 'heal') { pHP = pMaxHP; }
            updateUI();
        }
    }

    function buyAvatar(id, cost, icon, speed) {
        if(money >= cost) {
            money -= cost;
            document.getElementById('player').innerText = icon;
            pSpeed = 8 * speed;
            if(id === 'king') gMult = 6;
            document.getElementById('av-' + id).disabled = true;
            updateUI();
        }
    }

    function spawnMonster() {
        const el = document.createElement('div');
        el.className = 'monster';
        el.innerText = ['👾', '👹', '🤖', '🕷️'][Math.floor(Math.random()*4)];
        container.appendChild(el);
        monsters.push({
            el: el, x: Math.random()*window.innerWidth, y: -100,
            hp: 100 * Math.pow(1.2, lvl), maxHp: 100 * Math.pow(1.2, lvl)
        });
    }

    function shakeScreen(amt) {
        container.style.transform = `translate(${Math.random()*amt-amt/2}px, ${Math.random()*amt-amt/2}px)`;
        setTimeout(() => container.style.transform = "translate(0,0)", 50);
    }

    function updateUI() {
        document.getElementById('money').innerText = Math.floor(money);
        document.getElementById('lvl').innerText = lvl;
        document.getElementById('p-hp').innerText = Math.floor(pHP);
        
        document.getElementById('val-dmg').innerText = pDmg;
        document.getElementById('val-multi').innerText = multiShot;
        document.getElementById('val-crit').innerText = Math.round(critChance*100) + "%";
        document.getElementById('val-maxhp').innerText = pMaxHP;

        document.getElementById('btn-dmg').innerText = "OPGRADER: " + prices.dmg;
        document.getElementById('btn-multi').innerText = "OPGRADER: " + prices.multi;
        document.getElementById('btn-crit').innerText = "OPGRADER: " + prices.crit;
        document.getElementById('btn-maxhp').innerText = "OPGRADER: " + prices.maxhp;

        document.getElementById('btn-dmg').disabled = money < prices.dmg;
        document.getElementById('btn-multi').disabled = money < prices.multi || multiShot >= 5;
        document.getElementById('btn-crit').disabled = money < prices.crit || critChance >= 0.5;
        document.getElementById('btn-maxhp').disabled = money < prices.maxhp;
    }

    function loop(time) {
        if(keys['ArrowUp']) py -= pSpeed;
        if(keys['ArrowDown']) py += pSpeed;
        if(keys['ArrowLeft']) px -= pSpeed;
        if(keys['ArrowRight']) px += pSpeed;

        document.getElementById('player').style.left = px + 'px';
        document.getElementById('player').style.top = py + 'px';

        if(monsters.length < 1 + Math.floor(lvl/5)) spawnMonster();

        monsters.forEach((m, mi) => {
            const dx = px - m.x, dy = py - m.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            m.x += (dx/dist) * (1.5 + lvl*0.1);
            m.y += (dy/dist) * (1.5 + lvl*0.1);
            m.el.style.left = m.x + 'px'; m.el.style.top = m.y + 'px';
            if(dist < 50) pHP -= 0.2;
        });

        pBullets.forEach((b, bi) => {
            b.x += b.vx; b.y += b.vy;
            b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
            
            monsters.forEach((m, mi) => {
                if(b.x > m.x && b.x < m.x+80 && b.y > m.y && b.y < m.y+80) {
                    m.hp -= b.damage;
                    if(!b.isSuper) comboCount = Math.min(10, comboCount + 1);
                    b.el.remove(); pBullets.splice(bi, 1);
                    
                    if(m.hp <= 0) {
                        m.el.remove(); monsters.splice(mi, 1);
                        money += 250 * lvl * gMult;
                        lvl++; updateUI();
                    }
                }
            });
        });

        document.getElementById('combo-fill').style.width = (comboCount / 10 * 100) + "%";
        if(pHP <= 0) { alert("MISSION FAILED. Guld: " + money); location.reload(); }
        requestAnimationFrame(loop);
    }

    updateUI();
    requestAnimationFrame(loop);
</script>
</body>
</html>
